<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Chronos — Personal OS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg0:#171717;--bg1:#1e1e1e;--bg2:#252525;--bg3:#2e2e2e;--bg4:#383838;--bg5:#444444;
  --border:#f2562312;--border2:#f256231e;--border3:#f2562330;--border4:#ffffff40;
  --text0:#dedede;--text1:#b8b8b8;--text2:#888888;--text3:#5a5a5a;--text4:#3e3e3e;
  --accent:#f25623;--accent2:#ff7a50;--accentd:#c94010;--accent-bg:#f2562314;--accent-border:#f2562338;
  --green:#34c386;--green-bg:#34c38614;--green-border:#34c3863a;
  --amber:#dba14a;--amber-bg:#dba14a14;--amber-border:#dba14a3a;
  --red:#e6675f;--red-bg:#e6675f14;--red-border:#e6675f3a;
  --blue:#56a8e6;
  --r-sm:4px;--r-md:6px;--r-lg:10px;--r-xl:14px;
}
html,body,#root{height:100%;background:var(--bg0);color:var(--text0);font-family:'Inter',sans-serif;font-size:13px;line-height:1.5;overflow:hidden}

/* CIERRE DÍA */
.cierre-btn{width:28px;height:28px;border-radius:var(--r-md);border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.cierre-btn:hover{border-color:var(--border3);color:var(--text0)}
/* GOOGLE SHEETS SYNC */
.gs-btn{width:28px;height:28px;border-radius:var(--r-md);border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.gs-btn:hover{background:var(--bg3);color:var(--text1);border-color:var(--border3)}
.gs-btn.connected{border-color:var(--green-border);color:var(--green);background:var(--green-bg)}
.gs-btn.syncing{border-color:var(--accent-border);color:var(--accent2);background:var(--accent-bg)}
.gs-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.gs-modal{background:var(--bg1);border:1px solid var(--border2);border-radius:var(--r-xl);padding:24px;max-width:400px;width:100%;display:flex;flex-direction:column;gap:16px}
.gs-modal-title{font-size:14px;font-weight:600;color:var(--text0)}
.gs-modal-sub{font-size:12px;color:var(--text3);line-height:1.6}
.gs-step{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-md)}
.gs-step-num{width:18px;height:18px;border-radius:50%;background:var(--accent-bg);border:1px solid var(--accent-border);color:var(--accent2);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.gs-step-text{font-size:11px;color:var(--text2);line-height:1.5;flex:1}
.gs-step-text strong{color:var(--text0)}
.gs-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--text0);font-size:12px;font-family:'Inter',sans-serif;padding:8px 10px;outline:none;transition:border .1s}
.gs-input:focus{border-color:var(--accent-border)}
.gs-input::placeholder{color:var(--text4)}
.gs-connect-btn{width:100%;padding:9px;border-radius:var(--r-md);background:var(--accent);border:none;color:#fff;font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;transition:background .1s;font-weight:500}
.gs-connect-btn:hover{background:var(--accentd)}
.gs-connect-btn:disabled{opacity:.4;cursor:not-allowed}
.gs-status-row{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3)}
.gs-status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.gs-status-dot.err{background:var(--red)}
.gs-link{font-size:10px;color:var(--accent2);text-decoration:none;cursor:pointer}
.gs-link:hover{text-decoration:underline}
@keyframes spin{to{transform:rotate(360deg)}}
.gs-spin{display:inline-block;animation:spin 1s linear infinite;margin-right:4px}
.cierre-proj-row{display:flex;flex-direction:column;gap:6px;padding:10px 0;border-bottom:1px solid var(--border)}
.cierre-proj-row:last-child{border-bottom:none}
.cierre-proj-hdr{display:flex;align-items:center;gap:8px}
.cierre-proj-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cierre-proj-name{font-size:12px;font-weight:500;color:var(--text0);flex:1}
.cierre-proj-time{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.cierre-intent{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--text0);font-size:12px;font-family:'Inter',sans-serif;padding:7px 10px;resize:none;outline:none;transition:border .1s}
.cierre-intent:focus{border-color:var(--accent-border)}
.cierre-dur-row{display:flex;gap:6px;flex-wrap:wrap}
.cierre-dur-btn{padding:3px 10px;border-radius:var(--r-sm);border:1px solid var(--border2);background:transparent;color:var(--text3);font-size:11px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .1s}
.cierre-dur-btn:hover{color:var(--text1);border-color:var(--border3)}
.cierre-dur-btn.sel{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent2)}
.cierre-skip{font-size:10px;color:var(--text4);background:transparent;border:none;cursor:pointer;font-family:'Inter',sans-serif;padding:2px 0}
.cierre-skip:hover{color:var(--text2)}
.cierre-preview{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 14px;display:flex;flex-direction:column;gap:6px}
.cierre-preview-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px}
.cierre-preview-row{display:flex;align-items:center;gap:8px}
.cierre-preview-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.cierre-preview-text{font-size:11px;color:var(--text1);flex:1}
.cierre-preview-time{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.cierre-step{font-size:10px;color:var(--text3);margin-bottom:4px}
.app{display:grid;grid-template-rows:38px 1fr;grid-template-columns:320px 1fr;height:100vh;overflow:hidden;background:var(--bg0)}
.topbar{grid-column:1/-1;display:flex;align-items:center;padding:0 14px;background:var(--bg0);border-bottom:1px solid var(--border);gap:12px;z-index:10}

/* LEFT COL */
.col-left{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;position:relative;background:var(--bg0)}
/* projects panel */
.proj-section{display:flex;flex-direction:column;overflow:hidden;min-height:60px;background:var(--bg0)}
/* section divider — clean visual break, no drag */
.section-divider{flex-shrink:0;padding:10px 14px;display:flex;align-items:center}
.section-divider::after{content:'';display:block;width:100%;height:1px;background:linear-gradient(90deg,var(--border2),var(--border2) 70%,transparent)}
/* timeline panel — distinct background, clean separation */
.timeline-section{display:flex;flex-direction:column;overflow:hidden;min-height:60px;background:var(--bg0);position:relative}

/* RIGHT COL */
.col-right{background:var(--bg0);display:flex;flex-direction:column;overflow:hidden}

/* TOPBAR */
.logo{font-size:13px;font-weight:600;letter-spacing:-0.2px;color:var(--text0);display:flex;align-items:center;gap:6px}
.logo-gem{width:16px;height:16px;background:var(--accent);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:700}
.topbar-sep{width:1px;height:16px;background:var(--border2)}
.topbar-nav{display:flex;gap:1px}
.nav-btn{padding:4px 10px;border-radius:var(--r-sm);background:transparent;border:none;color:var(--text3);font-size:11px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .12s}
.nav-btn:hover{color:var(--text1)}
.nav-btn.active{background:var(--bg3);color:var(--text0)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.focus-pill{display:flex;align-items:center;gap:7px;background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:20px;padding:3px 10px 3px 8px}
.pulse-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pa 2.2s ease-in-out infinite}
@keyframes pa{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.8)}}
.focus-pill-label{font-size:11px;color:var(--text2);max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.focus-pill-time{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--accent2);font-weight:500}
.tb-icon-btn{width:28px;height:28px;border-radius:var(--r-md);border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.tb-icon-btn:hover{background:var(--bg3);color:var(--text1);border-color:var(--border3)}
.tb-icon-btn.tb-icon-active{color:var(--accent);border-color:var(--accent-border);background:var(--accent-bg)}
.tb-icon-btn.tb-icon-syncing{color:var(--text2);border-color:var(--border2)}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.tz-badge{font-size:10px;color:var(--text3);padding:2px 7px;border-radius:var(--r-sm);border:1px solid var(--border2);cursor:pointer;transition:all .1s}
.tz-badge:hover{color:var(--text1);border-color:var(--border3)}
/* REMINDERS FLOAT PANEL */
.rem-float{position:fixed;top:46px;right:10px;width:300px;background:var(--bg1);border:1px solid var(--border3);border-radius:var(--r-lg,10px);box-shadow:0 8px 32px #00000070;z-index:9000;display:flex;flex-direction:column;max-height:calc(100vh - 60px);overflow:hidden}
.rem-float-hdr{display:flex;align-items:center;padding:9px 12px 8px;border-bottom:1px solid var(--border2);gap:6px;flex-shrink:0}
.rem-float-title{font-size:11px;font-weight:600;color:var(--text0);flex:1}
.rem-float-close{width:18px;height:18px;border-radius:4px;border:none;background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px}
.rem-float-close:hover{background:var(--bg3);color:var(--text1)}
.rem-quick{padding:8px 10px;border-bottom:1px solid var(--border2);display:flex;flex-direction:column;gap:6px;flex-shrink:0;position:relative}
.rem-quick-row{display:flex;align-items:center;gap:6px}
.rem-q-input{flex:1;background:var(--bg2);border:1px solid var(--border3);border-radius:5px;padding:5px 8px;font-size:11px;color:var(--text0);outline:none;font-family:inherit}
.rem-q-input:focus{border-color:var(--accent)}
.rem-q-input::placeholder{color:var(--text4)}
.rem-q-send{width:26px;height:26px;border-radius:5px;background:var(--accent);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .1s}
.rem-q-send:hover{opacity:.85}
/* Compact selector row (Propuesta B) */
.rem-sel-row{display:flex;gap:5px;align-items:center}
.rem-sel{display:flex;align-items:center;gap:4px;background:var(--bg2);border:1px solid var(--border2);border-radius:5px;padding:4px 7px;cursor:pointer;transition:border-color .1s;font-family:inherit;font-size:10px;color:var(--text1);white-space:nowrap;position:relative;user-select:none}
.rem-sel:hover{border-color:var(--border3)}
.rem-sel.open{border-color:var(--accent-border);background:var(--accent-bg)}
.rem-sel.proj-sel{flex:1;min-width:0}
.rem-sel-icon{font-size:11px;color:var(--text3);flex-shrink:0}
.rem-sel-val{flex:1;overflow:hidden;text-overflow:ellipsis}
.rem-sel-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.rem-sel-caret{font-size:9px;color:var(--text4);margin-left:1px;flex-shrink:0}
.rem-sel-time{width:78px;flex:none;color-scheme:dark;font-family:'JetBrains Mono',monospace}
.rem-toggle-done{width:100%;background:transparent;border:none;color:var(--text4);font-size:9.5px;padding:8px 12px 4px;cursor:pointer;font-family:'Inter',sans-serif;text-align:left;transition:color .1s}
.rem-toggle-done:hover{color:var(--text2)}
/* Dropdown */
.rem-dd{position:fixed;min-width:130px;background:var(--bg2);border:1px solid var(--border3);border-radius:var(--r-md);box-shadow:0 6px 24px #00000080;z-index:99999;padding:3px;display:flex;flex-direction:column;gap:1px;max-height:220px;overflow-y:auto}
.rem-dd-item{display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:4px;cursor:pointer;font-size:10px;color:var(--text1);transition:background .1s;white-space:nowrap;background:none;border:none;font-family:inherit;width:100%;text-align:left}
.rem-dd-item:hover{background:var(--bg3)}
.rem-dd-item.active{color:var(--accent);background:var(--accent-bg)}
.rem-dd-item-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
/* chips kept for nothing, remove usage in render but keep class inert */
.rem-chips{display:none}
.rem-chip{display:none}
.rem-list{flex:1;overflow-y:auto;padding:6px 0}
.rem-empty{padding:24px;text-align:center;font-size:11px;color:var(--text4)}
.rem-section-lbl{font-size:9px;font-weight:600;color:var(--text4);text-transform:uppercase;letter-spacing:.07em;padding:4px 12px 2px}
.rem-item{display:flex;align-items:center;gap:7px;padding:6px 12px;transition:background .1s}
.rem-item:hover{background:var(--bg2)}
.rem-item-stripe{width:3px;border-radius:2px;flex-shrink:0;height:20px}
.rem-item-body{flex:1;min-width:0}
.rem-item-title{font-size:11px;color:var(--text0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rem-item-meta{font-size:9.5px;color:var(--text3);margin-top:1px;display:flex;align-items:center;gap:4px}
.rem-item-meta.over{color:var(--red,#e05555)}
.rem-overdue-dot{width:6px;height:6px;border-radius:50%;background:var(--red,#e05555);flex-shrink:0;animation:remPulse 1.2s infinite}
@keyframes remPulse{0%,100%{opacity:1}50%{opacity:.3}}
.rem-check{width:16px;height:16px;border-radius:4px;border:1px solid var(--border3);background:transparent;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s}
.rem-check:hover{border-color:var(--green,#3ab87a)}
.rem-check.done{background:var(--green-bg,#3ab87a14);border-color:var(--green,#3ab87a)}
.rem-del{width:16px;height:16px;border-radius:3px;border:none;background:transparent;color:var(--text4);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .1s}
.rem-item:hover .rem-del{opacity:1}
.rem-snooze{width:16px;height:16px;border-radius:3px;border:none;background:transparent;color:var(--text4);cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .1s,color .1s;position:relative}
.rem-item:hover .rem-snooze{opacity:1}
.rem-snooze:hover{color:var(--accent2)}
.rem-snooze-pop{position:absolute;right:0;top:20px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-md);box-shadow:0 6px 20px rgba(0,0,0,.4);z-index:50;padding:4px;min-width:110px}
.rem-snooze-opt{display:block;width:100%;text-align:left;background:transparent;border:none;color:var(--text2);font-size:11px;padding:6px 8px;border-radius:5px;cursor:pointer;font-family:'Inter',sans-serif}
.rem-snooze-opt:hover{background:var(--bg4);color:var(--text0)}
.rem-del:hover{color:var(--red,#e05555)}
/* ── Time Picker C: botón compacto → mini drum popup ── */
.mini-drum-popup{background:var(--bg2);border:1px solid var(--accent-border);border-radius:8px;overflow:hidden;margin-top:4px;width:100%}
.mini-drum-hdr{display:flex;gap:2px;padding:4px 6px;border-bottom:1px solid var(--border)}
.mini-col-lbl{flex:1;font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text4);text-align:center}
.mini-drum-body{display:flex;height:110px}
.mini-col{flex:1;overflow:hidden;position:relative;border-right:1px solid var(--border)}
.mini-col:last-child{border-right:none}
.mini-fade-t{position:absolute;top:0;left:0;right:0;height:32px;background:linear-gradient(to bottom,var(--bg2),transparent);z-index:2;pointer-events:none}
.mini-fade-b{position:absolute;bottom:0;left:0;right:0;height:32px;background:linear-gradient(to top,var(--bg2),transparent);z-index:2;pointer-events:none}
.mini-highlight{position:absolute;top:50%;left:3px;right:3px;height:26px;transform:translateY(-50%);border-top:1px solid var(--accent-border);border-bottom:1px solid var(--accent-border);border-radius:3px;z-index:1;pointer-events:none}
.mini-list{display:flex;flex-direction:column;align-items:stretch;position:absolute;width:100%;transition:transform .12s ease}
.mini-item{height:26px;line-height:26px;font-size:12px;color:var(--text3);flex-shrink:0;font-family:'JetBrains Mono',monospace;cursor:pointer;user-select:none;text-align:center;width:100%}
.mini-item.sel{color:var(--accent2);font-weight:500}
.mini-item.near{color:var(--text1)}
.mini-drum-footer{padding:5px 8px;display:flex;justify-content:flex-end;border-top:1px solid var(--border)}
.mini-ok{background:var(--accent);border:none;border-radius:4px;color:#fff;font-size:10px;font-weight:500;padding:3px 10px;cursor:pointer;font-family:'Inter',sans-serif}
.mini-ok:hover{background:var(--accentd)}

/* rem toast */
.rem-toast{position:fixed;bottom:16px;right:16px;background:var(--bg2);border:1px solid var(--red,#e05555);border-radius:var(--r-lg,10px);padding:11px 13px;min-width:230px;max-width:280px;box-shadow:0 4px 24px #00000060;z-index:9999}
.rem-toast-hdr{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.rem-toast-dot{width:7px;height:7px;border-radius:50%;background:var(--red,#e05555);flex-shrink:0}
.rem-toast-title{font-size:11px;font-weight:600;color:var(--text0);flex:1}
.rem-toast-x{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:0;line-height:1}
.rem-toast-proj{font-size:10px;color:var(--text3);margin-bottom:6px}
.rem-toast-actions{display:flex;gap:5px}
.tb-icon-alert{color:var(--red,#e05555) !important;border-color:color-mix(in srgb,var(--red,#e05555) 35%,transparent) !important}

/* idle reminder pill */
.idle-pill{display:flex;align-items:center;gap:6px;background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:20px;padding:3px 10px 3px 8px;cursor:pointer}
.idle-pill-dot{width:5px;height:5px;border-radius:50%;background:var(--amber);animation:pa 1.4s ease-in-out infinite}
.idle-pill-text{font-size:11px;color:var(--amber)}
.idle-pill-stop{width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:var(--text3);margin-left:2px;border-radius:3px;background:var(--bg3);border:none;cursor:pointer;font-family:'Inter',sans-serif}
.idle-pill-stop:hover{color:var(--text0)}

/* SECTION HDR */
.sec-hdr{display:flex;align-items:center;padding:13px 14px 11px;gap:8px;flex-shrink:0}
.sec-hdr-accent{width:3px;height:12px;border-radius:2px;background:var(--accent);flex-shrink:0}
.sec-hdr-title{font-size:11px;font-weight:600;color:var(--text1);text-transform:uppercase;letter-spacing:.8px;flex:1}
.ghost-btn{background:transparent;border:none;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:var(--r-sm);padding:2px 5px;transition:all .1s;font-family:'Inter',sans-serif;font-size:11px}
.ghost-btn:hover{background:var(--bg3);color:var(--text1)}
.toggle-switch{position:relative;display:inline-block;width:34px;height:19px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:var(--bg4);border:1px solid var(--border2);border-radius:20px;transition:all .15s}
.toggle-slider:before{content:'';position:absolute;height:13px;width:13px;left:2px;top:2px;background:var(--text2);border-radius:50%;transition:all .15s}
.toggle-switch input:checked+.toggle-slider{background:var(--accent-bg);border-color:var(--accent-border)}
.toggle-switch input:checked+.toggle-slider:before{transform:translateX(15px);background:var(--accent)}

/* PROJECTS — compact grouped */
.proj-list{overflow-y:auto;flex:1;padding-bottom:4px}
.proj-list::-webkit-scrollbar{width:2px}
.proj-list::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:2px}
.proj-group{margin-bottom:2px}
.proj-group-hdr{display:flex;align-items:center;gap:6px;padding:6px 16px 2px;position:sticky;top:0;background:var(--bg0);z-index:2}
.proj-group-label{font-size:9px;font-weight:600;color:var(--text4);text-transform:uppercase;letter-spacing:.8px;flex:1;padding-left:2px}
.proj-item{display:flex;align-items:center;gap:7px;padding:4px 10px 4px 10px;cursor:pointer;transition:background .12s;user-select:none;position:relative;min-height:28px;margin:1px 6px;border-radius:7px}
.proj-item:hover{background:var(--bg2)}
.proj-item.sel{background:var(--bg2)}
.proj-item.live .proj-label{color:var(--text0)}
/* Stripe: 3px color bar on the left */
.proj-stripe{width:3px;border-radius:2px;height:20px;flex-shrink:0;transition:height .12s}
.proj-item:hover .proj-stripe,.proj-item.sel .proj-stripe,.proj-item.live .proj-stripe{height:26px}
.proj-color{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.proj-icon-badge{width:18px;height:18px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.proj-icon-badge::before{content:'';position:absolute;inset:0;background:var(--proj-color,#888);opacity:.14;border-radius:inherit}
.proj-label{font-size:11px;font-weight:400;color:var(--text1);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-item.sel .proj-label{color:var(--text0);font-weight:500}
.proj-inline-meta{display:flex;align-items:center;gap:4px;flex-shrink:0}
.proj-time-chip{font-size:9.5px;font-family:'JetBrains Mono',monospace;color:var(--text3)}
.proj-live-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;background:var(--green,#2fb87a);box-shadow:0 0 4px var(--green,#2fb87a)}
.proj-sess-chip{font-size:8px;color:var(--text4);padding:0 4px;border-radius:20px;background:var(--bg4)}
.proj-cat-chip{display:none}
.limit-bar{display:none}
.limit-bar-fill{display:none}
/* hover actions — appear inline on hover */
.proj-item .proj-actions{display:none;gap:3px;flex-shrink:0}
.proj-item:hover .proj-actions,.proj-item.sel .proj-actions{display:flex}
.pa-btn{font-size:9px;padding:1px 6px;border-radius:var(--r-sm);border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-family:'Inter',sans-serif;transition:all .1s;white-space:nowrap}
.pa-btn:hover{background:var(--bg4);color:var(--text1);border-color:var(--border3)}
.pa-btn.go{border-color:var(--accent-border);color:var(--accent2)}
.pa-btn.go:hover{background:var(--accent-bg);border-color:var(--accent)}
.proj-habit-bell{width:18px;height:18px;border-radius:var(--r-sm);border:1px solid var(--red-border,#e6675f3a);background:var(--red-bg,#e6675f14);color:var(--red,#e6675f);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .12s}
.proj-habit-bell:hover{background:var(--red,#e6675f);color:#fff}
.habit-check{width:17px;height:17px;border-radius:5px;border:1px solid var(--border3);background:transparent;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.habit-check:hover{border-color:var(--green,#3ab87a)}
.habit-check.done{background:var(--green-bg,#3ab87a14);border-color:var(--green,#3ab87a)}
.habit-check.due{border-color:var(--accent2);border-style:dashed}
.habit-check svg{opacity:0;transition:opacity .1s}
.habit-check.done svg{opacity:1}
/* ctx strip — compact */
.ctx-strip{padding:4px 14px 6px 22px;background:var(--bg0);border-bottom:1px solid var(--border)}
.ctx-eyebrow{font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px}
.ctx-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ctx-col-lbl{font-size:9px;color:var(--text4);margin-bottom:1px}
.ctx-col-val{font-size:10px;color:var(--text2);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.ctx-step{grid-column:1/-1;margin-top:1px}
.ctx-step-val{font-size:10px;color:var(--accent2);line-height:1.4}

/* FOCUS PANEL */
.focus-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg0)}
.focus-panel-hdr{display:flex;align-items:center;padding:16px 24px 12px;gap:8px;flex-shrink:0;border-bottom:1px solid var(--border)}
.focus-panel-title{font-size:13px;font-weight:600;color:var(--text0);flex:1}
.focus-panel-date{font-size:10px;color:var(--text3)}
.focus-panel-body{flex:1;overflow-y:auto;padding:12px 24px 20px;display:flex;flex-direction:column;gap:8px}
.focus-panel-body::-webkit-scrollbar{width:2px}
.focus-panel-body::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.focus-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px 14px;cursor:pointer;transition:all .12s;position:relative}
.focus-card:hover{border-color:var(--border3);background:var(--bg3)}
.focus-card.done{opacity:.4}
.focus-card-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.focus-card-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.focus-card-proj{font-size:11px;font-weight:600;color:var(--text0);flex:1}
.focus-card-time{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.focus-card-intent{font-size:12px;color:var(--text1);line-height:1.5;margin-bottom:8px}
.focus-card-actions{display:flex;gap:6px}
.focus-start-btn{padding:4px 12px;border-radius:var(--r-sm);border:1px solid var(--accent-border);background:var(--accent-bg);color:var(--accent2);font-size:10px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .1s}
.focus-start-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.focus-done-btn{padding:4px 10px;border-radius:var(--r-sm);border:1px solid var(--border2);background:transparent;color:var(--text3);font-size:10px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .1s}
.focus-done-btn:hover{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.focus-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:10px;color:var(--text4);font-size:12px;text-align:center;line-height:1.6;padding:40px 24px}
.focus-empty-icon{font-size:28px;opacity:.4}
.focus-cta{padding:6px 16px;border-radius:var(--r-md);border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:11px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .1s;margin-top:4px}
.focus-cta:hover{background:var(--bg4);color:var(--text0)}

/* TIMELINE */
.tl-header{display:flex;align-items:center;padding:13px 10px 11px 14px;flex-shrink:0;gap:8px;background:var(--bg0)}
.tl-date-str{font-size:11px;color:var(--text1);font-weight:600;flex:1;white-space:nowrap;text-transform:uppercase;letter-spacing:.7px}
.tl-zoom-ctrl{display:flex;align-items:center;gap:3px}
.tl-zoom-btn{width:20px;height:20px;border-radius:var(--r-sm);background:transparent;border:1px solid var(--border2);color:var(--text3);font-size:13px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;font-family:'Inter',sans-serif}
.tl-zoom-btn:hover{background:var(--bg3);color:var(--text1);border-color:var(--border3)}
.tl-zoom-val{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--text3);width:26px;text-align:center}
.tl-scroll{flex:1;overflow-y:auto;overflow-x:hidden;position:relative}
.tl-scroll::-webkit-scrollbar{width:3px}
.tl-scroll::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:2px}
.tl-inner{position:relative;padding-left:38px}
.tl-hour-row{position:absolute;left:0;right:0;pointer-events:none;display:flex;align-items:flex-start}
.tl-hour-lbl{width:32px;font-size:8px;color:var(--text4);font-family:'JetBrains Mono',monospace;text-align:right;padding-right:6px;line-height:1;padding-top:1px;flex-shrink:0}
.tl-hour-line{flex:1;border-top:1px solid var(--border)}
.tl-hour-line.maj{border-top-color:var(--border2)}
/* plan block — full-width background zone with left accent border */
/* ── Timeline: barra de color plan (izq) + bloque real (der, pegado) ── */
.tl-plan{position:absolute;left:33px;width:6px;border-radius:2px;padding:0;overflow:hidden;cursor:pointer;transition:opacity .12s,filter .1s;border-left:none;border-top:none;border-right:none;border-bottom:none}
.tl-plan:hover{filter:brightness(1.3)}
.tl-lane-div{display:none}
.tl-real{position:absolute;left:43px;right:6px;border-radius:4px;padding:2px 7px 2px 8px;font-size:9px;font-weight:600;overflow:hidden;pointer-events:none;white-space:nowrap;text-overflow:ellipsis;border-left:3px solid}
/* now line */
.tl-now{position:absolute;left:30px;right:6px;height:1px;z-index:8;pointer-events:none;background:var(--red);opacity:.55}
.tl-now::before{content:'';position:absolute;left:-3px;top:-2.5px;width:6px;height:6px;border-radius:50%;background:var(--red);opacity:1}
/* double-click hint overlay */
.tl-dclick-hint{position:absolute;left:33px;width:18px;border:1px dashed var(--accent);border-radius:3px;opacity:.4;pointer-events:none;background:var(--accent-bg)}

/* TIMER */
.timer-top-bar{display:flex;align-items:center;padding:8px 20px;border-bottom:1px solid var(--border);gap:0;flex-shrink:0}
.tstat{flex:1;display:flex;flex-direction:column;align-items:center;padding:4px 0}
.tstat-val{font-size:16px;font-weight:500;font-family:'JetBrains Mono',monospace;color:var(--text0);line-height:1.1}
.tstat-label{font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:.6px;margin-top:2px}
.tstat-sep{width:1px;height:28px;background:var(--border);align-self:center}
.timer-main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 32px}
.timer-ctx-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.timer-ctx-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.timer-ctx-proj{font-size:12px;color:var(--text2)}
.timer-ctx-task{font-size:12px;color:var(--text3)}
.timer-ctx-sep{font-size:12px;color:var(--text4)}
.timer-display{font-size:76px;font-weight:300;font-family:'JetBrains Mono',monospace;letter-spacing:-3px;line-height:1;margin-bottom:4px;transition:color .2s}
.timer-display.idle{color:var(--text4)}
.timer-display.running{color:var(--text0)}
.timer-display.paused{color:var(--text3)}
.timer-display.phase-done{color:var(--amber);animation:pulseSoft 1.6s ease-in-out infinite}
@keyframes pulseSoft{0%,100%{opacity:1}50%{opacity:.55}}
.timer-status{font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:20px}
.timer-status.idle{color:var(--text4)}
.timer-status.running{color:var(--green)}
.timer-status.paused{color:var(--amber)}
.timer-status.phase-done{color:var(--amber);font-weight:600}
.timer-ctrls{display:flex;gap:6px;margin-bottom:24px}
.ctrl{padding:8px 20px;border-radius:var(--r-md);border:1px solid var(--border2);background:var(--bg2);color:var(--text2);font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s}
.ctrl:hover{background:var(--bg3);border-color:var(--border3);color:var(--text0)}
.ctrl.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.ctrl.primary:hover{background:var(--accentd)}
.ctrl.stop{border-color:var(--red-border);color:var(--red)}
.ctrl.stop:hover{background:var(--red-bg)}
.ctrl.phase-cta{font-weight:600;box-shadow:0 0 0 3px var(--amber-bg)}
.ctrl.phase-cta.to-break{background:var(--green);border-color:var(--green)}
.ctrl.phase-cta.to-break:hover{background:#28a86c}
.ctrl.phase-cta.to-work{background:var(--accent);border-color:var(--accent)}
.ctrl.phase-cta.to-work:hover{background:var(--accentd)}

/* POMODORO */
.pomo-card{width:100%;max-width:380px;background:var(--bg1);border:1px solid var(--border2);border-radius:var(--r-xl);padding:14px 16px;transition:border-color .2s,box-shadow .2s}
.pomo-card.phase-done{border-color:var(--amber-border);box-shadow:0 0 0 3px var(--amber-bg)}
.pomo-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.pomo-title{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;flex:1}
.pomo-tabs{display:flex;gap:1px;background:var(--bg3);border-radius:var(--r-sm);padding:2px}
.ptab{padding:2px 9px;border-radius:3px;background:transparent;border:none;font-size:10px;color:var(--text3);cursor:pointer;font-family:'Inter',sans-serif;transition:all .1s}
.ptab.active{background:var(--bg4);color:var(--text0)}
.pomo-track{height:2px;background:var(--bg3);border-radius:1px;overflow:hidden;margin-bottom:10px}
.pomo-fill{height:100%;border-radius:1px;transition:width 1s linear}
.pomo-body{display:flex;align-items:flex-end;gap:14px}
.pomo-num{display:flex;flex-direction:column;gap:1px}
.pomo-num-val{font-size:20px;font-weight:500;font-family:'JetBrains Mono',monospace;color:var(--text0)}
.pomo-num-lbl{font-size:9px;color:var(--text4)}
.pomo-dots{display:flex;gap:3px;margin-left:auto;padding-bottom:3px}
.pdot{width:5px;height:5px;border-radius:50%;background:var(--bg5)}
.pdot.on{background:var(--accent)}
.pomo-start-btn{margin-top:10px;width:100%;padding:7px;border-radius:var(--r-md);background:var(--accent);border:none;color:#fff;font-size:11px;font-family:'Inter',sans-serif;cursor:pointer;transition:background .1s}
.pomo-start-btn:hover{background:var(--accentd)}

/* BLOCK REMINDER TOAST */
.block-toast{position:fixed;bottom:18px;right:18px;background:var(--bg2);border:1px solid var(--border3);border-radius:var(--r-lg);padding:12px 14px;max-width:260px;z-index:250;box-shadow:0 8px 32px #0009;animation:toastIn .2s ease;display:flex;flex-direction:column;gap:4px}
@keyframes toastIn{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.block-toast-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:3px}
.block-toast-row{display:flex;align-items:flex-start;gap:8px}
.block-toast-label{font-size:11px;font-weight:600;color:var(--text0)}
.block-toast-time{font-size:10px;color:var(--text3)}
.block-toast-close{align-self:flex-end;font-size:10px;color:var(--text3);background:transparent;border:none;cursor:pointer;font-family:'Inter',sans-serif;margin-top:2px}
.block-toast-close:hover{color:var(--text1)}

/* LIMIT TOAST */
.toast{position:fixed;bottom:18px;right:18px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-lg);padding:11px 15px;max-width:300px;z-index:200;box-shadow:0 8px 32px #0008;animation:toastIn .18s ease}
.toast-title{font-size:11px;font-weight:600;color:var(--amber);margin-bottom:2px}
.toast-msg{font-size:11px;color:var(--text2);line-height:1.5}

/* NOTIF */
.notif{position:fixed;top:46px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-lg);padding:7px 14px;font-size:11px;color:var(--text0);z-index:300;white-space:nowrap;box-shadow:0 8px 24px #0007;animation:notifIn .15s ease}
@keyframes notifIn{from{transform:translateX(-50%) translateY(-5px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}

/* ANALYTICS */
.analytics-wrap{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px;overflow-y:auto}
.an-card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px}
.an-title{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.bar-row{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.bar-lbl{font-size:10px;color:var(--text2);width:80px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .4s}
.bar-val{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3);width:36px;text-align:right}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;grid-column:1/-1}
.kpi{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px 14px}
.kpi-val{font-size:22px;font-weight:500;font-family:'JetBrains Mono',monospace;color:var(--text0);line-height:1.1}
.kpi-lbl{font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:.6px;margin-top:3px}

/* MODALS */
.overlay{position:fixed;inset:0;background:#00000099;z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg2);border:1px solid var(--border3);border-radius:var(--r-xl);display:flex;flex-direction:column;box-shadow:0 40px 80px #0009;overflow:hidden}
.modal-sm{width:360px;max-height:82vh}
.modal-md{width:440px;max-height:84vh}
.modal-lg{width:560px;max-height:90vh}
.modal-head{padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px}
.modal-title{font-size:13px;font-weight:600;color:var(--text0);line-height:1.2}
.modal-sub{font-size:10px;color:var(--text3);margin-top:2px}
.modal-x{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:15px;padding:0;line-height:1;flex-shrink:0;margin-top:1px}
.modal-x:hover{color:var(--text1)}
.modal-body{padding:14px 18px;overflow-y:auto;display:flex;flex-direction:column;gap:11px}
.modal-foot{padding:10px 18px;border-top:1px solid var(--border);display:flex;gap:6px;justify-content:flex-end}
.fg{display:flex;flex-direction:column;gap:3px}
.flabel{font-size:10px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.finput{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-md);padding:7px 10px;color:var(--text0);font-size:12px;font-family:'Inter',sans-serif;outline:none;transition:border-color .1s;width:100%}
.finput:focus{border-color:var(--accent-border)}
.ftextarea{resize:vertical;min-height:54px;line-height:1.5}
.fselect{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-md);padding:7px 10px;color:var(--text0);font-size:12px;font-family:'Inter',sans-serif;outline:none;cursor:pointer;width:100%}
.swatch-row{display:flex;gap:6px;flex-wrap:wrap}
.swatch{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s}
.swatch.on{border-color:var(--text0);transform:scale(1.2)}
.task-opt{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r-md);border:1px solid var(--border);cursor:pointer;transition:all .1s}
.task-opt:hover{border-color:var(--border2);background:var(--bg3)}
.task-opt.on{border-color:var(--accent-border);background:var(--accent-bg)}
.task-opt-name{font-size:12px;color:var(--text1);flex:1}
.pri{font-size:9px;padding:1px 5px;border-radius:20px}
.pri-high{background:var(--red-bg);color:var(--red)}
.pri-mid{background:var(--amber-bg);color:var(--amber)}
.pri-low{background:var(--green-bg);color:var(--green)}
.hist-entry{background:var(--bg3);border-radius:var(--r-lg);padding:10px 12px;margin-bottom:6px}
.hist-date{font-size:9px;color:var(--text4);font-family:'JetBrains Mono',monospace;margin-bottom:5px;display:flex;align-items:center;gap:8px}
.hist-dur{font-size:9px;color:var(--text3);margin-left:auto}
.hist-field{margin-bottom:4px}
.hist-field-lbl{font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px}
.hist-field-val{font-size:11px;color:var(--text2);line-height:1.45}
.btn{padding:6px 13px;border-radius:var(--r-md);border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:11px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .1s}
.btn:hover{background:var(--bg4);color:var(--text0)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accentd)}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text3)}
.btn-ghost:hover{color:var(--text1);background:var(--bg3)}
.btn-danger{border-color:var(--red-border);color:var(--red);background:transparent}
.btn-danger:hover{background:var(--red-bg)}
.empty{padding:18px 14px;text-align:center;color:var(--text4);font-size:11px;line-height:1.6}
.tz-panel{position:fixed;top:46px;right:14px;background:var(--bg2);border:1px solid var(--border3);border-radius:var(--r-lg);padding:12px 14px;z-index:150;width:240px;box-shadow:0 12px 40px #0008;animation:notifIn .15s ease}
.tz-panel-title{font-size:11px;font-weight:600;color:var(--text0);margin-bottom:8px}
.tz-panel p{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:8px}

/* sound picker row */
.sound-row{display:flex;align-items:center;gap:6px}
.sound-play{width:22px;height:22px;border-radius:var(--r-sm);background:var(--bg4);border:1px solid var(--border2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:all .1s}
.sound-play:hover{background:var(--bg5);color:var(--text0)}
/* toggle */
.toggle-row{display:flex;align-items:center;gap:8px}
.toggle-lbl{font-size:11px;color:var(--text2);flex:1}
.toggle{width:30px;height:16px;border-radius:8px;background:var(--bg4);border:1px solid var(--border2);position:relative;cursor:pointer;transition:background .15s;flex-shrink:0}
.toggle.on{background:var(--accent);border-color:var(--accent)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:#fff;transition:left .15s}
.toggle.on::after{left:16px}
.hint-row{font-size:10px;color:var(--text4);line-height:1.5;padding:6px 8px;background:var(--bg3);border-radius:var(--r-sm)}
/* HABITS */
.habit-tabs{display:flex;gap:4px;background:var(--bg1);border-radius:var(--r-md);padding:3px}
.habit-tab{flex:1;background:transparent;border:none;border-radius:5px;color:var(--text3);font-size:11px;padding:7px 0;cursor:pointer;font-family:'Inter',sans-serif;transition:all .12s}
.habit-tab.on{background:var(--accent-bg);color:var(--accent2)}
.rec-mode-row{display:flex;gap:5px}
.rec-mode-btn{flex:1;background:transparent;border:1px solid var(--border2);border-radius:var(--r-md);color:var(--text2);font-size:10.5px;padding:7px 0;cursor:pointer;font-family:'Inter',sans-serif;transition:all .12s}
.rec-mode-btn.on{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent2)}
.day-chip-row{display:flex;gap:5px}
.day-chip{width:26px;height:26px;border-radius:50%;border:1px solid var(--border2);color:var(--text3);font-size:10px;line-height:24px;text-align:center;cursor:pointer;transition:all .12s;flex-shrink:0}
.day-chip.on{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent2)}
.habit-row{display:flex;align-items:center;gap:10px;padding:8px 2px;cursor:pointer;border-radius:var(--r-sm);transition:background .1s}
.habit-row:hover{background:var(--bg3)}
.habit-add-btn{width:100%;margin-top:4px;background:transparent;border:1px dashed var(--border3);border-radius:var(--r-md);color:var(--text3);font-size:11px;padding:8px 0;font-family:'Inter',sans-serif;cursor:pointer;transition:all .12s}
.habit-add-btn:hover{color:var(--text1);border-color:var(--border4)}
/* TASKS TAB — layout tipo Notion: tarea · tag · botón */
.task-row{display:grid;grid-template-columns:1fr 18px 22px 18px 18px;align-items:center;gap:10px;padding:9px 4px;border-radius:var(--r-sm)}
.task-play-btn{width:22px;height:22px;border-radius:var(--r-sm);border:1px solid var(--accent-border);background:var(--accent-bg);color:var(--accent2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s;padding:0}
.task-play-btn:hover{background:var(--accent);color:#fff}
.task-play-btn.stop{border-color:var(--red-border,#e6675f3a);background:var(--red-bg,#e6675f14);color:var(--red,#e6675f)}
.task-play-btn.stop:hover{background:var(--red,#e6675f);color:#fff}
.task-row:hover{background:var(--bg3)}
.task-row:hover .rem-del{opacity:1}
.task-main{display:flex;flex-direction:column;justify-content:center;gap:3px;min-width:0;cursor:default}
.task-progress-track{height:3px;border-radius:2px;background:var(--border2);overflow:hidden;flex:1;max-width:220px}
.task-progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .2s}
.task-progress-row{display:flex;align-items:center;gap:6px}
.task-progress-lbl{font-size:9px;color:var(--text4);flex-shrink:0;font-family:'JetBrains Mono',monospace}
.sheet{border:1px solid var(--border2);border-radius:10px;overflow:hidden;background:var(--bg2,#141414)}
.sheet-row{display:grid;grid-template-columns:1fr 148px 138px;border-bottom:1px solid var(--border)}
.sheet-row:last-child{border-bottom:none}
.sheet-row.sheet-hdr{background:var(--bg3,#1b1b1b);border-bottom:1px solid var(--border3)}
.sheet-row.sheet-hdr .sheet-cell{font-size:9.5px;color:var(--text4);text-transform:uppercase;letter-spacing:.04em;font-weight:600;padding:8px 10px}
.sheet-row:not(.sheet-hdr):hover{background:var(--bg3,#1a1a1a)}
.sheet-row.fill-range{background:var(--accent-bg,#f256231a)}
.sheet-row.done .sheet-input-name{color:var(--text3);text-decoration:line-through}
.sheet-row.sheet-add-row{background:transparent;border-top:1px dashed var(--border3)}
.sheet-cell{padding:2px 4px;display:flex;align-items:center;border-right:1px solid var(--border);min-width:0}
.sheet-cell:last-child{border-right:none}
.sheet-cell-date{justify-content:flex-start}
.sheet-cell-status{justify-content:flex-end;gap:6px;padding-right:8px}
.sheet-input{background:transparent;border:1px solid transparent;border-radius:5px;padding:8px 8px;font-size:12.5px;color:var(--text0);font-family:'Inter',sans-serif;min-width:0;width:100%}
.sheet-input:hover{border-color:var(--border2)}
.sheet-input:focus{outline:none;border-color:var(--accent);background:var(--bg1,#0c0c0c)}
.sheet-input-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);color-scheme:dark;padding:7px 6px}
.sheet-date-cell{position:relative;display:inline-flex;width:100%}
.sheet-fill-handle{position:absolute;width:8px;height:8px;right:-1px;bottom:-1px;background:var(--accent);border:1.5px solid var(--bg2,#141414);border-radius:1.5px;cursor:ns-resize;z-index:2}
.sheet-fill-handle:hover{transform:scale(1.35)}
.sheet-fill-tooltip{position:fixed;background:var(--accent);color:#fff;font-size:11px;font-weight:600;padding:3px 8px;border-radius:5px;pointer-events:none;z-index:9999;font-family:'JetBrains Mono',monospace;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.steps-done-btn{font-size:10px;background:transparent;border:1px solid var(--border2);border-radius:6px;color:var(--text2);padding:6px 10px;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;transition:all .1s;flex-shrink:0}
.steps-done-btn:hover{border-color:var(--border4);color:var(--text0)}
.steps-done-btn.on{background:var(--green-bg,#3ab87a14);border-color:var(--green,#3ab87a);color:var(--green,#3ab87a)}
.view-tabs{display:flex;gap:2px;background:var(--bg3);border-radius:var(--r-sm);padding:2px;width:max-content;margin:0 20px 12px}
.vtab{padding:5px 13px;border-radius:5px;background:transparent;border:none;font-size:11px;color:var(--text3);cursor:pointer;font-family:'Inter',sans-serif;transition:all .1s}
.vtab.active{background:var(--bg4);color:var(--text0)}
.tl-note{font-size:10.5px;color:var(--text4);padding:0 2px 10px}
.tl-toolbar{display:flex;align-items:center;gap:8px;padding:0 2px 10px;flex-wrap:wrap}
.tl-hint{font-size:10.5px;color:var(--text3)}
.tl-scroll{overflow-x:auto;overflow-y:hidden;border:1px solid var(--border2);border-radius:10px;background:var(--bg2,#141414)}
.tl-canvas{position:relative}
.tl-days{position:relative;height:38px;border-bottom:1px solid var(--border3)}
.tl-day{position:absolute;top:0;height:38px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:1px solid var(--border);gap:1px;box-sizing:border-box}
.tl-day.today{background:var(--accent-bg)}
.tl-day-dow{font-size:8px;color:var(--text4);text-transform:uppercase;letter-spacing:.03em}
.tl-day-num{font-size:11px;color:var(--text2);font-family:'JetBrains Mono',monospace}
.tl-day.today .tl-day-num{color:var(--accent2);font-weight:700}
.tl-today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--red,#e6675f);opacity:.5;z-index:1}
.tl-pill{position:absolute;display:flex;align-items:center;gap:6px;background:var(--bg4);border:1px solid var(--border2);border-radius:7px;padding:5px 11px 5px 6px;cursor:grab;white-space:nowrap;z-index:2;max-width:280px;overflow:hidden;transition:border-color .1s,box-shadow .1s}
.tl-pill:hover{border-color:var(--border4)}
.tl-pill.selected{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent-border)}
.tl-pill.dragging{cursor:grabbing;box-shadow:0 6px 16px rgba(0,0,0,.45);z-index:5;border-color:var(--accent)}
.tl-pill.done{opacity:.5}
.tl-pill.done .tl-pill-label{text-decoration:line-through}
.tl-pill-check{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border3);background:transparent;color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;padding:0}
.tl-pill.done .tl-pill-check{background:var(--green,#3ab87a);border-color:var(--green,#3ab87a)}
.tl-pill-label{font-size:11.5px;color:var(--text0);overflow:hidden;text-overflow:ellipsis}
.rec-trigger-btn{display:flex;align-items:center;gap:6px;font-size:11px;padding:6px 11px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-family:'Inter',sans-serif;transition:all .12s}
.rec-trigger-btn:hover{border-color:var(--border4);color:var(--text0)}
.rec-trigger-btn.set{border-color:var(--accent);background:var(--accent-bg);color:var(--accent2)}
.task-rec-badge{display:inline-flex;align-items:center;gap:3px;font-size:9.5px;color:var(--text4);margin-top:2px}

/* Recurrence modal */
.rec-trigger{display:flex;align-items:center;gap:8px;width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:9px 11px;color:var(--text1);font-size:12.5px;cursor:pointer;font-family:'Inter',sans-serif;transition:border-color .1s}
.rec-trigger:hover{border-color:var(--border4)}
.rec-trigger span:first-of-type{flex:1;text-align:left}
.rec-clear{color:var(--text4);padding:2px 4px;border-radius:4px}
.rec-clear:hover{color:var(--text0);background:var(--bg4)}
.rec-body{display:flex;flex-direction:column;gap:14px}
.rec-type-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.rec-type-btn{padding:9px 10px;border-radius:8px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .1s;text-align:center}
.rec-type-btn:hover{border-color:var(--border4);color:var(--text0)}
.rec-type-btn.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent2)}
.rec-section{display:flex;flex-direction:column;gap:10px}
.rec-row{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text2)}
.rec-num{width:56px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:6px 8px;color:var(--text0);font-size:12.5px;font-family:'JetBrains Mono',monospace;text-align:center}
.rec-num:focus{outline:none;border-color:var(--accent)}
.rec-daychips{display:flex;gap:5px}
.rec-daychip{width:32px;height:32px;border-radius:8px;background:var(--bg3);border:1px solid var(--border2);color:var(--text3);font-size:11.5px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .1s}
.rec-daychip:hover{border-color:var(--border4);color:var(--text0)}
.rec-daychip.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.rec-presets{display:flex;gap:6px;flex-wrap:wrap}
.rec-preset-btn{padding:5px 10px;border-radius:6px;background:transparent;border:1px solid var(--border2);color:var(--text3);font-size:10.5px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .1s}
.rec-preset-btn:hover{border-color:var(--accent);color:var(--accent2)}
.rec-choice{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);cursor:pointer;font-size:12.5px;color:var(--text2);transition:all .1s}
.rec-choice:hover{border-color:var(--border4)}
.rec-choice.active{border-color:var(--accent);background:var(--accent-bg);color:var(--text0)}
.rec-choice .rec-num{margin:0 2px}
.rec-radio{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--border4);flex-shrink:0;position:relative}
.rec-choice.active .rec-radio{border-color:var(--accent)}
.rec-choice.active .rec-radio::after{content:'';position:absolute;inset:2.5px;border-radius:50%;background:var(--accent)}
.rec-divider{height:1px;background:var(--border);margin:-2px 0}
.rec-label-sm{font-size:10.5px;color:var(--text4);text-transform:uppercase;letter-spacing:.03em;margin-bottom:2px}
.rec-summary{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--text3);background:var(--bg3);border-radius:7px;padding:9px 11px}
.task-check{width:15px;height:15px;border-radius:4px;border:1px solid var(--border3);flex-shrink:0;cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center;justify-self:center}
.task-bell{width:18px;height:18px;display:flex;align-items:center;justify-content:center;justify-self:center;color:var(--text4);flex-shrink:0}
.task-bell.on{color:var(--red,#e6675f)}
.task-check:hover{border-color:var(--accent-border)}
.task-check.inprog{background:var(--accent-bg);border-color:var(--accent-border)}
.task-check.done{background:var(--green-bg,#3ab87a14);border-color:var(--green,#3ab87a)}
.task-name{flex:1;font-size:12.5px;color:var(--text0);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-mark-btn{font-size:9.5px;background:transparent;border:1px solid var(--border2);border-radius:6px;color:var(--text2);padding:5px 0;width:100%;cursor:pointer;font-family:'Inter',sans-serif;transition:all .1s;flex-shrink:0;text-align:center}
.task-mark-btn:hover{border-color:var(--border4);color:var(--text0)}
.task-mark-btn.on{background:var(--green-bg,#3ab87a14);border-color:var(--green,#3ab87a);color:var(--green,#3ab87a)}
.task-add-row{display:flex;align-items:center;gap:6px;margin-top:10px;background:transparent;border:1px dashed var(--border3);border-radius:var(--r-md);padding:2px 6px 2px 12px;transition:all .12s}
.task-add-row:focus-within{border-color:var(--border4)}
.task-add-row .finput{flex:1;background:transparent;border:none;padding:8px 0;font-size:11px;color:var(--text2)}
.task-add-row .finput:focus{border-color:transparent}
.task-add-submit{background:transparent;border:none;color:var(--text3);font-size:15px;line-height:1;width:26px;height:26px;flex-shrink:0;cursor:pointer;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;transition:all .12s}
.task-add-submit:hover{color:var(--accent2);background:var(--accent-bg)}
.panel-sec-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;padding:4px 4px 8px;display:flex;align-items:center;gap:5px}
.panel-sec-count{font-weight:400;color:var(--text4);text-transform:none;letter-spacing:0}
.panel-divider{height:1px;background:var(--border);margin:16px 0 14px}
/* MODAL TABS — línea inferior minimalista */
.modal-tabs{display:flex;gap:22px;border-bottom:1px solid var(--border);padding:0 2px}
.modal-tab{background:transparent;border:none;color:var(--text3);font-size:12.5px;font-family:'Inter',sans-serif;padding:8px 1px 10px;cursor:pointer;position:relative;transition:color .12s}
.modal-tab:hover{color:var(--text1)}
.modal-tab.on{color:var(--accent2)}
.modal-tab.on::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:2px;border-radius:2px;background:var(--accent)}
/* MODAL HEADER — avatar de proyecto */
.modal-avatar{width:34px;height:34px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.modal-avatar::before{content:'';position:absolute;inset:0;background:var(--proj-color,#888);opacity:.16;border-radius:inherit}
/* COMPLETADAS — dentro de Historial */
.done-task-row{display:flex;align-items:center;gap:9px;padding:6px 4px;border-radius:var(--r-sm)}
.done-task-row:hover{background:var(--bg3)}
.done-task-row:hover .rem-del{opacity:1}
.done-task-name{flex:1;font-size:12px;color:var(--text3);text-decoration:line-through;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.done-task-reopen{font-size:9px;background:transparent;border:1px solid var(--border2);border-radius:5px;color:var(--text3);padding:3px 8px;cursor:pointer;font-family:'Inter',sans-serif;opacity:0;transition:all .1s;flex-shrink:0}
.done-task-row:hover .done-task-reopen{opacity:1}
.done-task-reopen:hover{border-color:var(--border4);color:var(--text1)}
/* HABITS WEEKLY GRID */
.habit-grid-hdr{display:grid;grid-template-columns:1fr repeat(7,22px) 52px;gap:5px;align-items:center;padding:0 2px 6px}
.habit-grid-daylbl{text-align:center;font-size:8.5px;color:var(--text4);font-weight:600}
.habit-grid-daylbl.today{color:var(--accent2)}
.habit-grid-row{display:grid;grid-template-columns:1fr repeat(7,22px) 52px;gap:5px;align-items:center;padding:5px 2px}
.habit-grid-name{font-size:11.5px;color:var(--text0);cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.habit-grid-name:hover{color:var(--accent2)}
.habit-grid-cell{width:22px;height:22px;border-radius:4px;background:var(--bg1);border:1px solid var(--border2);cursor:pointer;transition:all .12s;margin:0 auto}
.habit-grid-cell:hover{border-color:var(--border4)}
.habit-grid-cell.today{border-style:dashed}
.habit-mark-btn{font-size:9px;background:transparent;border:1px solid var(--border2);border-radius:5px;color:var(--text3);padding:4px 0;cursor:pointer;font-family:'Inter',sans-serif;transition:all .1s}
.habit-mark-btn:hover{border-color:var(--border4);color:var(--text1)}

/* ═══════════════════════════════════════════
   PROJECT DASHBOARD — Chronos 2.0
   ═══════════════════════════════════════════ */
.dashboard-view{grid-column:1/-1;grid-row:2;overflow-y:auto;background:var(--bg0);display:flex;flex-direction:column}
.dashboard-view::-webkit-scrollbar{width:6px}
.dashboard-view::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
.dash-header{padding:20px 26px 0;flex-shrink:0}
.dash-back{background:transparent;border:none;color:var(--text3);font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:5px;padding:0 0 12px;transition:color .1s}
.dash-back:hover{color:var(--text1)}
.dash-head-row{display:flex;align-items:flex-start;gap:14px}
.dash-avatar{width:40px;height:40px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.dash-avatar::before{content:'';position:absolute;inset:0;background:var(--proj-color,#888);opacity:.16;border-radius:inherit}
.dash-title-block{flex:1;min-width:0}
.dash-title-row{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.dash-title{font-size:20px;font-weight:600;color:var(--text0);letter-spacing:-.2px}
.dash-cat-pill{font-size:10px;color:var(--text3);border:1px solid var(--border2);border-radius:20px;padding:2px 9px}
.dash-status-pill{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;border-radius:20px;padding:2px 9px}
.dash-status-pill.active{color:var(--green);background:var(--green-bg);border:1px solid var(--green-border)}
.dash-status-pill.archived{color:var(--text3);background:var(--bg3);border:1px solid var(--border2)}
.dash-desc{font-size:12px;color:var(--text2);margin-top:4px;max-width:640px;line-height:1.5}
.dash-meta-row{display:flex;gap:18px;margin-top:8px;flex-wrap:wrap}
.dash-meta-item{font-size:10.5px;color:var(--text3)}
.dash-meta-item b{color:var(--text1);font-weight:500}
.dash-head-actions{display:flex;gap:8px;flex-shrink:0;margin-top:2px;align-items:center}
.dash-date-nav{display:flex;align-items:center;gap:2px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-md);padding:3px 4px;margin-right:2px}

function setUISoundCfg(cfg){ _uiSoundCfg = cfg; }

function _uiTone(ctx, now, type, freq, vol, dur){
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.connect(g); g.connect(ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, now);
  g.gain.setValueAtTime(vol, now);
  g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
  osc.start(now); osc.stop(now + dur);

function playUI(kind){ // kind: 'hover' | 'click'
  if(!_uiSoundCfg.uiEnabled) return;
  const key = kind === 'hover' ? _uiSoundCfg.hoverSound : _uiSoundCfg.clickSound;
  if(!key || key === 'none') return;
  const ctx = getAudioCtx();
  if(!ctx) return;

      // High-pitch sine blip with quick decay
      const f = kind==='hover' ? 1600 : 1200;

      const g = ctx.createGain();

      g.gain.setValueAtTime(vol*(kind==='hover'?0.3:0.75), now);

      const d = buf.getChannelData(0);

      const src=ctx.createBufferSource(), filt=ctx.createBiquadFilter(), g=ctx.createGain();
      src.buffer=buf; filt.type='highpass'; filt.frequency.value=kind==='hover'?5000:4200;
      src.connect(filt); filt.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(vol*(kind==='hover'?0.5:0.9), now);
      src.start(now);
      // soft sub-click underneath
      _uiTone(ctx, now, 'sine', kind==='hover'?800:600, vol*0.15, 0.015);

    } else if(key === 'drop'){
      // Water drop — fast pitch-drop sine
      const osc=ctx.createOscillator(), g=ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.type='sine';
      const f0=kind==='hover'?1400:1100, f1=kind==='hover'?600:400;
      const dur=kind==='hover'?0.09:0.14;
      osc.frequency.setValueAtTime(f0, now);
      osc.frequency.exponentialRampToValueAtTime(f1, now+dur);
      g.gain.setValueAtTime(vol*(kind==='hover'?0.35:0.75), now);
      g.gain.exponentialRampToValueAtTime(0.0001, now+dur);
      osc.start(now); osc.stop(now+dur);

    } else if(key === 'pop'){
      // Bubble pop — very short sine with hard attack
      const osc=ctx.createOscillator(), g=ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.type='sine';
      const f=kind==='hover'?320:220;
      osc.frequency.setValueAtTime(f*2.5, now);
      osc.frequency.exponentialRampToValueAtTime(f, now+0.025);
      g.gain.setValueAtTime(vol*(kind==='hover'?0.4:0.85), now);
      g.gain.exponentialRampToValueAtTime(0.0001, now+0.055);
      osc.start(now); osc.stop(now+0.06);
      // noise burst on click
      if(kind==='click'){
        const len=ctx.sampleRate*0.012, buf=ctx.createBuffer(1,len,ctx.sampleRate);
        const d=buf.getChannelData(0);
        for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
        const src2=ctx.createBufferSource(), g2=ctx.createGain();
        src2.buffer=buf; src2.connect(g2); g2.connect(ctx.destination);
        g2.gain.setValueAtTime(vol*0.3, now); src2.start(now);
      }

    } else if(key === 'metal'){
      // Metallic ping — triangle wave + detuned overtone
      const dur=kind==='hover'?0.08:0.18;
      const f=kind==='hover'?2200:1800;
      _uiTone(ctx, now, 'triangle', f, vol*(kind==='hover'?0.3:0.7), dur);
      _uiTone(ctx, now+0.004, 'triangle', f*1.34, vol*(kind==='hover'?0.12:0.3), dur*0.7);
      // short noise transient attack
      const len=ctx.sampleRate*0.008, buf=ctx.createBuffer(1,len,ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
      const src=ctx.createBufferSource(), filt=ctx.createBiquadFilter(), g=ctx.createGain();
      src.buffer=buf; filt.type='bandpass'; filt.frequency.value=3500; filt.Q.value=2;
      src.connect(filt); filt.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(vol*(kind==='hover'?0.2:0.5), now); src.start(now);

    } else if(key === 'thump'){
      // Deep thump — low sine with fast decay + body noise
      const osc=ctx.createOscillator(), g=ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.type='sine';
      const f=kind==='hover'?90:65;
      osc.frequency.setValueAtTime(f*3, now);
      osc.frequency.exponentialRampToValueAtTime(f, now+0.04);
      g.gain.setValueAtTime(vol*(kind==='hover'?0.45:0.9), now);
      g.gain.exponentialRampToValueAtTime(0.0001, now+(kind==='hover'?0.07:0.12));
      osc.start(now); osc.stop(now+0.15);
      // body noise
      const len=ctx.sampleRate*0.05, buf=ctx.createBuffer(1,len,ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length)**1.5;
      const src=ctx.createBufferSource(), filt=ctx.createBiquadFilter(), g2=ctx.createGain();
      src.buffer=buf; filt.type='lowpass'; filt.frequency.value=200;
      src.connect(filt); filt.connect(g2); g2.connect(ctx.destination);
      g2.gain.setValueAtTime(vol*(kind==='hover'?0.2:0.5), now);
      g2.gain.exponentialRampToValueAtTime(0.0001, now+0.05); src.start(now);
    }

let _audioCtx=null;
function getAudioCtx(){
  if(!_audioCtx||_audioCtx.state==='closed'){
    try{_audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}
  }
  return _audioCtx;
}
function playSound(key,vol){
  vol=vol!=null?vol:0.5;
  const ctx=getAudioCtx();
  if(!ctx)return;
  const resume=ctx.state==='suspended'?ctx.resume():Promise.resolve();
  resume.then(()=>{
    const s=SOUNDS[key]||SOUNDS.chime;
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type=s.type||'sine';
    osc.frequency.setValueAtTime(s.freq,ctx.currentTime);
    gain.gain.setValueAtTime(Math.min(1,Math.max(0.01,vol)),ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+s.dur);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime+s.dur);
    if(key==='chime'||key==='bell'){
      const osc2=ctx.createOscillator();
      const gain2=ctx.createGain();
      osc2.connect(gain2);
      gain2.connect(ctx.destination);
      osc2.type='sine';
      osc2.frequency.setValueAtTime(s.freq*1.5,ctx.currentTime+0.08);
      gain2.gain.setValueAtTime(Math.min(1,Math.max(0.01,vol*0.6)),ctx.currentTime+0.08);
      gain2.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+s.dur*0.8);
      osc2.start(ctx.currentTime+0.08);
      osc2.stop(ctx.currentTime+s.dur);
    }
  }).catch(()=>{});
}

// ── SUPABASE SYNC ENGINE ──
// Table: chronos(user_id text PK, data jsonb, updated_at timestamptz)
// Zero OAuth — paste URL + anon key once, syncs forever automatically.
const SB = {
  K_URL: 'sb_url', K_ANON: 'sb_anon', K_UID: 'sb_uid',
  _load(k){ try{ return localStorage.getItem(k)||''; }catch{ return ''; } },
  _save(k,v){ try{ localStorage.setItem(k,v); }catch{} },

  get url(){ return this._load(this.K_URL); },
  get anon(){ return this._load(this.K_ANON); },
  get uid(){ return this._load(this.K_UID); },
  configured(){ return !!(this.url && this.anon && this.uid); },

  init(){
    return this.configured();
  },

  configure(url, anon){
    const cleanUrl = url.replace(/\/+$/,'');
    const uid = anon.slice(-16); // stable uid from anon key
    this._save(this.K_URL, cleanUrl);
    this._save(this.K_ANON, anon);
    this._save(this.K_UID, uid);
  },

  async push(data){
    if(!this.configured()) return;
    const resp = await fetch(`${this.url}/rest/v1/chronos`, {
      method: 'POST',
      headers: {
        'apikey': this.anon,
        'Authorization': 'Bearer '+this.anon,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates',
      },
      body: JSON.stringify({ user_id: this.uid, data, updated_at: new Date().toISOString() }),
    });
    if(!resp.ok) throw new Error(await resp.text());
  },

  async pull(){
    if(!this.configured()) return null;
    const resp = await fetch(`${this.url}/rest/v1/chronos?user_id=eq.${this.uid}&select=data`, {
      headers: { 'apikey': this.anon, 'Authorization': 'Bearer '+this.anon },
    });
    if(!resp.ok) throw new Error(await resp.text());
    const rows = await resp.json();
    return rows.length > 0 ? rows[0].data : null;
  },

  disconnect(){
    [this.K_URL, this.K_ANON, this.K_UID].forEach(k=>this._save(k,''));
  },

  // ── DIRTY/SYNCED TRACKING ──
  // Guarda cuándo hubo un cambio local pendiente de subir (markDirty) y cuándo
  // se confirmó que ese cambio llegó a Supabase (markSynced). Esto evita que,
  // al recargar la página antes de que termine el push de 3s (o el de
  // beforeunload), el pull inicial reemplace el estado local recién guardado
  // en localStorage con datos remotos más viejos — la causa de que hábitos
  // (u otros datos) marcados justo antes de recargar "desaparezcan".
  K_DIRTY: 'chr4_dirty_at', K_SYNCED: 'chr4_synced_at',
  markDirty(){ this._save(this.K_DIRTY, String(Date.now())); },
  markSynced(){ this._save(this.K_SYNCED, String(Date.now())); },
  isDirty(){
    const d=Number(this._load(this.K_DIRTY)||0);
    const s=Number(this._load(this.K_SYNCED)||0);
    return d>s;
  },
};
