// ═══════════════════════════════════════════
// SPARKLINE — tiny data-driven line chart
// ═══════════════════════════════════════════
function Sparkline({points,width=90,height:h=26,color='var(--accent2)'}){
  if(!points||points.length<2)return e('svg',{width,height:h});
  const max=Math.max(1,...points);
  const step=width/(points.length-1);
  const d=points.map((v,i)=>`${i===0?'M':'L'}${(i*step).toFixed(1)},${(h-2-(v/max)*(h-4)).toFixed(1)}`).join(' ');
  return e('svg',{width,height:h,viewBox:`0 0 ${width} ${h}`,style:{display:'block'}},
    e('path',{d,fill:'none',stroke:color,strokeWidth:1.6,strokeLinecap:'round',strokeLinejoin:'round'})
  );
}

// ═══════════════════════════════════════════
// HORIZONTAL TIMELINE — "Bloques de tiempo" bar, Dashboard style
// ═══════════════════════════════════════════
function minToHM(m){m=((m%1440)+1440)%1440;return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(Math.round(m%60)).padStart(2,'0')}`;}
function HorizontalTimeline({realBlocks,liveBlock,projects,tasks,selectedDay,setSelectedDay}){
  const wrapRef=useRef(null);
  const[containerW,setContainerW]=useState(800);

  useEffect(()=>{
    if(!wrapRef.current)return;
    const el=wrapRef.current;
    const ro=new ResizeObserver(entries=>{
      for(const en of entries){const w=en.contentRect.width;if(w>0)setContainerW(w);}
    });
    ro.observe(el);
    setContainerW(el.clientWidth||800);
    return()=>ro.disconnect();
  },[]);

  function shiftDay(delta){
    const d=new Date(selectedDay+'T12:00:00Z');
    d.setUTCDate(d.getUTCDate()+delta);
    setSelectedDay(d.toISOString().slice(0,10));
  }
  function dayLabel(){
    const today=dayKey();
    if(selectedDay===today)return'Hoy, '+new Date(selectedDay+'T12:00:00Z').toLocaleDateString('es-CL',{weekday:'short',day:'numeric',month:'short'});
    return new Date(selectedDay+'T12:00:00Z').toLocaleDateString('es-CL',{weekday:'short',day:'numeric',month:'short'});
  }
  function tsToMin(ts){const d=new Date(ts*1000);const scl=new Date(d.toLocaleString('en-US',{timeZone:'America/Santiago'}));return scl.getHours()*60+scl.getMinutes();}

  const isToday=selectedDay===dayKey();
  const nowM=sclToMin();
  const allReal=[...(realBlocks||[]),...(liveBlock?[liveBlock]:[])].filter(s=>s.day===selectedDay||!s.day);

  let minM=6*60,maxM=22*60;
  allReal.forEach(sess=>{
    const sMin=tsToMin(sess.startAt);
    const eMin=sess.live?nowM:tsToMin(sess.endAt);
    if(eMin<=sMin)return;
    minM=Math.min(minM,Math.floor(sMin/60)*60);
    maxM=Math.max(maxM,Math.ceil(eMin/60)*60);
  });
  if(isToday){minM=Math.min(minM,Math.floor(nowM/60)*60);maxM=Math.max(maxM,Math.ceil(nowM/60)*60+120);}
  maxM=Math.min(maxM,1440);
  const totalM=Math.max(60,maxM-minM);

  // Responsive scale: stretch to fill the available width; below a minimum
  // px-per-minute, switch to a wider scrollable track instead of squishing text.
  const MIN_PXPM=2.4;
  const fitPxPm=(containerW-4)/totalM;
  const pxpm=Math.max(MIN_PXPM,fitPxPm);
  const trackW=Math.max(containerW-4,totalM*pxpm);
  const needsScroll=pxpm>fitPxPm+0.001;

  const tickStep=pxpm<3.4?120:60;
  const ticks=[];for(let m=minM;m<=maxM;m+=tickStep)ticks.push(m);

  function leftPx(m){return Math.min(trackW,Math.max(0,(m-minM)*pxpm));}
  function widthPx(s,f){return Math.max(46,(f-s)*pxpm);}

  const blocksData=allReal.map(sess=>{
    const proj=projects.find(p=>p.id===sess.projectId);
    const task=tasks.find(t=>t.id===sess.taskId);
    const sMin=tsToMin(sess.startAt);
    const eMin=sess.live?nowM:tsToMin(sess.endAt);
    return{id:sess.id||sess.startAt,color:proj?.color||'var(--accent)',name:task?task.name:(proj?proj.name:'Sesión'),sMin,eMin};
  }).filter(b=>b.eMin>b.sMin).sort((a,b)=>a.sMin-b.sMin);

  return e('div',{className:'htl',ref:wrapRef},
    e('div',{className:'htl-header'},
      e('span',{className:'dash-panel-title'},'Bloques de tiempo'),
      e('div',{className:'htl-day-select'},
        e('button',{className:'dash-date-btn',onClick:()=>shiftDay(-1),title:'Día anterior'},e(DashIcon,{name:'chevL',size:11})),
        e('span',{style:{cursor:'pointer'},onClick:()=>setSelectedDay(dayKey())},dayLabel()),
        e('button',{className:'dash-date-btn',onClick:()=>shiftDay(1),title:'Día siguiente'},e(DashIcon,{name:'chevR',size:11}))
      )
    ),
    e('div',{className:'htl-scroll'+(needsScroll?' scrollable':'')},
      e('div',{className:'htl-track-wrap',style:{width:trackW+'px'}},
        e('div',{className:'htl-ruler'},ticks.map(m=>e('div',{key:m,className:'htl-tick',style:{left:leftPx(m)+'px'}},e('span',{className:'htl-tick-lbl'},minToHM(m))))),
        isToday&&nowM>=minM&&nowM<=maxM&&e('div',{className:'htl-now-pin',style:{left:leftPx(nowM)+'px'}},minToHM(nowM)),
        isToday&&nowM>=minM&&nowM<=maxM&&e('div',{className:'htl-now-line',style:{left:leftPx(nowM)+'px'}}),
        e('div',{className:'htl-lane'},
          blocksData.length===0&&e('div',{className:'empty',style:{padding:'20px 0'}},'Sin sesiones registradas este día.'),
          blocksData.map(b=>e('div',{key:b.id,className:'htl-block',style:{left:leftPx(b.sMin)+'px',width:widthPx(b.sMin,b.eMin)+'px',background:b.color+'26',borderColor:b.color}},
            e('div',{className:'htl-block-name'},b.name),
            e('div',{className:'htl-block-time'},minToHM(b.sMin)+' - '+minToHM(b.eMin)),
            e('div',{className:'htl-block-dur'},fmtS((b.eMin-b.sMin)*60))
          ))
        )
      )
    )
  );
}

function SystemCard({system,onEdit,onUpdateSystem,fmtWhen}){
  const isDue=!!(system.nextRun&&system.nextRun<=Date.now());
  const color=system.color||'#4a9de0';
  const iconKey=system.icon||'target';
  function markMonitored(ev){
    ev.stopPropagation();
    const nextRun=system.recurrence?new Date(computeNextOccurrence(dayKey(),system.recurrence)+'T12:00:00').getTime():null;
    onUpdateSystem({...system,lastRun:Date.now(),nextRun});
  }
  return e('div',{className:'system-card',style:{cursor:'pointer'},onDoubleClick:onEdit,title:'Doble click para editar'},
    e('div',{className:'system-card-top'},
      e('div',{className:'system-icon-badge',style:{color,background:color+'1f'}},e(ProjIconSVG,{iconKey,size:14,color:'currentColor'})),
      e('div',{style:{flex:1,minWidth:0}},
        e('div',{className:'system-card-name'},system.name),
        e('div',{className:'system-meta',style:{marginTop:1}},'Próximo monitoreo: ',e('b',null,fmtWhen(system.nextRun)))
      ),
      isDue&&e('button',{className:'ghost-btn',onClick:markMonitored,title:'Marcar como monitoreado — toca para actualizar la próxima fecha'},e(BellIcon,{active:true,size:14}))
    )
  );
}

// ═══════════════════════════════════════════
// PROJECT DASHBOARD — Chronos 2.0
// ═══════════════════════════════════════════
function ProjectDashboard(props){
  const{
    project,projects,tasks,sessions,ctxs,habits,systems,
    panelLabels,onRenameLabel,panelVisibility,onTogglePanelVisibility,
    panelSortModes,onChangeSortMode,
    blocks,setBlocks,realBlocks,liveBlock,tick,blockOpacity,blockStyle,realStyle,tlZoom,setTlZoom,selectedDay,setSelectedDay,onDblClickTime,onEditBlock,onNewBlock,
    tState,activeSess,
    onAddTask,onCycleTaskStatus,onDeleteTask,onUpdateTask,onUpdateTaskSteps,onPlayTask,onFinishTask,
    onAddHabit,onUpdateHabit,onDeleteHabit,onToggleHabitLog,
    onAddSystem,onUpdateSystem,onDeleteSystem,onPatchProject,
    onStartTimer,onEditProject,onBack,
    fmtWhen,pStats
  }=props;

  const[tab,setTab]=useState('resumen');
  const[systemForm,setSystemForm]=useState(null); // null | 'new' | system object
  const[habitForm,setHabitForm]=useState(null);
  const[showTaskModal,setShowTaskModal]=useState(false);
  const[stepsForTask,setStepsForTask]=useState(null);

  const DEFAULT_LABELS={tareas:'Tareas prioritarias',sistemas:'Sistemas',habitos:'Hábitos'};
  const labels={...DEFAULT_LABELS,...(panelLabels||{})};
  const visible={tareas:true,sistemas:true,habitos:true,...(panelVisibility||{})};
  const sortModes={tareas:'proximity',sistemas:'proximity',habitos:'proximity',...(panelSortModes||{})};
  function renameLabel(key,val){onRenameLabel(key,val);}
  function setSortMode(key,mode){onChangeSortMode(key,mode);}
  function openAddTask(){setShowTaskModal(true);}
  function singularizeLabel(label){
    const first=(label||'').trim().split(/\s+/)[0]||'tarea';
    return (first.length>3&&/s$/i.test(first))?first.slice(0,-1).toLowerCase():first.toLowerCase();
  }
  const taskNoun=singularizeLabel(labels.tareas); // e.g. "tarea", or "proyecto" if the panel was renamed
  const statCfg=project.statConfig||{};
  function setStatCustom(key,icon,color){onPatchProject({statConfig:{...(project.statConfig||{}),[key]:{icon,color}}});}
  function resetStatCustom(key){const next={...(project.statConfig||{})};delete next[key];onPatchProject({statConfig:next});}

  const pTasks=tasks.filter(t=>t.projectId===project.id);
  const pendingTasks=applySortMode(pTasks.filter(t=>t.status!=='done'),sortModes.tareas,{
    getDueTs:taskDueTs,getCreatedTs:t=>t.createdAt,getName:t=>t.name,getDone:t=>t.status==='done'
  });
  const pSystems=applySortMode(systems.filter(s=>s.projectId===project.id),sortModes.sistemas,{
    getDueTs:systemDueTs,getCreatedTs:s=>s.createdAt,getName:s=>s.name,getDone:s=>!(s.nextRun&&s.nextRun<=Date.now())
  });
  const pHabits=applySortMode(habits.filter(h=>h.projectId===project.id),sortModes.habitos,{
    getDueTs:nextHabitDueTs,getCreatedTs:h=>h.createdAt,getName:h=>h.name,getDone:h=>(h.log||[]).includes(selectedDay)
  });
  const pSessions=sessions.filter(s=>s.projectId===project.id&&s.endAt).sort((a,b)=>b.endAt-a.endAt);
  const pCtxs=ctxs.filter(c=>c.projectId===project.id).sort((a,b)=>b.createdAt-a.createdAt);
  const stats=pStats(project);
  const totalSecs=pSessions.reduce((a,s)=>a+s.duration,0);
  const lastActivity=pSessions[0]?pSessions[0].endAt*1000:null;
  const isRunningHere=(tState==='running'||tState==='paused')&&activeSess&&activeSess.projectId===project.id;
  const week=currentWeekDays();
  const today=dayKey();
  const todayPomos=pSessions.filter(s=>s.day===today).reduce((a,s)=>a+(s.pomos||0),0);

  const todaySessions=pSessions.filter(s=>s.day===today);
  const sparkBuckets=new Array(8).fill(0);
  todaySessions.forEach(s=>{const hr=new Date(s.endAt*1000).getHours();sparkBuckets[Math.min(7,Math.floor(hr/3))]+=s.duration;});
  const weekSecs=pSessions.filter(s=>(Date.now()-s.endAt*1000)<7*86400000).reduce((a,s)=>a+s.duration,0);
  const dailyGoal=(project.dailyLimit||8*3600);
  const focusPct=Math.min(100,Math.round(stats.todaySecs/dailyGoal*100));

  function shiftDay(delta){
    const d=dateFromDayKey(selectedDay);
    d.setUTCDate(d.getUTCDate()+delta);
    setSelectedDay(`${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`);
  }
  function exportCSV(){
    const rows=[['Fecha','Duración (s)','Duración','Tarea']];
    pSessions.forEach(s=>{
      const t=tasks.find(x=>x.id===s.taskId);
      rows.push([new Date(s.endAt*1000).toLocaleDateString('es-CL'),s.duration,fmtS(s.duration),t?t.name:'']);
    });
    const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`${project.name.replace(/\s+/g,'_')}_sesiones.csv`;a.click();
    URL.revokeObjectURL(url);
  }
  const dayLabelStr=dateFromDayKey(selectedDay).toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'});
  function habitStreak(h){
    let count=0,d=dateFromDayKey(today);
    for(let i=0;i<365;i++){
      const k=`${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
      if((h.log||[]).includes(k)){count++;d=new Date(d.getTime()-86400000);}else break;
    }
    return count;
  }
  function lastNDays(n){
    const out=[];
    for(let i=n-1;i>=0;i--){
      const d=new Date(dateFromDayKey(today).getTime()-i*86400000);
      out.push(`${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`);
    }
    return out;
  }
  const last5=lastNDays(5);

  const TABS=[
    {k:'resumen',label:'Resumen'},
    {k:'tareas',label:'Tareas'},
    {k:'sistemas',label:'Sistemas'},
    {k:'habitos',label:'Hábitos'},
    {k:'tiempo',label:'Tiempo'},
    {k:'ajustes',label:'Ajustes'},
  ];

  return e('div',{className:'dashboard-view'},
    e('div',{className:'dash-header'},
      e('button',{className:'dash-back',onClick:onBack},'← Volver a Workspace'),
      e('div',{className:'dash-head-row'},
        e('div',{className:'dash-avatar',style:{'--proj-color':project.color}},e(ProjIconSVG,{iconKey:project.icon||DEFAULT_ICON,size:18,color:project.color})),
        e('div',{className:'dash-title-block'},
          e('div',{className:'dash-title-row'},
            e('span',{className:'dash-title'},project.name),
            project.client&&e('span',{className:'dash-cat-pill'},project.client),
            e('span',{className:'dash-status-pill '+(project.status==='archived'?'archived':'active')},project.status==='archived'?'Archivado':'Activo')
          ),
          project.description&&e('div',{className:'dash-desc'},project.description),
          e('div',{className:'dash-meta-row'},
            e('span',{className:'dash-meta-item'},'Tiempo total: ',e('b',null,fmtS(totalSecs))),
            e('span',{className:'dash-meta-item'},'Última actividad: ',e('b',null,lastActivity?fmtWhen(lastActivity):'—'))
          )
        ),
        e('div',{className:'dash-head-actions'},
          e('div',{className:'dash-date-nav'},
            e('button',{className:'dash-date-btn',onClick:()=>shiftDay(-1),title:'Día anterior'},e(DashIcon,{name:'chevL',size:12})),
            e('span',{className:'dash-date-lbl',onClick:()=>setSelectedDay(dayKey()),title:'Ir a hoy'},dayLabelStr),
            e('button',{className:'dash-date-btn',onClick:()=>shiftDay(1),title:'Día siguiente'},e(DashIcon,{name:'chevR',size:12}))
          ),
          e('button',{className:'btn',style:{display:'inline-flex',alignItems:'center',gap:5},onClick:exportCSV},e(DashIcon,{name:'download',size:12}),'Exportar'),
          e('button',{className:'btn',onClick:openAddTask},'+ Añadir '+taskNoun),
          e('button',{className:'btn btn-primary',onClick:onStartTimer},isRunningHere?'■ En curso':'▶ Iniciar timer')
        )
      ),
      e('div',{className:'dash-tabs'},TABS.map(t=>e('button',{key:t.k,className:'dash-tab'+(tab===t.k?' on':''),onClick:()=>setTab(t.k)},t.label)))
    ),

    tab==='resumen'&&e(React.Fragment,null,
    e('div',{className:'foco-widget'},
      e(DonutRing,{pct:focusPct,size:56,stroke:6,color:project.color}),
      e('div',null,
        e('div',{className:'foco-widget-title'},'Foco total'),
        e('div',{className:'foco-widget-sub'},todaySessions.length,' sesiones hoy'),
        e('div',{className:'foco-widget-sub'},fmtS(stats.todaySecs),' enfocado')
      )
    ),
    e('div',{className:'dash-body'},
      e('div',{className:'dash-stats-row'},
        e(StatCard,{icon:'clock',color:'#e0954a',label:'Tiempo hoy',value:fmtS(stats.todaySecs),sub:'de '+fmtS(dailyGoal)+' objetivo',sparkline:sparkBuckets,custom:statCfg.tiempo,onChangeCustom:(icon,color)=>setStatCustom('tiempo',icon,color),onResetCustom:statCfg.tiempo?()=>resetStatCustom('tiempo'):null}),
        e(StatCard,{icon:isRunningHere?'pause':'play',color:'#4a9de0',label:'Sesión actual',value:isRunningHere?fmt(stats.todaySecs%86400):'—',sub:isRunningHere?(activeSess&&(tasks.find(t=>t.id===activeSess.taskId)||{}).name||'Sin tarea'):'Sin sesión activa',custom:statCfg.sesion,onChangeCustom:(icon,color)=>setStatCustom('sesion',icon,color),onResetCustom:statCfg.sesion?()=>resetStatCustom('sesion'):null}),
        e(StatCard,{icon:'check',color:'#2fb87a',label:'Tareas',value:pendingTasks.length,sub:pendingTasks.length?'pendientes':'Sin pendientes',custom:statCfg.tareas,onChangeCustom:(icon,color)=>setStatCustom('tareas',icon,color),onResetCustom:statCfg.tareas?()=>resetStatCustom('tareas'):null}),
        e(StatCard,{icon:'habit',color:'#2fb87a',label:'Hábitos',value:`${pHabits.filter(h=>(h.log||[]).includes(selectedDay)).length} / ${pHabits.length||0}`,sub:pHabits.length?Math.round(pHabits.filter(h=>(h.log||[]).includes(selectedDay)).length/pHabits.length*100)+'% completados':'Sin hábitos',progress:{value:pHabits.filter(h=>(h.log||[]).includes(selectedDay)).length,max:pHabits.length||1},custom:statCfg.habitos,onChangeCustom:(icon,color)=>setStatCustom('habitos',icon,color),onResetCustom:statCfg.habitos?()=>resetStatCustom('habitos'):null}),
        e(StatCard,{icon:'target',color:'#b06ef5',label:'Sistemas',value:pSystems.filter(s=>s.status!=='paused').length,sub:pSystems.length+' en total',custom:statCfg.sistemas,onChangeCustom:(icon,color)=>setStatCustom('sistemas',icon,color),onResetCustom:statCfg.sistemas?()=>resetStatCustom('sistemas'):null})
      ),
      e('div',{className:'dash-cols'},
        e('div',{className:'dash-panel'},
          e('div',{className:'dash-panel-hdr'},
            e(EditableLabel,{value:labels.tareas,onSave:v=>renameLabel('tareas',v)}),
            e('button',{className:'ghost-btn',onClick:openAddTask,title:'Añadir '+taskNoun},'＋'),
            e(SortMenuButton,{value:sortModes.tareas,onChange:m=>setSortMode('tareas',m),title:'Ordenar tareas'}),
            e('button',{className:'dash-panel-link',onClick:()=>setTab('tareas')},'Ver todas')
          ),
          e('div',{className:'dash-panel-body'},
            pendingTasks.length===0&&e('div',{className:'empty'},'Sin tareas pendientes.'),
            pendingTasks.slice(0,6).map(t=>e(TaskRow,{key:t.id,t,onCycleTaskStatus,onDeleteTask,isActive:isRunningHere&&activeSess.taskId===t.id,onPlay:onPlayTask,onFinish:onFinishTask,onOpenSteps:setStepsForTask}))
          )
        ),
        visible.sistemas&&e('div',{className:'dash-panel'},
          e('div',{className:'dash-panel-hdr'},
            e(EditableLabel,{value:labels.sistemas,onSave:v=>renameLabel('sistemas',v)}),
            e('button',{className:'ghost-btn',onClick:()=>setSystemForm('new'),title:'Nuevo sistema'},'＋'),
            e(SortMenuButton,{value:sortModes.sistemas,onChange:m=>setSortMode('sistemas',m),title:'Ordenar sistemas'}),
            e('button',{className:'ghost-btn',onClick:()=>onTogglePanelVisibility('sistemas'),title:'Ocultar este panel (puedes reactivarlo en Ajustes)'},e(DashIcon,{name:'eyeOff',size:12})),
            e('button',{className:'dash-panel-link',onClick:()=>setTab('sistemas')},'Ver todos')
          ),
          e('div',{className:'dash-panel-body'},
            pSystems.length===0&&e('div',{className:'empty'},'Sin sistemas aún.\\nCréalos con el botón ＋.'),
            e('div',{className:'systems-grid'},pSystems.slice(0,3).map(s=>e(SystemCard,{key:s.id,system:s,onEdit:()=>setSystemForm(s),onUpdateSystem,fmtWhen})))
          )
        ),
        e('div',{className:'dash-panel'},
          e('div',{className:'dash-panel-hdr'},
            e(EditableLabel,{value:labels.habitos,onSave:v=>renameLabel('habitos',v)}),
            e('button',{className:'ghost-btn',onClick:()=>setHabitForm('new'),title:'Nuevo hábito'},'＋'),
            e(SortMenuButton,{value:sortModes.habitos,onChange:m=>setSortMode('habitos',m),title:'Ordenar hábitos'}),
            e('button',{className:'dash-panel-link',onClick:()=>setTab('habitos')},'Ver todos')
          ),
          e('div',{className:'dash-panel-body'},
            pHabits.length===0&&e('div',{className:'empty'},'Sin hábitos aún.'),
            pHabits.map(h=>{
              const log=h.log||[];
              const streak=habitStreak(h);
              const doneSel=log.includes(selectedDay);
              const dueSel=habitOccursOn(h,dateFromDayKey(selectedDay))&&!doneSel;
              return e('div',{key:h.id,className:'habit-preview-row'},
                e('div',{className:'habit-preview-icon',style:{background:(h.color||'#2fb87a')+'22'}},e(ProjIconSVG,{iconKey:h.icon||'target',size:12,color:h.color||'var(--accent2)'})),
                e('div',{style:{flex:1,minWidth:0,cursor:'pointer'},title:'Doble click para editar',onDoubleClick:()=>setHabitForm(h)},
                  e('div',{style:{display:'flex',alignItems:'center',gap:6}},
                    dueSel&&e(BellIcon,{active:true,size:10,color:'var(--accent2)'}),
                    e('div',{className:'habit-preview-name'},h.name)
                  ),
                  streak>0&&e('div',{className:'habit-preview-streak'},e(DashIcon,{name:'flame',size:9,color:'#e0954a',fill:'#e0954a'}),streak+' días')
                ),
                e('div',{className:'habit-preview-dots'},last5.map(dk=>e('span',{key:dk,className:'habit-dot'+(log.includes(dk)?' on':'')}))),
                e(HabitCheck,{done:doneSel,due:dueSel,onClick:()=>onToggleHabitLog(h.id,selectedDay),title:doneSel?'Hecho el '+selectedDay:'Marcar como hecho este día'})
              );
            })
          )
        )
      ),
      e('div',{className:'dash-timeline-wrap'},
        e(HorizontalTimeline,{realBlocks,liveBlock,projects,tasks,selectedDay,setSelectedDay})
      )
    )),

    tab==='tareas'&&e('div',{className:'dash-body'},
      e('div',{className:'dash-panel',style:{maxWidth:640}},
        e('div',{className:'dash-panel-hdr'},
          e(EditableLabel,{value:labels.tareas,onSave:v=>renameLabel('tareas',v)}),
          e('span',{style:{fontSize:10,color:'var(--text4)'}},'('+pendingTasks.length+')'),
          e('div',{style:{marginLeft:'auto',display:'flex',alignItems:'center',gap:6}},
            e(SortMenuButton,{value:sortModes.tareas,onChange:m=>setSortMode('tareas',m),title:'Ordenar tareas'}),
            e('button',{className:'ghost-btn',onClick:openAddTask,title:'Añadir '+taskNoun},'＋')
          )
        ),
        e('div',{className:'dash-panel-body',style:{maxHeight:'none'}},
          pendingTasks.length===0&&e('div',{className:'empty'},'Sin tareas pendientes. Usa el botón ＋ para agregar una.'),
          pendingTasks.map(t=>e(TaskRow,{key:t.id,t,onCycleTaskStatus,onDeleteTask,isActive:isRunningHere&&activeSess.taskId===t.id,onPlay:onPlayTask,onFinish:onFinishTask,onOpenSteps:setStepsForTask}))
        )
      )
    ),

    tab==='sistemas'&&e('div',{className:'dash-body'},
      e('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:2}},
        e(EditableLabel,{value:labels.sistemas,onSave:v=>renameLabel('sistemas',v)}),
        e('span',{style:{fontSize:10,color:'var(--text4)'}},'· doble click para editar'),
        !visible.sistemas&&e('button',{className:'ghost-btn',onClick:()=>onTogglePanelVisibility('sistemas'),title:'Mostrar de nuevo este panel en Resumen'},'Mostrar en Resumen'),
        e('div',{style:{marginLeft:'auto',display:'flex',alignItems:'center',gap:6}},
          e(SortMenuButton,{value:sortModes.sistemas,onChange:m=>setSortMode('sistemas',m),title:'Ordenar sistemas'}),
          e('button',{className:'ghost-btn',onClick:()=>setSystemForm('new'),title:'Nuevo sistema'},'＋')
        )
      ),
      pSystems.length===0&&e('div',{className:'empty'},'Sin sistemas aún. Un Sistema representa un proceso o rutina que quieres monitorear (ej. riego de plantas, chequeo mensual). Usa el botón ＋.'),
      e('div',{className:'systems-grid',style:{maxWidth:760}},pSystems.map(s=>e(SystemCard,{key:s.id,system:s,onEdit:()=>setSystemForm(s),onUpdateSystem,fmtWhen})))
    ),

    tab==='habitos'&&e('div',{className:'dash-body'},
      e('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:2}},
        e(EditableLabel,{value:labels.habitos,onSave:v=>renameLabel('habitos',v)}),
        e('span',{style:{fontSize:10,color:'var(--text4)'}},'· esta semana'),
        e('div',{style:{marginLeft:'auto',display:'flex',alignItems:'center',gap:6}},
          e(SortMenuButton,{value:sortModes.habitos,onChange:m=>setSortMode('habitos',m),title:'Ordenar hábitos'}),
          e('button',{className:'ghost-btn',onClick:()=>setHabitForm('new'),title:'Nuevo hábito'},'＋')
        )
      ),
      pHabits.length>0&&e('div',{className:'habit-grid-hdr',style:{maxWidth:520}},e('div',null),week.map(w=>e('div',{key:w.key,className:'habit-grid-daylbl'+(w.isToday?' today':'')},w.label)),e('div',null)),
      e('div',{style:{maxWidth:520}},
        pHabits.length===0&&e('div',{className:'empty'},'Sin hábitos aún. Usa el botón ＋ para crear uno en este proyecto.'),
        pHabits.map(h=>{
          const log=h.log||[];
          const doneSel=log.includes(selectedDay);
          const dueSel=habitOccursOn(h,dateFromDayKey(selectedDay))&&!doneSel;
          return e('div',{key:h.id,className:'habit-grid-row'},
            e('span',{className:'habit-grid-name',style:{display:'flex',alignItems:'center',gap:6,cursor:'pointer'},title:'Doble click para editar',onDoubleClick:()=>setHabitForm(h)},
              e(ProjIconSVG,{iconKey:h.icon||'target',size:11,color:h.color||'var(--accent2)'}),
              dueSel&&e(BellIcon,{active:true,size:10,color:'var(--accent2)'}),
              h.name
            ),

// ═══════════════════════════════════════════
// RECURRENCE MODAL — simple, Notion/ClickUp-inspired recurring task scheduler.
// Only shows the sub-options relevant to the selected type, and only offers
// the three recurrence shapes that cover the common cases: every X days,
// weekly (every N weeks on chosen weekdays), and monthly (same day / first / last).
// ═══════════════════════════════════════════
const REC_TYPES=[
  {k:'none',l:'No se repite'},
  {k:'daily',l:'Cada X días'},
  {k:'weekly',l:'Semanal'},
  {k:'monthly',l:'Mensual'}
];
function RecurrenceModal({value,anchorDate,onClose,onSave,mode}){
  const isHabit=mode==='habit'||mode==='system';
  const titleTxt=mode==='habit'?'Repetir hábito':mode==='system'?'Repetir monitoreo':'Repetir tarea';
  const anchorDay=new Date(anchorDate+'T00:00:00').getDate();
  const anchorWeekday=weekdayKeyOf(anchorDate);
  const[draft,setDraft]=useState(()=>({
    type:isHabit?'weekly':'none',interval:1,days:[anchorWeekday],monthMode:'same',monthDay:anchorDay,trigger:'onComplete',
    ...(value||{}),
    // guard against legacy/partial recurrence objects (e.g. old habit shapes)
    // missing fields that the weekly/monthly sections need to render safely
    days:(value&&value.days&&value.days.length)?value.days:[anchorWeekday],
    interval:(value&&value.interval)||1,
    monthMode:(value&&value.monthMode)||'same',
    monthDay:(value&&value.monthDay)||anchorDay
  }));
  function patch(p){ setDraft(d=>({...d,...p})); }
  function toggleDay(k){
    setDraft(d=>{
      const has=(d.days||[]).includes(k);
      const next=has?d.days.filter(x=>x!==k):[...d.days,k];
      return{...d,days:next.length?next:d.days}; // never allow zero days selected
    });
  }
  function setPreset(list){ patch({days:list}); }

  const preview=draft.type!=='none'?computeNextOccurrence(anchorDate,draft):null;
  const types=isHabit?REC_TYPES.filter(t=>t.k!=='none'):REC_TYPES;

  function handleSave(){
    onSave(draft.type==='none'?null:draft);
  }

  return e('div',{className:'overlay',onClick:ev=>{if(ev.target===ev.currentTarget)onClose();}},
    e('div',{className:'modal',style:{width:400}},
      e('div',{className:'modal-head'},
        e('div',{className:'modal-title'},e(RepeatIcon,{size:14,color:'currentColor'}),e('span',{style:{marginLeft:8}},titleTxt)),
        e('button',{className:'modal-x',onClick:onClose},'✕')
      ),
      e('div',{className:'modal-body rec-body'},
        e('div',{className:'rec-type-grid'},
          types.map(t=>e('button',{
            key:t.k,
            className:'rec-type-btn'+(draft.type===t.k?' active':''),
            onClick:()=>patch({type:t.k})
          },t.l))
        ),

        draft.type==='daily'&&e('div',{className:'rec-section'},
          e('div',{className:'rec-row'},
            e('span',null,'Repetir cada'),
            e('input',{type:'number',min:1,max:365,className:'rec-num',value:draft.interval,onChange:ev=>patch({interval:Math.max(1,parseInt(ev.target.value)||1)})}),
            e('span',null,draft.interval===1?'día':'días')
          )
        ),

        draft.type==='weekly'&&e('div',{className:'rec-section'},
          e('div',{className:'rec-row'},
            e('span',null,'Repetir cada'),
            e('input',{type:'number',min:1,max:52,className:'rec-num',value:draft.interval,onChange:ev=>patch({interval:Math.max(1,parseInt(ev.target.value)||1)})}),
            e('span',null,draft.interval===1?'semana':'semanas')
          ),
          e('div',{className:'rec-daychips'},
            WEEK_DAYS.map(w=>e('button',{
              key:w.k,
              className:'rec-daychip'+((draft.days||[]).includes(w.k)?' active':''),
              onClick:()=>toggleDay(w.k),
              title:w.full
            },w.l))
          ),
          e('div',{className:'rec-presets'},
            e('button',{className:'rec-preset-btn',onClick:()=>setPreset(['mon','tue','wed','thu','fri'])},'Días laborales'),
            e('button',{className:'rec-preset-btn',onClick:()=>setPreset(['sat','sun'])},'Fin de semana'),
            e('button',{className:'rec-preset-btn',onClick:()=>setPreset(['mon','tue','wed','thu','fri','sat','sun'])},'Todos los días')
          )
        ),

        draft.type==='monthly'&&e('div',{className:'rec-section'},
          e('div',{className:'rec-choice'+(draft.monthMode==='same'?' active':''),onClick:()=>patch({monthMode:'same'})},
            e('span',{className:'rec-radio'}),
            e('span',null,'El día'),
            e('input',{type:'number',min:1,max:31,className:'rec-num',onClick:ev=>ev.stopPropagation(),value:draft.monthDay,onChange:ev=>patch({monthMode:'same',monthDay:Math.min(31,Math.max(1,parseInt(ev.target.value)||1))})}),
            e('span',null,'de cada mes')
          ),
          e('div',{className:'rec-choice'+(draft.monthMode==='first'?' active':''),onClick:()=>patch({monthMode:'first'})},
            e('span',{className:'rec-radio'}),e('span',null,'El primer día del mes')
          ),
          e('div',{className:'rec-choice'+(draft.monthMode==='last'?' active':''),onClick:()=>patch({monthMode:'last'})},
            e('span',{className:'rec-radio'}),e('span',null,'El último día del mes')
          )
        ),

        !isHabit&&draft.type!=='none'&&e('div',{className:'rec-divider'}),
        !isHabit&&draft.type!=='none'&&e('div',{className:'rec-section'},
          e('div',{className:'rec-label-sm'},'Crear la siguiente tarea'),
          e('div',{className:'rec-choice'+(draft.trigger==='onComplete'?' active':''),onClick:()=>patch({trigger:'onComplete'})},
            e('span',{className:'rec-radio'}),e('span',null,'Al marcarla como completada')
          ),
          e('div',{className:'rec-choice'+(draft.trigger==='onSchedule'?' active':''),onClick:()=>patch({trigger:'onSchedule'})},
            e('span',{className:'rec-radio'}),e('span',null,'En la fecha programada')
          )
        ),

        draft.type!=='none'&&e('div',{className:'rec-summary'},
          e(RepeatIcon,{size:11,color:'var(--accent2)'}),
          e('span',null,recurrenceLabel(draft)+(preview?' · próxima: '+(()=>{const[y,m,d]=preview.split('-');return d+'-'+m+'-'+y;})():''))
        )
      ),
      e('div',{className:'modal-foot'},
        e('button',{className:'btn',onClick:onClose},'Cancelar'),
        e('button',{className:'btn btn-primary',onClick:handleSave},'Guardar')
      )
    )
  );
}

function TaskStepsModal({task,noun,onClose,onSave,onUpdateTask}){
  const[steps,setSteps]=useState(task.steps||[]);
  const[newName,setNewName]=useState('');
  const[newDate,setNewDate]=useState('');
  const[showRec,setShowRec]=useState(false);
  const stepsRef=useRef(steps);
  useEffect(()=>{stepsRef.current=steps;},[steps]);
  const rowRefs=useRef({});
  const[dragFill,setDragFill]=useState(null); // {startIndex,startDate,endIndex,tipDate,tipX,tipY}
  const[view,setView]=useState('list'); // 'list' | 'timeline' — both read/write the same `steps` state, so they're always in sync
  const[tlDrag,setTlDrag]=useState(null); // {ids,clickedId,startX,orig:{id:date},cur:{id:date},moved,tipX,tipY}
  const[selectedIds,setSelectedIds]=useState(()=>new Set());
  const DAY_W=64;

  function commit(next){ setSteps(next); onSave(next); }
  function addStep(){
    if(!newName.trim())return;
    commit([...steps,{id:uid(),name:newName.trim(),dueDate:newDate||null,done:false}]);
    setNewName('');setNewDate('');
  }
  function updateStep(id,patch){ commit(steps.map(s=>s.id===id?{...s,...patch}:s)); }
  function deleteStep(id){ commit(steps.filter(s=>s.id!==id)); }

  function addDays(dateStr,n){
    const d=new Date(dateStr+'T00:00:00');
    d.setDate(d.getDate()+n);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function fmtPretty(dateStr){
    if(!dateStr)return'';
    const[y,m,d]=dateStr.split('-');
    return `${d}-${m}-${y}`;
  }

  // Excel-style fill handle: press the corner square of a date cell and drag
  // up/down over other rows — each row crossed gets startDate + rowOffset days.
  // Tracked via a real mousemove listener + row bounding boxes (robust to fast drags),
  // rather than relying on onMouseEnter which can miss rows when the pointer moves quickly.
  function beginFillDrag(index,ev){
    ev.preventDefault();ev.stopPropagation();
    const startDate=steps[index].dueDate;
    if(!startDate)return;
    setDragFill({startIndex:index,startDate,endIndex:index,tipDate:startDate,tipX:ev.clientX,tipY:ev.clientY});
  }
  useEffect(()=>{
    if(!dragFill)return;
    const{startIndex,startDate}=dragFill;
    function rowAt(y){
      let found=startIndex;
      for(const key of Object.keys(rowRefs.current)){
        const el=rowRefs.current[key];
        if(!el)continue;
        const r=el.getBoundingClientRect();
        if(y>=r.top&&y<=r.bottom){found=Number(key);break;}
      }
      return found;
    }
    function onMove(ev){
      const idx=rowAt(ev.clientY);
      const lo=Math.min(startIndex,idx),hi=Math.max(startIndex,idx);
      setSteps(prev=>prev.map((s,i)=>(i<lo||i>hi)?s:{...s,dueDate:addDays(startDate,i-startIndex)}));
      setDragFill(df=>df?{...df,endIndex:idx,tipDate:addDays(startDate,idx-startIndex),tipX:ev.clientX,tipY:ev.clientY}:df);
    }
    function onUp(){ setDragFill(null); onSave(stepsRef.current); }
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
    return()=>{window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);};
  },[dragFill&&dragFill.startIndex,dragFill&&dragFill.startDate]);

  // Timeline: click a pill to select it (highlighted); click again to deselect;
  // "Seleccionar todas" selects every dated step. Dragging any pill that's part
  // of a multi-selection moves the whole group together, preserving the gaps
  // between their dates. Dragging a lone / unselected pill just moves that one.
  // A single final commit happens on mouseup (no per-pixel Supabase pushes).
  function toggleSelect(id){
    setSelectedIds(prev=>{
      const next=new Set(prev);
      if(next.has(id))next.delete(id);else next.add(id);
      return next;
    });
  }
  function selectAllDated(){
    setSelectedIds(new Set(steps.filter(s=>s.dueDate).map(s=>s.id)));
  }
  function clearSelection(){ setSelectedIds(new Set()); }

  function beginTimelineDrag(id,ev){
    ev.preventDefault();ev.stopPropagation();
    const s=steps.find(x=>x.id===id);
    if(!s||!s.dueDate)return;
    const group=(selectedIds.has(id)&&selectedIds.size>1)
      ?steps.filter(x=>selectedIds.has(x.id)&&x.dueDate).map(x=>x.id)
      :[id];
    const orig={};group.forEach(gid=>{orig[gid]=steps.find(x=>x.id===gid).dueDate;});
    setTlDrag({ids:group,clickedId:id,startX:ev.clientX,orig,cur:{...orig},moved:false,tipX:ev.clientX,tipY:ev.clientY});
  }
  useEffect(()=>{
    if(!tlDrag)return;
    const{ids,orig,startX}=tlDrag;
    function onMove(ev){
      const deltaDays=Math.round((ev.clientX-startX)/DAY_W);
      const moved=Math.abs(ev.clientX-startX)>=4;
      const cur={};ids.forEach(gid=>{cur[gid]=addDays(orig[gid],deltaDays);});
      setTlDrag(d=>d?{...d,cur,moved:d.moved||moved,tipX:ev.clientX,tipY:ev.clientY}:d);
    }
    function onUp(){
      setTlDrag(d=>{
        if(d){
          if(!d.moved){
            toggleSelect(d.clickedId);
          }else{
            const next=steps.map(s=>d.cur[s.id]!==undefined?{...s,dueDate:d.cur[s.id]}:s);
            commit(next);
          }
        }
        return null;
      });
    }
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
    return()=>{window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);};
  },[tlDrag&&tlDrag.ids&&tlDrag.ids.join(','),tlDrag&&tlDrag.startX]);

  const total=steps.length;
  const doneCount=steps.filter(s=>s.done).length;
  const pct=total>0?Math.round(doneCount/total*100):0;
  const fillLo=dragFill?Math.min(dragFill.startIndex,dragFill.endIndex):null;
  const fillHi=dragFill?Math.max(dragFill.startIndex,dragFill.endIndex):null;

  // Timeline geometry, only computed when needed
  let tl=null;
  if(view==='timeline'){
    const toTs=d=>new Date(d+'T00:00:00').getTime();
    const today=dayKey();
    const dated=steps.filter(s=>s.dueDate);
    const allTs=dated.map(s=>toTs(s.dueDate)).concat([toTs(today)]);
    const minTs=Math.min(...allTs)-2*86400000;
    const maxTs=Math.max(...allTs)+5*86400000;
    const numDays=Math.round((maxTs-minTs)/86400000)+1;
    const dayIdx=dateStr=>Math.round((toTs(dateStr)-minTs)/86400000);
    const days=Array.from({length:numDays},(_,i)=>new Date(minTs+i*86400000));
    const rows=dated.slice().sort((a,b)=>a.dueDate<b.dueDate?-1:a.dueDate>b.dueDate?1:0);
    tl={today,dated,minTs,numDays,dayIdx,days,rows};
  }

  return e('div',{className:'overlay',onClick:ev=>{if(ev.target===ev.currentTarget)onClose();}},
    e('div',{className:'modal',style:{width:680,maxWidth:'94vw'}},
      e('div',{className:'modal-head'},
        e('div',null,
          e('div',{className:'modal-title'},task.name),
          e('div',{className:'modal-sub'},'Pasos de '+(noun||'esta tarea')+' · '+doneCount+'/'+total+' completados')
        ),
        e('button',{className:'modal-x',onClick:onClose},'✕')
      ),
      e('div',{className:'view-tabs'},
        e('button',{className:'vtab'+(view==='list'?' active':''),onClick:()=>setView('list')},'Lista'),
        e('button',{className:'vtab'+(view==='timeline'?' active':''),onClick:()=>setView('timeline')},'Línea de tiempo'),
        e('button',{className:'rec-trigger-btn'+(task.recurrence?' set':''),style:{marginLeft:'auto'},onClick:()=>setShowRec(true)},
          e(RepeatIcon,{size:11,color:'currentColor'}),
          recurrenceLabel(task.recurrence)
        )
      ),
      total>0&&e('div',{style:{padding:'0 20px',marginTop:-4}},
        e('div',{className:'task-progress-track',style:{maxWidth:'none'}},e('div',{className:'task-progress-fill',style:{width:pct+'%'}}))
      ),
      e('div',{className:'modal-body'},
        view==='list'&&e('div',{className:'sheet',style:dragFill?{userSelect:'none'}:undefined},
          e('div',{className:'sheet-row sheet-hdr'},
            e('div',{className:'sheet-cell'},'Nombre'),
            e('div',{className:'sheet-cell sheet-cell-date'},'Fecha límite'),
            e('div',{className:'sheet-cell sheet-cell-status'},'Estado')
          ),
          steps.length===0&&e('div',{className:'empty',style:{padding:'16px 2px'}},'Sin pasos aún. Agrega el primero abajo.'),
          steps.map((s,idx)=>{
            const inFillRange=dragFill&&idx>=fillLo&&idx<=fillHi;
            return e('div',{
              key:s.id,
              ref:el=>{rowRefs.current[idx]=el;},
              className:'sheet-row'+(s.done?' done':'')+(inFillRange?' fill-range':'')
            },
              e('div',{className:'sheet-cell'},
                e('input',{className:'sheet-input sheet-input-name',value:s.name,onChange:ev=>updateStep(s.id,{name:ev.target.value})})
              ),
              e('div',{className:'sheet-cell sheet-cell-date'},
                e('div',{className:'sheet-date-cell'},
                  e('input',{className:'sheet-input sheet-input-date',type:'date',value:s.dueDate||'',onChange:ev=>updateStep(s.id,{dueDate:ev.target.value||null})}),
                  s.dueDate&&e('div',{className:'sheet-fill-handle',title:'Arrastra para rellenar días consecutivos',onMouseDown:ev=>beginFillDrag(idx,ev)})
                )
              ),
              e('div',{className:'sheet-cell sheet-cell-status'},
                e('button',{className:'steps-done-btn'+(s.done?' on':''),onClick:()=>updateStep(s.id,{done:!s.done})},s.done?'✓ Listo':'Marcar'),
                e('button',{className:'rem-del',onClick:()=>deleteStep(s.id),title:'Eliminar paso'},'✕')
              )
            );
          }),
          e('div',{className:'sheet-row sheet-add-row'},
            e('div',{className:'sheet-cell'},
              e('input',{className:'sheet-input sheet-input-name',placeholder:'+ Agregar paso...',value:newName,onChange:ev=>setNewName(ev.target.value),onKeyDown:ev=>{if(ev.key==='Enter')addStep();}})
            ),
            e('div',{className:'sheet-cell sheet-cell-date'},
              e('input',{className:'sheet-input sheet-input-date',type:'date',value:newDate,onChange:ev=>setNewDate(ev.target.value)})
            ),
            e('div',{className:'sheet-cell sheet-cell-status'},
              e('button',{className:'btn btn-primary',style:{fontSize:11,padding:'5px 14px',width:'100%'},onClick:addStep},'Agregar')
            )
          )
        ),
        view==='timeline'&&e('div',{className:'tl-wrap'},
          e('div',{className:'tl-toolbar'},
            e('button',{className:'btn',style:{fontSize:10.5,padding:'4px 10px'},onClick:selectAllDated,disabled:tl.dated.length===0},'Seleccionar todas'),
            selectedIds.size>0&&e('button',{className:'btn',style:{fontSize:10.5,padding:'4px 10px'},onClick:clearSelection},'Deseleccionar ('+selectedIds.size+')'),
            selectedIds.size>1&&e('span',{className:'tl-hint'},'Arrastra cualquiera de las '+selectedIds.size+' seleccionadas para moverlas juntas')
          ),
          tl.dated.length<total&&e('div',{className:'tl-note'},(total-tl.dated.length)+' paso(s) sin fecha — asígnales una en la vista Lista para verlos aquí'),
          tl.rows.length===0&&e('div',{className:'empty',style:{padding:'20px 2px'}},'Sin pasos con fecha aún.'),
          tl.rows.length>0&&e('div',{className:'tl-scroll'},
            e('div',{className:'tl-canvas',style:{width:tl.numDays*DAY_W,height:38+tl.rows.length*40+14}},
              e('div',{className:'tl-days'},tl.days.map((d,i)=>{
                const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                const isToday=key===tl.today;
                const wd=WEEK_DAYS.find(w=>w.k===DOW_KEYS[d.getDay()]);
                return e('div',{key:i,className:'tl-day'+(isToday?' today':''),style:{left:i*DAY_W,width:DAY_W}},
                  e('span',{className:'tl-day-dow'},wd?wd.l:''),
                  e('span',{className:'tl-day-num'},d.getDate())
                );
              })),
              e('div',{className:'tl-today-line',style:{left:tl.dayIdx(tl.today)*DAY_W}}),
              tl.rows.map((s,ri)=>{
                const isDragging=tlDrag&&tlDrag.ids.includes(s.id);
                const shownDate=isDragging?tlDrag.cur[s.id]:s.dueDate;
                const isSelected=selectedIds.has(s.id);
                return e('div',{
                  key:s.id,
                  className:'tl-pill'+(s.done?' done':'')+(isDragging?' dragging':'')+(isSelected?' selected':''),
                  style:{left:tl.dayIdx(shownDate)*DAY_W+6,top:38+ri*40+6},
                  onMouseDown:ev=>beginTimelineDrag(s.id,ev),
                  title:'Click para seleccionar · arrastra para reprogramar'
                },
                  e('button',{className:'tl-pill-check',onMouseDown:ev=>ev.stopPropagation(),onClick:ev=>{ev.stopPropagation();updateStep(s.id,{done:!s.done});}},s.done?'✓':''),
                  e('span',{className:'tl-pill-label'},s.name)
                );
              })
            )
          )
        )
      ),
      e('div',{className:'modal-foot'},
        e('button',{className:'btn',onClick:onClose},'Cerrar')
      )
    ),
    dragFill&&e('div',{className:'sheet-fill-tooltip',style:{left:dragFill.tipX+14,top:dragFill.tipY-12}},fmtPretty(dragFill.tipDate)),
    tlDrag&&tlDrag.moved&&e('div',{className:'sheet-fill-tooltip',style:{left:tlDrag.tipX+14,top:tlDrag.tipY-12}},
      tlDrag.ids.length>1?(tlDrag.ids.length+' pasos · '+fmtPretty(tlDrag.cur[tlDrag.clickedId])):fmtPretty(tlDrag.cur[tlDrag.clickedId])
    ),
    showRec&&e(RecurrenceModal,{
      value:task.recurrence,
      anchorDate:task.dueDate||dayKey(),
      onClose:()=>setShowRec(false),
      onSave:next=>{
        onUpdateTask({recurrence:next,dueDate:next?(task.dueDate||dayKey()):task.dueDate});
        setShowRec(false);
      }
    })
  );
}
function EditableLabel({value,onSave}){
  const[editing,setEditing]=useState(false);
  const[val,setVal]=useState(value);
  useEffect(()=>{setVal(value);},[value]);
  function commit(){
    setEditing(false);
    const t=val.trim();
    if(t&&t!==value)onSave(t);else setVal(value);
  }
  if(editing){
    return e('input',{className:'label-edit-input',value:val,autoFocus:true,onFocus:ev=>ev.target.select(),onChange:ev=>setVal(ev.target.value),onBlur:commit,onKeyDown:ev=>{if(ev.key==='Enter')commit();if(ev.key==='Escape'){setVal(value);setEditing(false);}}});
  }
  return e('span',{className:'dash-panel-title editable-label',onClick:()=>setEditing(true),title:'Click para renombrar'},
    value,e('span',{className:'editable-label-pencil'},'✎')
  );
}

function StatCard({icon,color,label,value,sub,progress,sparkline,custom,onChangeCustom,onResetCustom}){
  const[open,setOpen]=useState(false);
  const ref=useRef(null);
  const editable=!!onChangeCustom;
  useEffect(()=>{
    if(!open)return;
    function h(ev){if(ref.current&&!ref.current.contains(ev.target))setOpen(false);}
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[open]);
  const activeColor=custom?.color||color;
  const activeIconKey=custom?.icon||null;
  return e('div',{className:'dash-stat-card',ref},
    e('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between'}},
      e('div',{className:'dash-stat-lbl'},label),
      icon&&e('div',{
        className:'dash-stat-icon'+(editable?' editable':''),
        style:{color:activeColor,background:activeColor+'1c'},
        onClick:editable?()=>setOpen(v=>!v):undefined,
        title:editable?'Cambiar ícono y color':undefined
      },
        activeIconKey?e(ProjIconSVG,{iconKey:activeIconKey,size:12,color:'currentColor'}):e(DashIcon,{name:icon,size:12,color:'currentColor'})
      )
    ),
    e('div',{style:{display:'flex',alignItems:'flex-end',justifyContent:'space-between',gap:8}},
      e('div',{className:'dash-stat-val'},value),
      sparkline&&e(Sparkline,{points:sparkline,color:activeColor})
    ),
    sub&&e('div',{className:'dash-stat-sub'},sub),
    progress&&e('div',{className:'progress-track',style:{marginTop:2}},e('div',{className:'progress-fill',style:{width:Math.min(100,Math.round(progress.value/Math.max(1,progress.max)*100))+'%',background:activeColor||'var(--accent)'}})),
    open&&e('div',{className:'stat-icon-pop',onClick:ev=>ev.stopPropagation()},
      e('div',{className:'swatch-row'},COLORS.map(c=>e('div',{key:c,className:`swatch${activeColor===c?' on':''}`,style:{background:c},onClick:()=>onChangeCustom(activeIconKey||'target',c)}))),
      e('div',{className:'stat-icon-pop-grid'},['target','activity','clipboard','settings','star','heart','sun','rocket','calendar','lightning','chart','folder'].map(k=>
        e('div',{
          key:k,
          className:'stat-icon-pop-item',
          title:k,
          style:{border:activeIconKey===k?'2px solid '+activeColor:'1px solid var(--border2)',background:activeIconKey===k?activeColor+'22':'var(--bg4)'},
          onClick:()=>onChangeCustom(k,activeColor)
        },e(ProjIconSVG,{iconKey:k,size:13,color:activeIconKey===k?activeColor:'var(--text3)'}))
      )),
      onResetCustom&&e('button',{className:'stat-icon-pop-reset',onClick:()=>{onResetCustom();setOpen(false);}},'Restablecer ícono original')
    )
  );
}

createRoot(document.getElementById('root')).render(e(App));
</script>
