// ═══════════════════════════════════════════
// HABITS — recurrence helpers
// ═══════════════════════════════════════════
function dayKeyFromTs(ts){const d=new Date(new Date(ts).toLocaleString('en-US',{timeZone:'America/Santiago'}));return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function dateFromDayKey(k){return new Date(k+'T12:00:00Z');}

// ═══════════════════════════════════════════
// TASK RECURRENCE ENGINE
// ═══════════════════════════════════════════
function addDaysToKey(dateStr,n){
  const d=new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate()+n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function daysInMonthOf(y,m){ return new Date(y,m+1,0).getDate(); } // m is 0-indexed
function dateKeyOf(y,m,day){ return `${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`; }
function weekdayKeyOf(dateStr){ const d=new Date(dateStr+'T00:00:00'); return DOW_KEYS[d.getDay()]; }
function mondayOfWeekKey(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  const dow=d.getDay();
  d.setDate(d.getDate()+(dow===0?-6:1-dow));
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function weeksBetweenKeys(mondayA,mondayB){
  const a=new Date(mondayA+'T00:00:00').getTime();
  const b=new Date(mondayB+'T00:00:00').getTime();
  return Math.round((b-a)/(7*86400000));
}
// Given the date a task last occurred on, returns the next occurrence date per its recurrence rule
function computeNextOccurrence(fromDateStr,rec){
  if(!rec||rec.type==='none')return null;
  if(rec.type==='daily'){
    return addDaysToKey(fromDateStr,Math.max(1,rec.interval||1));
  }
  if(rec.type==='weekly'){
    const days=(rec.days&&rec.days.length)?rec.days:[weekdayKeyOf(fromDateStr)];
    const interval=Math.max(1,rec.interval||1);
    const anchorMonday=mondayOfWeekKey(fromDateStr);
    for(let i=1;i<=7*interval*8;i++){
      const cand=addDaysToKey(fromDateStr,i);
      if(!days.includes(weekdayKeyOf(cand)))continue;
      if(weeksBetweenKeys(anchorMonday,mondayOfWeekKey(cand))%interval===0)return cand;
    }
    return addDaysToKey(fromDateStr,7*interval);
  }
  if(rec.type==='monthly'){
    const d=new Date(fromDateStr+'T00:00:00');
    let y=d.getFullYear(),m=d.getMonth()+1;
    if(m>11){m=0;y++;}
    if(rec.monthMode==='first')return dateKeyOf(y,m,1);
    if(rec.monthMode==='last')return dateKeyOf(y,m,daysInMonthOf(y,m));
    const day=Math.min(rec.monthDay||d.getDate(),daysInMonthOf(y,m));
    return dateKeyOf(y,m,day);
  }
  return null;
}
// Short, human-readable Spanish summary of a recurrence rule, e.g. "Cada 2 semanas · lunes y jueves"
function recurrenceLabel(rec){
  if(!rec||rec.type==='none')return'No se repite';
  if(rec.type==='daily'){
    const n=rec.interval||1;
    return n===1?'Cada día':'Cada '+n+' días';
  }
  if(rec.type==='weekly'){
    const n=rec.interval||1;
    const set=new Set(rec.days||[]);
    const isWeekdays=['mon','tue','wed','thu','fri'].every(k=>set.has(k))&&set.size===5;
    const isWeekend=set.size===2&&set.has('sat')&&set.has('sun');
    const isAll=set.size===7;
    let daysTxt='';
    if(isAll)daysTxt='todos los días';
    else if(isWeekdays)daysTxt='de lunes a viernes';
    else if(isWeekend)daysTxt='fines de semana';
    else{
      const labels=WEEK_DAYS.filter(w=>set.has(w.k)).map(w=>w.full);
      if(labels.length===1)daysTxt=labels[0];
      else if(labels.length>1)daysTxt=labels.slice(0,-1).join(', ')+' y '+labels[labels.length-1];
    }
    return(n===1?'Cada semana':'Cada '+n+' semanas')+(daysTxt?' · '+daysTxt:'');
  }
  if(rec.type==='monthly'){
    if(rec.monthMode==='first')return'El primer día de cada mes';
    if(rec.monthMode==='last')return'El último día de cada mes';
    return'El día '+(rec.monthDay||1)+' de cada mes';
  }
  return'';
}
// Builds the next occurrence of a recurring task: fresh id, next due date per its
// recurrence rule, steps carried over as a reset checklist (all marked pending again)
function spawnNextTaskOccurrence(task){
  if(!task.recurrence||task.recurrence.type==='none')return null;
  const fromDate=task.dueDate||dayKey();
  const nextDate=computeNextOccurrence(fromDate,task.recurrence);
  if(!nextDate)return null;
  return{
    id:uid(),
    projectId:task.projectId,
    name:task.name,
    status:'pending',
    priority:task.priority||'mid',
    createdAt:Date.now(),
    dueDate:nextDate,
    recurrence:task.recurrence,
    steps:(task.steps||[]).map(s=>({...s,id:uid(),done:false}))
  };
}

const WEEK_DAYS=[
  {k:'mon',l:'L',full:'lunes'},{k:'tue',l:'M',full:'martes'},{k:'wed',l:'X',full:'miércoles'},
  {k:'thu',l:'J',full:'jueves'},{k:'fri',l:'V',full:'viernes'},{k:'sat',l:'S',full:'sábado'},{k:'sun',l:'D',full:'domingo'}
];
const DOW_KEYS=['sun','mon','tue','wed','thu','fri','sat']; // matches Date.getDay()
const ORDINAL_LABELS={1:'primer',2:'segundo',3:'tercer',4:'cuarto',last:'último'};
const ORDINAL_SHORT={1:'1er',2:'2do',3:'3er',4:'4to',last:'Últ.'};

function nthWeekdayInfo(date){
  const d=date.getDate();
  const ordinal=Math.ceil(d/7);
  const lastDateOfMonth=new Date(date.getFullYear(),date.getMonth()+1,0).getDate();
  const isLast=(d+7)>lastDateOfMonth;
  return{ordinal,isLast};
}

// Habit recurrence now shares the exact same engine as task recurrence
// (none/daily/weekly/monthly with interval, days, monthMode, monthDay).
// habitOccursOn keeps legacy branches (monthly_date/monthly_ordinal) so
// habits saved before this change keep working.
function habitOccursOn(habit,date){
  const r=habit.recurrence;
  if(!r||r.type==='none')return false;
  const y=date.getFullYear(),mo=String(date.getMonth()+1).padStart(2,'0'),d=String(date.getDate()).padStart(2,'0');
  const dateKey=`${y}-${mo}-${d}`;

  // ── legacy shapes ──
  if(r.type==='monthly_date'){
    if(r.day==='last'){
      const lastDate=new Date(date.getFullYear(),date.getMonth()+1,0).getDate();
      return date.getDate()===lastDate;
    }
    return date.getDate()===Number(r.day);
  }
  if(r.type==='monthly_ordinal'){
    if(DOW_KEYS[date.getDay()]!==r.weekday) return false;
    const{ordinal,isLast}=nthWeekdayInfo(date);
    return r.ordinal==='last'?isLast:ordinal===Number(r.ordinal);
  }

  // ── current shape (same as task recurrence) ──
  const anchorKey=habit.createdAt?dayKeyFromTs(habit.createdAt):dateKey;
  if(r.type==='daily'){
    const n=Math.max(1,r.interval||1);
    const diff=Math.round((new Date(dateKey+'T00:00:00')-new Date(anchorKey+'T00:00:00'))/86400000);
    return ((diff%n)+n)%n===0;
  }
  if(r.type==='weekly'){
    const days=(r.days&&r.days.length)?r.days:[weekdayKeyOf(anchorKey)];
    if(!days.includes(DOW_KEYS[date.getDay()]))return false;
    const n=Math.max(1,r.interval||1);
    const diffWeeks=weeksBetweenKeys(mondayOfWeekKey(anchorKey),mondayOfWeekKey(dateKey));
    return ((diffWeeks%n)+n)%n===0;
  }
  if(r.type==='monthly'){
    const lastDate=new Date(date.getFullYear(),date.getMonth()+1,0).getDate();
    if(r.monthMode==='first')return date.getDate()===1;
    if(r.monthMode==='last')return date.getDate()===lastDate;
    const day=Math.min(r.monthDay||1,lastDate);
    return date.getDate()===day;
  }
  return false;
}

// ═══════════════════════════════════════════
// PANEL ORDERING — "lo más próximo a terminar hoy primero, si no hay
// nada pendiente sigue en orden cronológico"
// Cada tipo de ítem expone una marca de tiempo "efectiva" (próxima fecha en
// que vence/toca hacerse). sortByProximity ordena ascendente por esa marca;
// los ítems sin ninguna fecha quedan al final, ordenados por fecha de creación.
// ═══════════════════════════════════════════
function sortByProximity(list,getDueTs,getCreatedTs){
  return[...list].sort((a,b)=>{
    const da=getDueTs(a),db=getDueTs(b);
    const aHas=da!=null,bHas=db!=null;
    if(aHas&&bHas)return da-db;
    if(aHas&&!bHas)return -1;
    if(!aHas&&bHas)return 1;
    return(getCreatedTs(a)||0)-(getCreatedTs(b)||0);
  });
}
// Aplica uno de los modos de orden disponibles para un panel (proximidad,
// alfabético, más recientes, completadas primero, pendientes primero).
const PANEL_SORT_OPTIONS=[
  {k:'todayFirst',label:'Pendiente hoy primero'},
  {k:'proximity',label:'Más próximas a vencer'},
  {k:'alpha',label:'Orden alfabético'},
  {k:'recent',label:'Más recientes primero'},
  {k:'done',label:'Completadas primero'},
  {k:'pending',label:'Pendientes primero'},
];
function applySortMode(list,mode,cfg){
  const{getDueTs,getCreatedTs,getName,getDone}=cfg;
  const arr=[...list];
  if(mode==='alpha')return arr.sort((a,b)=>(getName(a)||'').localeCompare(getName(b)||'','es',{sensitivity:'base'}));
  if(mode==='recent')return arr.sort((a,b)=>(getCreatedTs(b)||0)-(getCreatedTs(a)||0));
  if(mode==='done')return arr.sort((a,b)=>((getDone(b)?1:0)-(getDone(a)?1:0))||((getCreatedTs(a)||0)-(getCreatedTs(b)||0)));
  if(mode==='pending')return arr.sort((a,b)=>((getDone(a)?1:0)-(getDone(b)?1:0))||((getCreatedTs(a)||0)-(getCreatedTs(b)||0)));
  return sortByProximity(arr,getDueTs,getCreatedTs);
}
function taskDueTs(t){
  if(!t.dueDate)return null;
  return new Date(t.dueDate+'T12:00:00').getTime();
}
function systemDueTs(s){
  if(s.status==='paused')return null;
  return s.nextRun||null;
}
// Próxima ocurrencia pendiente de un hábito (hoy o en el futuro más cercano),
// combinada con su hora programada — así "las 9am" ordena antes que "las 6pm".
function nextHabitDueTs(h){
  const log=h.log||[];
  const base=new Date();base.setHours(0,0,0,0);
  for(let i=0;i<366;i++){
    const d=new Date(base.getTime()+i*86400000);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if(habitOccursOn(h,d)&&!log.includes(key)){
      const[hh,mm]=(h.time||'09:00').split(':').map(Number);
      const dt=new Date(d);dt.setHours(hh||0,mm||0,0,0);
      return dt.getTime();
    }
  }
  return null;
}

function habitDaysLabel(h){
  const r=h.recurrence||{};
  if(r.type==='monthly_date') return r.day==='last'?'Último día':'Día '+r.day;
  if(r.type==='monthly_ordinal'){
    const wd=WEEK_DAYS.find(w=>w.k===r.weekday);
    return (ORDINAL_SHORT[r.ordinal]||r.ordinal)+' '+(wd?wd.l:'');
  }
  if(r.type==='daily'){
    const n=r.interval||1;
    return n===1?'Diario':'Cada '+n+'d';
  }
  if(r.type==='weekly'){
    if(!(r.days||[]).length) return '—';
    return WEEK_DAYS.filter(w=>r.days.includes(w.k)).map(w=>w.l).join(' · ');
  }
  if(r.type==='monthly'){
    if(r.monthMode==='first')return'1er día';
    if(r.monthMode==='last')return'Último día';
    return'Día '+(r.monthDay||1);
  }
  return '—';
}

// Last time a habit was marked done, formatted dd-mm-yyyy (or 'Nunca')
function habitLastDoneLabel(log){
  if(!log||!log.length) return 'Nunca';
  const last=log.slice().sort().slice(-1)[0];
  const[y,m,d]=last.split('-');
  return d+'-'+m+'-'+y;
}

function habitSummary(rec,time){
  if(!rec||rec.type==='none')return'Elige cada cuánto se repite';
  return recurrenceLabel(rec)+', a las '+time;
}

function currentWeekDays(){
  // Returns array of 7 {key:'YYYY-MM-DD', label:'L'...} from Monday to Sunday, based on today (America/Santiago)
  const today=nowSCL();
  const dow=today.getDay(); // 0=sun..6=sat
  const mondayOffset=dow===0?-6:1-dow;
  const monday=new Date(today);monday.setDate(today.getDate()+mondayOffset);
  return WEEK_DAYS.map((w,i)=>{
    const d=new Date(monday);d.setDate(monday.getDate()+i);
    return{key:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`,label:w.l,dowKey:w.k,isToday:dayKeyFromTs(d.getTime())===dayKey()};
  });
}

  // HABITS → REMINDERS engine: once a day, per habit, if it occurs today and the
  // scheduled time has arrived, push a reminder into the same `reminders` array
  // used everywhere else (rem-float panel, rem-toast, bell badge).
  useEffect(()=>{
    function checkHabits(){
      const now=new Date();
      const todayStr=now.toISOString().slice(0,10);
      setHabits(prev=>{
        let changed=false;
        const next=prev.map(h=>{
          if(!h.reminder) return h;
          if(h.lastFiredDate===todayStr) return h;
          if(!habitOccursOn(h,now)) return h;
          const[hh,mm]=(h.time||'09:00').split(':').map(Number);
          if(now.getHours()<(hh||0)||(now.getHours()===(hh||0)&&now.getMinutes()<(mm||0))) return h;
          changed=true;
          const due=new Date(now);due.setHours(hh||9,mm||0,0,0);
          const proj=projects.find(p=>p.id===h.projectId);
          const r={id:uid(),title:h.name,projId:h.projectId,dueAt:due.getTime(),done:false,overdue:true,createdAt:Date.now(),habitId:h.id};
          setReminders(rs=>[r,...rs]);
          playSound(soundCfg.remindSound||'bell',soundCfg.remindVol!=null?soundCfg.remindVol:0.6);
          setRemToast({id:r.id,title:r.title,projName:proj?.name||'',color:proj?.color||'var(--accent)'});
          return{...h,lastFiredDate:todayStr};
        });
        return changed?next:prev;
      });
    }
    checkHabits();
    const id=setInterval(checkHabits,30000);
    return()=>clearInterval(id);
  },[projects,soundCfg]);

  useEffect(()=>{
    function check(){
      const now=Date.now();
      setReminders(prev=>prev.map(r=>{
        if(r.done) return r;
        if(r.dueAt&&now<r.dueAt&&firedRemsRef.current.has(r.id)) firedRemsRef.current.delete(r.id); // postponed → allow re-fire later
        if(firedRemsRef.current.has(r.id)) return r;
        if(r.dueAt&&now>=r.dueAt){

      }));

  // SB: on connect, pull and restore remote data
  useEffect(()=>{
    if(sbStatus!=='connected') return;

      try{
        // Si quedaron cambios locales sin confirmar (ej: marcaste un hábito y
        // recargaste antes de que el push de 3s o el de beforeunload
        // terminaran), NO hacemos pull todavía — eso reemplazaría el estado
        // local recién cargado desde localStorage con datos remotos más
        // viejos. Primero subimos lo local para no perder el cambio.
        if(SB.isDirty()){
          await SB.push({projects,sessions,intenciones,tasks,blocks,habits,reminders,ctxs,systems,panelLabels,panelVisibility,panelSortModes});
          SB.markSynced();
          return;
        }
        const remote = await SB.pull();
        if(remote){
          if(remote.projects?.length)  setProjects(remote.projects);
          if(remote.sessions?.length)  setSessions(remote.sessions);
          if(remote.intenciones)       setIntenciones(remote.intenciones);
          if(remote.tasks?.length)     setTasks(remote.tasks);
          if(remote.blocks?.length)    setBlocks(remote.blocks);
          if(remote.habits?.length)    setHabits(remote.habits);
          if(remote.systems?.length)   setSystems(remote.systems);
          if(remote.panelLabels)       setPanelLabels(remote.panelLabels);
          if(remote.panelVisibility)   setPanelVisibility(remote.panelVisibility);
          if(remote.panelSortModes)    setPanelSortModes(remote.panelSortModes);
          if(remote.reminders?.length) setReminders(remote.reminders);
          if(remote.ctxs?.length)      setCtxs(remote.ctxs);
        }
        SB.markSynced();
      }catch(e){ console.warn('[SB] pull error',e); }
    })();
  },[sbStatus]);

  // SB: debounced auto-push — 3s after any data change
  useEffect(()=>{
    if(sbStatus!=='connected') return;
    // Se marca "sucio" apenas cambia cualquier dato sincronizable, antes de
    // esperar los 3s de debounce — así, si la página se recarga en ese
    // intervalo, sabemos que hubo un cambio que quizás no llegó a subirse.
    SB.markDirty();
    clearTimeout(sbSyncRef.current);
    sbSyncRef.current=setTimeout(async()=>{
      setSbSyncing(true);
      try{ await SB.push({projects,sessions,intenciones,tasks,blocks,habits,reminders,ctxs,systems,panelLabels,panelVisibility,panelSortModes}); SB.markSynced(); }
      catch(e){ console.warn('[SB] push error',e); }
      setSbSyncing(false);
    },3000);
    return()=>clearTimeout(sbSyncRef.current);
  },[projects,sessions,intenciones,tasks,blocks,habits,reminders,ctxs,systems,panelLabels,panelVisibility,panelSortModes,sbStatus]);

  // SB: force-immediate push (bypasses the 3s debounce) — used for edits the
  // user explicitly expects to be persisted right away (systems, panel labels)
  const[forceSyncTick,setForceSyncTick]=useState(0);
  const forceSync=()=>setForceSyncTick(t=>t+1);
  useEffect(()=>{
    if(forceSyncTick===0||sbStatus!=='connected')return;
    (async()=>{
      setSbSyncing(true);
      try{ await SB.push({projects,sessions,intenciones,tasks,blocks,habits,reminders,ctxs,systems,panelLabels,panelVisibility,panelSortModes}); SB.markSynced(); }
      catch(e){ console.warn('[SB] push error',e); }
      setSbSyncing(false);
    })();
  },[forceSyncTick]);

  // Recurrence engine (trigger: 'onSchedule') — for tasks whose recurrence says
  // "create the next one on its scheduled date, regardless of status", this scans
  // once on load and every 30s, and spawns the next occurrence once per day per
  // task (tracked via recurrence.lastSpawnDate) without touching the original task.
  useEffect(()=>{
    function checkScheduledRecurrence(){
      const today=dayKey();
      let didChange=false;
      setTasks(prev=>{
        let changed=false;
        const spawned=[];
        const next=prev.map(t=>{
          if(!t.recurrence||t.recurrence.type==='none'||t.recurrence.trigger!=='onSchedule')return t;
          if(!t.dueDate||t.dueDate>today)return t;
          if(t.recurrence.lastSpawnDate===today)return t;
          const s=spawnNextTaskOccurrence(t);
          changed=true;
          if(s)spawned.push(s);
          return{...t,recurrence:{...t.recurrence,lastSpawnDate:today}};
        });
        didChange=changed;
        if(!changed)return prev;
        return spawned.length?[...next,...spawned]:next;
      });
      if(didChange)forceSync();
    }
    checkScheduledRecurrence();
    const id=setInterval(checkScheduledRecurrence,30000);
    return()=>clearInterval(id);
  },[]);

  // SB: keep a ref with the latest full snapshot so the unload flush below
  // always sends fresh data, not a stale closure from when the listener was added
  const sbLatestRef=useRef(null);
  useEffect(()=>{
    sbLatestRef.current={projects,sessions,intenciones,tasks,blocks,habits,reminders,ctxs,systems,panelLabels,panelVisibility,panelSortModes};
  });

  // SB: flush any pending change right before the tab closes/refreshes, using
  // keepalive so the request survives page unload — this is the safety net for
  // "marqué el hábito/tarea y recargué antes de que pasara el debounce de 3s"
  useEffect(()=>{
    function flush(){
      if(sbStatus!=='connected'||!SB.configured()||!sbLatestRef.current) return;
      try{
        const url=`${SB.url}/rest/v1/chronos`;
        const body=JSON.stringify({ user_id: SB.uid, data: sbLatestRef.current, updated_at: new Date().toISOString() });
        fetch(url,{method:'POST',keepalive:true,headers:{'apikey':SB.anon,'Authorization':'Bearer '+SB.anon,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},body});
      }catch(e){ /* best effort */ }
    }
    window.addEventListener('beforeunload',flush);
    window.addEventListener('pagehide',flush);
    document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='hidden') flush(); });
    return()=>{ window.removeEventListener('beforeunload',flush); window.removeEventListener('pagehide',flush); };
  },[sbStatus]);

  // ── TIMER TICK — wall-clock based, zero drift ──
  const sessStartTs=useRef(null);    // Date.now() when current session started
  const pausedAt=useRef(null);       // Date.now() when paused
  const pausedAccum=useRef(0);       // accumulated paused ms
  const pomoPhaseStartTs=useRef(null); // Date.now() when current pomo phase started
  const breakAccum=useRef(0);          // accumulated break seconds (not counted as work)
  const breakStartTs=useRef(null);     // Date.now() when current break phase started

  useEffect(()=>{
    if(tState==='running'){
      timerRef.current=setInterval(()=>{
        const now=Date.now();
        // Real elapsed = wall time since session start minus any paused time
        const realElapsed=Math.floor((now - sessStartTs.current - pausedAccum.current)/1000);
        setElapsed(realElapsed);

        // Work elapsed = real elapsed minus accumulated break time
        const currentBreakSecs=breakStartTs.current?Math.floor((now-breakStartTs.current)/1000):0;
        const realWorkElapsed=Math.max(0,realElapsed-breakAccum.current-currentBreakSecs);
        setWorkElapsed(realWorkElapsed);

        // Limit check — use work time only
        if(activeSess){
          const proj=projects.find(p=>p.id===activeSess.projectId);
          if(proj){
            const todayPrev=sessions.filter(s=>s.projectId===proj.id&&s.day===dayKey()&&s.endAt).reduce((a,s)=>a+s.duration,0);
            if(todayPrev+realWorkElapsed>=proj.dailyLimit*60){doStop(true,realWorkElapsed);setLimitToast(proj.name);return;}
          }
        }

        // Pomodoro phase check — count down from phLen to 0, then STOP and wait for user
        if(activeSess?.mode==='pomo'&&pomoPhaseStartTs.current&&!pomoPhaseDoneRef.current){
          const cfg=pomoCfgRef.current||pomoCfg;
          const phase=pomoPhaseRef.current;
          const phLen=(phase==='work'?cfg.work:cfg.brk)*60;
          const phElapsed=Math.floor((now - pomoPhaseStartTs.current)/1000);
          const remaining=phLen-phElapsed;
          setPomoElapsed(Math.min(phElapsed,phLen)); // raw elapsed for progress bar, clamp at 100%
          if(remaining<=0){
            // Phase complete: freeze timer, notify loudly, wait for explicit user action
            pomoPhaseDoneRef.current=true; // set ref immediately to prevent re-triggering in same interval
            setPomoPhaseDone(true);
            clearInterval(timerRef.current);
            setTState('paused');
            pausedAt.current=Date.now();
            playSound(soundCfg.blockSound,soundCfg.blockVol);
            if(phase==='work'){
              setPomoCount(c=>c+1);
              showNotif('¡Tiempo de trabajo completado! Inicia tu descanso.',5000);
            } else {
              showNotif('Descanso terminado. Inicia tu siguiente sesión.',5000);
            }
            // Note: breakStartTs is set in handleStartNextPhase when user actually starts the break
          }
        }

    } else {
      clearInterval(timerRef.current);
      if(tState==='paused'&&pausedAt.current===null) pausedAt.current=Date.now();
    }
    return()=>clearInterval(timerRef.current);
  },[tState,activeSess]);

  // ── BLOCK REMINDER CHECKER ──
  useEffect(()=>{
    const id=setInterval(()=>{
      const nowMin=sclToMin();
      const today=dayKey();
      blocksForDay(blocks,today).filter(b=>b.reminder).forEach(block=>{
        const key=block.id+'_'+today;
        if(!firedBlocksRef.current.has(key)&&Math.abs(nowMin-block.startMin)<=1){
          firedBlocksRef.current.add(key);
          playSound(block.reminderSound||soundCfg.blockSound,soundCfg.blockVol);
          setBlockToast({label:block.label,color:block.color,time:fmtHM(block.startMin*60)});
          setTimeout(()=>setBlockToast(null),6000);
        }
      });
    },30000);
    return()=>clearInterval(id);
  },[blocks,soundCfg]);

  // ── IDLE REMINDER ──
  useEffect(()=>{
    clearInterval(idleRef.current);
    if(tState==='idle'&&soundCfg.idleEnabled&&!idleSilenced){

      },intervalMs);

    return()=>clearInterval(idleRef.current);
  },[tState,soundCfg.idleEnabled,soundCfg.idleInterval,soundCfg.idleSound,soundCfg.idleVol,idleSilenced]);

  // reset idle silence when session starts
  useEffect(()=>{if(tState==='running')setIdleSilenced(false);},[tState]);

  function showNotif(msg,dur=2500){setNotif(msg);setTimeout(()=>setNotif(null),dur);}

  function doStop(auto=false,dur=null,silent=false){
    if(!activeSess)return;
    clearInterval(timerRef.current);
    // Compute real work duration (excluding break time)
    const nowMs=Date.now();
    const totalElapsed=dur!==null?dur:Math.floor((nowMs-sessStartTs.current-pausedAccum.current)/1000);
    const currentBreakSecs=breakStartTs.current?Math.floor((nowMs-breakStartTs.current)/1000):0;
    const realDur=Math.max(0,totalElapsed-breakAccum.current-currentBreakSecs);
    const now=nowTs();
    const ns={id:uid(),projectId:activeSess.projectId,taskId:activeSess.taskId,startAt:activeSess.startAt,endAt:now,duration:Math.max(0,realDur),mode:activeSess.mode,pomos:pomoCount,day:dayKey()};
    setSessions(s=>[...s,ns]);
    const cap=ns;
    setTState('idle');setElapsed(0);setWorkElapsed(0);setPomoElapsed(0);setPomoCount(0);setPomoPhaseDone(false);pomoPhaseDoneRef.current=false;setActiveSess(null);
    sessStartTs.current=null;pausedAt.current=null;pausedAccum.current=0;pomoPhaseStartTs.current=null;breakAccum.current=0;breakStartTs.current=null;
    if(!silent&&!auto)setShowCtxModal(cap);
    if(auto)showNotif('Límite alcanzado. Sesión guardada.');
  }

  function doStart(projId,taskId,mode){
    if(tState!=='idle')doStop(false,null,true);
    const now=Date.now();
    sessStartTs.current=now;
    pausedAt.current=null;
    pausedAccum.current=0;
    breakAccum.current=0;
    breakStartTs.current=null;
    pomoPhaseStartTs.current=now;
    setActiveSess({projectId:projId,taskId:taskId||null,startAt:nowTs(),mode});
    setElapsed(0);setWorkElapsed(0);setPomoElapsed(0);setPomoPhase('work');setPomoCount(0);setPomoPhaseDone(false);pomoPhaseDoneRef.current=false;setTState('running');
    if(taskId)setTasks(ts=>ts.map(t=>t.id===taskId?{...t,status:'inprog'}:t));
    showNotif('Sesión iniciada');
  }

  function handleStop(){doStop(false,null,false);}

  function handlePause(){
    if(pomoPhaseDone)return; // phase ended — use handleStartNextPhase instead, not plain resume
    if(tState==='running'){
      pausedAt.current=Date.now();
      setTState('paused');
    } else if(tState==='paused'){
      // accumulate paused duration
      if(pausedAt.current) pausedAccum.current+=Date.now()-pausedAt.current;
      pausedAt.current=null;
      setTState('running');
    }
  }

  // Explicitly start the next pomodoro phase (work→break or break→work).
  // Called only by the user tapping "Iniciar descanso" / "Iniciar siguiente sesión".
  function handleStartNextPhase(){
    if(!pomoPhaseDone)return;
    const now=Date.now();
    // the time spent "stuck" on the finished phase (since it auto-paused) doesn't count toward the new phase
    if(pausedAt.current) pausedAccum.current+=now-pausedAt.current;
    pausedAt.current=null;
    pomoPhaseStartTs.current=now;
    const nextPhase=pomoPhase==='work'?'break':'work';
    // If transitioning back to work, accumulate break time
    if(nextPhase==='work'&&breakStartTs.current){
      breakAccum.current+=Math.floor((now-breakStartTs.current)/1000);
      breakStartTs.current=null;
    }
    // If transitioning to break, start tracking break time
    if(nextPhase==='break'){
      breakStartTs.current=now;
    }
    setPomoElapsed(0);
    setPomoPhaseDone(false);pomoPhaseDoneRef.current=false;
    setPomoPhase(nextPhase);
    setTState('running');
    playSound('nudge',soundCfg.blockVol);
  }

  function handleSaveCtx(ctx){setCtxs(cs=>[...cs,{...ctx,id:uid(),createdAt:Date.now()}]);setShowCtxModal(null);showNotif('Contexto guardado');}

  function fmtWhen(ts){
    if(!ts)return '—';
    const diff=Date.now()-ts;
    const day=86400000;
    if(diff<0){const d=Math.round(-diff/day);return d<=0?'hoy':d===1?'mañana':`en ${d}d`;}
    if(diff<3600000)return `hace ${Math.max(1,Math.round(diff/60000))}m`;
    if(diff<day)return `hace ${Math.round(diff/3600000)}h`;
    const d=Math.round(diff/day);
    return d===1?'ayer':`hace ${d}d`;
  }
  function pStats(proj){
    const isToday=selectedDay===dayKey();
    const daySess=sessions.filter(s=>s.projectId===proj.id&&s.day===selectedDay&&s.endAt);
    const liveSecs=isToday&&tState!=='idle'&&activeSess?.projectId===proj.id?workElapsed:0;
    return{
      todaySecs:daySess.reduce((a,s)=>a+s.duration,0)+liveSecs,
      sessions:daySess.length+(isToday&&tState!=='idle'&&activeSess?.projectId===proj.id?1:0),
      lastCtx:ctxs.filter(c=>c.projectId===proj.id).sort((a,b)=>b.createdAt-a.createdAt)[0]||null,
      allCtxs:ctxs.filter(c=>c.projectId===proj.id).sort((a,b)=>b.createdAt-a.createdAt),
    };
  }

  const activeProj=activeSess?projects.find(p=>p.id===activeSess.projectId):null;
  const activeTask=activeSess?tasks.find(t=>t.id===activeSess.taskId):null;
  const isToday=selectedDay===dayKey();
  const daySess=sessions.filter(s=>s.day===selectedDay&&s.endAt);
  const todayTotal=daySess.reduce((a,s)=>a+s.duration,0)+(isToday&&tState!=='idle'?workElapsed:0);
  const todayCount=daySess.length+(isToday&&tState!=='idle'?1:0);
  const todayPomos=daySess.reduce((a,s)=>a+s.pomos,0)+(isToday?pomoCount:0);
  const realBlocks=sessions.filter(s=>s.day===selectedDay&&s.endAt&&s.duration>30);
  const liveBlock=isToday&&activeSess&&tState!=='idle'?{id:'live',projectId:activeSess.projectId,taskId:activeSess.taskId,startAt:activeSess.startAt,live:true}:null;
  const selectedProjObj=projects.find(p=>p.id===selProj)||projects[0];
  const showIdleReminder=tState==='idle'&&soundCfg.idleEnabled&&!idleSilenced;

  // Alerta global de la campanita: debe encenderse si CUALQUIER proyecto tiene
  // un hábito por cumplir hoy, un sistema por revisar (nextRun vencido)
  // o una tarea con un paso vencido — usando la MISMA lógica que ya pinta
  // la campanita de cada ítem individual en los paneles (antes la campanita
  // global usaba criterios distintos —reminders.overdue y t.dueDate— que casi

  const todayKey_=dayKey();
  const hasHabitAlert=habits.some(h=>habitOccursOn(h,dateFromDayKey(todayKey_))&&!(h.log||[]).includes(todayKey_));

// ═══════════════════════════════════════════
// POMODORO
// ═══════════════════════════════════════════
function PomoPanel({pomoCfg,setPomoCfg,pomoPhase,pomoCount,pomoElapsed,pomoPhaseDone,tState,activeSess,onStartPomo,onStartNextPhase}){
  const modes=[{k:'25/5',w:25,b:5},{k:'50/10',w:50,b:10}];
  const phLen=(pomoPhase==='work'?pomoCfg.work:pomoCfg.brk)*60;
  // countdown: remaining seconds
  const rem=Math.max(0,phLen-pomoElapsed);
  // progress bar: fills as time passes (0% at start → 100% at end)
  const pct=phLen>0?Math.min(100,Math.round((pomoElapsed/phLen)*100)):0;
  const isPomo=activeSess?.mode==='pomo';
  return e('div',{className:`pomo-card${pomoPhaseDone?' phase-done':''}`},
    e('div',{className:'pomo-hdr'},
      e('span',{className:'pomo-title'},'Pomodoro'),
      e('div',{className:'pomo-tabs'},modes.map(m=>e('button',{key:m.k,className:`ptab${pomoCfg.mode===m.k?' active':''}`,onClick:()=>setPomoCfg({mode:m.k,work:m.w,brk:m.b})},m.k)))
    ),
    isPomo&&e('div',{className:'pomo-track'},e('div',{className:'pomo-fill',style:{width:pct+'%',background:pomoPhaseDone?'var(--amber)':(pomoPhase==='work'?'var(--accent)':'var(--green)')}})),
    e('div',{className:'pomo-body'},
      e('div',{className:'pomo-num'},
        // Always show countdown (remaining), idle shows full duration
        e('div',{className:'pomo-num-val'},pomoPhaseDone?'00:00':(isPomo?fmtHM(rem):fmtHM(pomoCfg.work*60))),
        e('div',{className:'pomo-num-lbl'},pomoPhaseDone?'completado':(isPomo?(pomoPhase==='work'?'restante':'descanso'):'duración'))
      ),
      e('div',{className:'pomo-num'},e('div',{className:'pomo-num-val'},pomoCount),e('div',{className:'pomo-num-lbl'},'completados')),
      e('div',{className:'pomo-dots'},[0,1,2,3].map(i=>e('div',{key:i,className:`pdot${i<pomoCount%4?' on':''}`})))
    ),
    tState==='idle'&&e('button',{className:'pomo-start-btn',onClick:onStartPomo},'Iniciar Pomodoro')
  );
}

// ═══════════════════════════════════════════
// TIMELINE
// ═══════════════════════════════════════════
function Timeline({blocks,setBlocks,realBlocks,liveBlock,projects,tasks,activeSess,tState,tick,onEditBlock,onNewBlock,onDblClickTime,blockOpacity,blockStyle,realStyle,tlZoom,setTlZoom,selectedDay,setSelectedDay}){
  const scrollRef=useRef(null);
  const PX=tlZoom||0.5;
  const S=6;
  const[ctxMenu,setCtxMenu]=useState(null);

  useEffect(()=>{
    if(scrollRef.current){const nowM=sclToMin();scrollRef.current.scrollTop=Math.max(0,(nowM-S*60)*PX-60);}
  },[PX]);

  // Zoom via Ctrl+Wheel on the timeline scroll area
  function onWheelZoom(ev){
    if(ev.ctrlKey||ev.metaKey){
      ev.preventDefault();
      const delta=ev.deltaY>0?-0.1:0.1;
      setTlZoom(z=>Math.min(3,Math.max(0.5,Math.round((z+delta)*10)/10)));
    }
  }

  // Close context menu on any click outside
  useEffect(()=>{
    if(!ctxMenu)return;
    function close(){setCtxMenu(null);}
    window.addEventListener('click',close);
    window.addEventListener('contextmenu',close);
    return()=>{window.removeEventListener('click',close);window.removeEventListener('contextmenu',close);};
  },[ctxMenu]);

  // Day navigation helpers
  function shiftDay(delta){
    const d=new Date(selectedDay+'T12:00:00Z');
    d.setUTCDate(d.getUTCDate()+delta);
    setSelectedDay(d.toISOString().slice(0,10));
  }
  function dayLabel(){
    const today=dayKey();
    if(selectedDay===today)return'Hoy, '+new Date(selectedDay+'T12:00:00Z').toLocaleDateString('es-CL',{weekday:'short',day:'numeric',month:'short'});
    const yesterday=new Date(today+'T12:00:00Z');yesterday.setUTCDate(yesterday.getUTCDate()-1);
    if(selectedDay===yesterday.toISOString().slice(0,10))return'Ayer, '+new Date(selectedDay+'T12:00:00Z').toLocaleDateString('es-CL',{weekday:'short',day:'numeric',month:'short'});
    return new Date(selectedDay+'T12:00:00Z').toLocaleDateString('es-CL',{weekday:'short',day:'numeric',month:'short'}).toUpperCase();
  }

  const nowM=sclToMin();
  const totalM=(24-S)*60;
  const hours=[];for(let h=S;h<=24;h++)hours.push(h);

  function top(minAbs){return Math.max(0,(minAbs-S*60)*PX);}
  function ht(s,f){return Math.max(10,(f-s)*PX);}
  function tsToMin(ts){const d=new Date(ts*1000);const scl=new Date(d.toLocaleString('en-US',{timeZone:'America/Santiago'}));return scl.getHours()*60+scl.getMinutes();}
  function yToMin(y){return Math.round(y/PX)+S*60;}

  function onInnerDblClick(ev){
    const rect=ev.currentTarget.getBoundingClientRect();
    const y=ev.clientY-rect.top;
    const snapped=Math.round(yToMin(y)/15)*15;
    onDblClickTime(snapped);
  }

  const allReal=[...realBlocks,...(liveBlock?[liveBlock]:[])];
  const planOpacity=blockOpacity??0.45;

  return e(React.Fragment,null,
    e('div',{className:'tl-header'},
      e('button',{className:'tl-zoom-btn',onClick:()=>shiftDay(-1),title:'Día anterior',style:{marginRight:2}},'‹'),
      e('span',{className:'tl-date-str',style:{cursor:'pointer',flex:1},onClick:()=>setSelectedDay(dayKey()),title:'Ir a hoy'},dayLabel()),
      e('button',{className:'tl-zoom-btn',onClick:()=>shiftDay(1),title:'Día siguiente',style:{marginLeft:2}},'›'),
      e('div',{style:{width:1,height:12,background:'var(--border2)',margin:'0 4px'}}),
      e('div',{className:'tl-zoom-ctrl'},
        e('button',{className:'tl-zoom-btn',onClick:()=>setTlZoom(z=>Math.max(0.5,Math.round((z-0.1)*10)/10)),title:'Menos zoom'},'−'),
        e('span',{className:'tl-zoom-val'},Math.round((tlZoom||0.5)*100)+'%'),
        e('button',{className:'tl-zoom-btn',onClick:()=>setTlZoom(z=>Math.min(3,Math.round((z+0.1)*10)/10)),title:'Más zoom'},'+'),
        e('div',{style:{width:1,height:12,background:'var(--border2)',margin:'0 3px'}}),
        e('button',{className:'ghost-btn',onClick:onNewBlock,title:'Nuevo bloque'},'＋')
      )
    ),
    e('div',{className:'tl-scroll',ref:scrollRef,onWheel:onWheelZoom},
      e('div',{
        className:'tl-inner',
        style:{height:(totalM*PX+16)+'px',position:'relative'},
        onDoubleClick:onInnerDblClick,
      },
        // hour grid
        hours.map(h=>{
          const minM=h*60;
          const isMaj=h%2===0;
          return e('div',{key:h,className:'tl-hour-row',style:{position:'absolute',top:top(minM)+'px',left:0,right:0}},
            e('span',{className:'tl-hour-lbl'},h===24?'00:00':String(h).padStart(2,'0')+':00'),
            e('div',{className:`tl-hour-line${isMaj?' maj':''}`,style:{flex:1}})
          );
        }),
        // lane divider
        e('div',{className:'tl-lane-div'}),
        // planned blocks — barra de color sólida, sin texto
        blocksForDay(blocks,selectedDay).map(block=>{
          const c=block.color||'#888';
          return e('div',{key:block.id,className:'tl-plan',
            style:{
              top:top(block.startMin)+'px',
              height:ht(block.startMin,block.endMin)+'px',
              background:c,
              opacity:planOpacity,
            },
            onDoubleClick:ev=>{ev.stopPropagation();onEditBlock(block);},
            onContextMenu:ev=>{ev.preventDefault();ev.stopPropagation();setCtxMenu({x:ev.clientX,y:ev.clientY,block});}
          });
        }),
        // real session blocks — multi-style rendering
        allReal.map(sess=>{
          const proj=projects.find(p=>p.id===sess.projectId);
          const task=tasks.find(t=>t.id===sess.taskId);
          const c=proj?.color||'var(--accent)';
          const sMin=tsToMin(sess.startAt);
          const eMin=sess.live?nowM:tsToMin(sess.endAt);
          if(eMin<=sMin||sMin<S*60)return null;
          const rStyle=realStyle||'solid';
          let rBg={};
          if(rStyle==='solid'){
            rBg={background:c+'2e',borderLeftColor:c,borderTop:'1px solid '+c+'44',borderRight:'1px solid '+c+'18',borderBottom:'1px solid '+c+'28',boxShadow:'0 1px 6px #00000030'};
          } else if(rStyle==='filled'){
            rBg={background:c+'55',borderLeftColor:c,borderTop:'1px solid '+c+'88',borderRight:'1px solid '+c+'33',borderBottom:'1px solid '+c+'44',boxShadow:'inset 0 1px 0 '+c+'44'};
          } else if(rStyle==='minimal'){
            rBg={background:'transparent',borderLeftColor:c,borderTop:'none',borderRight:'none',borderBottom:'none'};
          } else if(rStyle==='glow'){
            rBg={background:c+'20',borderLeftColor:c,borderTop:'1px solid '+c+'33',borderRight:'none',borderBottom:'none',boxShadow:'0 0 8px '+c+'28,-2px 0 6px '+c+'44'};
          } else if(rStyle==='line'){
            // Solo línea superior + texto, sin fondo
            rBg={background:'transparent',borderLeft:'none',borderTop:'1px solid '+c,borderRight:'none',borderBottom:'none'};
          } else if(rStyle==='tag'){
            // Pastilla de color solo en la esquina superior izquierda
            rBg={background:'transparent',borderLeft:'none',borderTop:'none',borderRight:'none',borderBottom:'none',
              outline:'none',boxShadow:'inset 3px 0 0 '+c+',inset 0 2px 0 '+c+'55'};
          } else if(rStyle==='ink'){
            // Texto con color, borde bottom sutil, sin fondo
            rBg={background:'transparent',borderLeft:'none',borderTop:'none',borderRight:'none',
              borderBottom:'1px solid '+c+'40'};
          }
          const label=(proj?.name||'')+(task?' · '+task.name:'');
          const textColor=(rStyle==='line'||rStyle==='tag'||rStyle==='ink')?c:c;
          return e('div',{key:sess.id,className:'tl-real',
            style:{top:top(sMin)+'px',height:ht(sMin,eMin)+'px',color:textColor,...rBg}
          },
            e('span',{style:{display:'inline-flex',alignItems:'center',gap:4}},
              sess.live&&e('span',{style:{width:5,height:5,borderRadius:'50%',background:c,display:'inline-block',flexShrink:0,animation:'pa 2s ease-in-out infinite'}}),
              label
            )
          );
        }),
        // now line
        nowM>=S*60&&nowM<=24*60&&e('div',{className:'tl-now',style:{top:top(nowM)+'px'}})
      )
    ),
    // right-click context menu
    ctxMenu&&e('div',{
      style:{position:'fixed',top:ctxMenu.y,left:ctxMenu.x,background:'var(--bg3)',border:'1px solid var(--border3)',borderRadius:'var(--r-md)',padding:'4px',zIndex:500,boxShadow:'0 8px 24px #0009',minWidth:148},
      onClick:ev=>ev.stopPropagation()
    },
      e('div',{style:{padding:'4px 10px 5px',fontSize:10,color:'var(--text3)',borderBottom:'1px solid var(--border)',marginBottom:3,fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:128}},ctxMenu.block.label),
      e('div',{
        style:{padding:'5px 10px',borderRadius:'var(--r-sm)',cursor:'pointer',fontSize:11,color:'var(--text1)',display:'flex',alignItems:'center',gap:6},
        onMouseEnter:ev=>ev.currentTarget.style.background='var(--bg4)',
        onMouseLeave:ev=>ev.currentTarget.style.background='',
        onClick:()=>{onEditBlock(ctxMenu.block);setCtxMenu(null);}
      },'✏  Editar'),
      e('div',{
        style:{padding:'5px 10px',borderRadius:'var(--r-sm)',cursor:'pointer',fontSize:11,color:'var(--red)',display:'flex',alignItems:'center',gap:6},
        onMouseEnter:ev=>ev.currentTarget.style.background='var(--red-bg)',
        onMouseLeave:ev=>ev.currentTarget.style.background='',
        onClick:()=>{setBlocks(bs=>bs.filter(b=>b.id!==ctxMenu.block.id));setCtxMenu(null);}
      },'✕  Eliminar')
    )
  );
}

// ═══════════════════════════════════════════

  const[start,setStart]=useState(toHHMM(init.startMin||480));
  const[end,setEnd]=useState(toHHMM(init.endMin||600));
  const[reminder,setReminder]=useState(block?.reminder??false);
  const[sound,setSound]=useState(block?.reminderSound||'chime');
  // days: migrate legacy date blocks or default to mon-fri
  const defaultDays=block?.days||['mon','tue','wed','thu','fri'];
  const[days,setDays]=useState(defaultDays);
  const isEdit=!!block;

  const ALL_DAYS=[
    {k:'mon',l:'L'},{k:'tue',l:'M'},{k:'wed',l:'X'},{k:'thu',l:'J'},{k:'fri',l:'V'},{k:'sat',l:'S'},{k:'sun',l:'D'}

      e('div',{className:'modal-body'},

          e('label',{className:'flabel'},'Etiqueta'),

          e('div',{className:'fg',style:{flex:1}},e('label',{className:'flabel'},'Inicio'),e('input',{className:'finput',type:'time',value:start,onChange:ev=>setStart(ev.target.value)})),
          e('div',{className:'fg',style:{flex:1}},e('label',{className:'flabel'},'Fin'),e('input',{className:'finput',type:'time',value:end,onChange:ev=>setEnd(ev.target.value)}))

              onClick:()=>toggleDay(k),
              style:{
                width:28,height:28,borderRadius:'50%',border:'1px solid',
                borderColor:days.includes(k)?'var(--accent)':'var(--border2)',
                background:days.includes(k)?'var(--accent-bg)':'transparent',
                color:days.includes(k)?'var(--accent2)':'var(--text3)',
                fontSize:10,fontWeight:600,cursor:'pointer',fontFamily:"'Inter',sans-serif",
                transition:'all .1s'
              }
            },l)),
            e('button',{
              style:{fontSize:10,color:'var(--text3)',background:'transparent',border:'none',cursor:'pointer',padding:'0 4px',fontFamily:"'Inter',sans-serif"},
              onClick:()=>setDays(['mon','tue','wed','thu','fri'])
            },'L-V'),
            e('button',{
              style:{fontSize:10,color:'var(--text3)',background:'transparent',border:'none',cursor:'pointer',padding:'0 4px',fontFamily:"'Inter',sans-serif"},
              onClick:()=>setDays(['mon','tue','wed','thu','fri','sat','sun'])
            },'Todos')
          )

        e('div',{className:'fg'},
          e('label',{className:'flabel'},'Color'),
          e('div',{className:'swatch-row'},COLORS.map(c=>e('div',{key:c,className:`swatch${color===c?' on':''}`,style:{background:c},onClick:()=>setColor(c)})))
        ),
        e('div',{className:'fg'},
          e('div',{className:'toggle-row'},
            e('span',{className:'toggle-lbl'},'Recordatorio al iniciar el bloque'),
            e('div',{className:`toggle${reminder?' on':''}`,onClick:()=>setReminder(v=>!v)})
          )
        ),
        reminder&&e('div',{className:'fg'},
          e('label',{className:'flabel'},'Sonido del recordatorio'),
          e('div',{className:'sound-row'},
            e('select',{className:'fselect',style:{flex:1},value:sound,onChange:ev=>setSound(ev.target.value)},

// Portal dropdown: renders into document.body to escape overflow:hidden
function RemSelDropdown({anchorEl,children,alignRight}){
  const[style,setStyle]=useState({visibility:'hidden'});
  useEffect(()=>{
    if(!anchorEl) return;
    const r=anchorEl.getBoundingClientRect();
    const base={position:'fixed',top:r.bottom+4,zIndex:99999};
    setStyle(alignRight?{...base,right:window.innerWidth-r.right}:{...base,left:r.left});
  },[anchorEl,alignRight]);
  return ReactDOM.createPortal(e('div',{className:'rem-dd',style},children),document.body);
}

// ── Mini Drum Column (Opción C) ──────────────────────────────────
function MiniDrumCol({items,selIdx,onChange,colRef}){
  const H=26,pad=2;
  const listRef=useRef(null);
  const stateRef=useRef({cur:selIdx,dragging:false,startY:0,startIdx:0});
  const onChangeRef=useRef(onChange);
  const itemsRef=useRef(items);
  useEffect(()=>{ onChangeRef.current=onChange; },[onChange]);
  useEffect(()=>{ itemsRef.current=items; },[items]);

  useEffect(()=>{
    stateRef.current.cur=selIdx;
    if(listRef.current) listRef.current.style.transform='translateY('+(-selIdx*H)+'px)';
  },[selIdx]);

  useEffect(()=>{
    const col=colRef?colRef.current:null;
    if(!col) return;
    function snap(idx){
      const clamped=Math.max(0,Math.min(itemsRef.current.length-1,idx));
      stateRef.current.cur=clamped;
      if(listRef.current) listRef.current.style.transform='translateY('+(-(clamped*H))+'px)';
      onChangeRef.current(clamped);
    }
    function onMD(e){stateRef.current.dragging=true;stateRef.current.startY=e.clientY;stateRef.current.startIdx=stateRef.current.cur;e.preventDefault();}
    function onMM(e){if(!stateRef.current.dragging)return;const dy=stateRef.current.startY-e.clientY;snap(Math.round(stateRef.current.startIdx+dy/H));}
    function onMU(){stateRef.current.dragging=false;}
    function onWH(e){e.preventDefault();snap(stateRef.current.cur+(e.deltaY>0?1:-1));}
    col.addEventListener('mousedown',onMD);
    window.addEventListener('mousemove',onMM);
    window.addEventListener('mouseup',onMU);
    col.addEventListener('wheel',onWH,{passive:false});
    return()=>{col.removeEventListener('mousedown',onMD);window.removeEventListener('mousemove',onMM);window.removeEventListener('mouseup',onMU);col.removeEventListener('wheel',onWH);};
  },[colRef]);

  const pads=Array(pad).fill(null);
  return e('div',{style:{display:'flex',flexDirection:'column',alignItems:'stretch',position:'absolute',width:'100%',transition:'transform .12s ease'},ref:listRef},
    ...pads.map((_,i)=>e('div',{key:'pt'+i,className:'mini-item',style:{height:H,lineHeight:H+'px'}},' ')),
    ...items.map((v,i)=>e('div',{key:v,className:'mini-item'+(i===selIdx?' sel':Math.abs(i-selIdx)===1?' near':''),style:{height:H,lineHeight:H+'px'}},v)),
    ...pads.map((_,i)=>e('div',{key:'pb'+i,className:'mini-item',style:{height:H,lineHeight:H+'px'}},' '))
  );
}

function RemindersFloatPanel({reminders,setReminders,habits,setHabits,projects,selectedDay,onClose,forceSync}){
  const[qTitle,setQTitle]=useState('');
  const[qTime,setQTime]=useState('09:00');
  const[qProjId,setQProjId]=useState('');
  const[openDd,setOpenDd]=useState(null);
  const[snoozeOpenId,setSnoozeOpenId]=useState(null);
  const[showDone,setShowDone]=useState(false);
  const panelRef=useRef(null);
  const projEl=useRef(null);

  useEffect(()=>{
    function h(ev){
      const inPanel=panelRef.current&&panelRef.current.contains(ev.target);
      const inDd=ev.target.closest('.rem-dd');
      if(!inPanel&&!inDd) onClose();
    }
    setTimeout(()=>document.addEventListener('mousedown',h),0);
    return()=>document.removeEventListener('mousedown',h);
  },[onClose]);

  useEffect(()=>{
    if(!openDd) return;
    function h(ev){
      const inPanel=panelRef.current&&panelRef.current.contains(ev.target);
      const inDd=ev.target.closest('.rem-dd');
      const onSel=ev.target.closest('.rem-sel');
      if(!inDd&&(!inPanel||!onSel)) setOpenDd(null);
    }
    document.addEventListener('mousedown',h,true);
    return()=>document.removeEventListener('mousedown',h,true);
  },[openDd]);

  useEffect(()=>{
    if(!snoozeOpenId) return;
    function h(){setSnoozeOpenId(null);}
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[snoozeOpenId]);

  function toggleDd(name){setOpenDd(prev=>prev===name?null:name);}

  function addReminder(){
    if(!qTitle.trim()) return;
    const[h,m]=(qTime||'09:00').split(':').map(Number);
    const base=dateFromDayKey(selectedDay);
    base.setHours(h||9,m||0,0,0);
    const r={id:uid(),title:qTitle.trim(),projId:qProjId||null,dueAt:base.getTime(),done:false,overdue:false,createdAt:Date.now()};
    setReminders(prev=>[r,...prev]);
    setQTitle('');
    setOpenDd(null);
    forceSync();
  }

  function toggleDone(id){
    const r0=reminders.find(x=>x.id===id);
    if(!r0) return;
    const newDone=!r0.done;
    setReminders(prev=>prev.map(r=>r.id===id?{...r,done:newDone,overdue:newDone?false:r.overdue}:r));
    // Si el recordatorio viene de un hábito, sincroniza también su casilla
    // en el panel de hábitos del día correspondiente.
    if(r0.habitId&&setHabits){
      const dayK=dayKeyFromTs(r0.dueAt);
      setHabits(hs=>hs.map(h=>{
        if(h.id!==r0.habitId)return h;
        const log=h.log||[];
        const has=log.includes(dayK);
        if(newDone&&!has) return{...h,log:[...log,dayK]};
        if(!newDone&&has) return{...h,log:log.filter(d=>d!==dayK)};
        return h;
      }));
    }
    forceSync();
  }

  function deleteRem(id){setReminders(prev=>prev.filter(r=>r.id!==id));forceSync();}

  function snoozeRem(id,mins){
    setReminders(prev=>prev.map(r=>r.id===id?{...r,dueAt:Date.now()+mins*60000,overdue:false,snoozedAt:Date.now()}:r));
    forceSync();
  }

  function fmtTime(ts){return new Date(ts).toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});}

  // ── Filtro: solo el día seleccionado ──
  const dayReminders=reminders.filter(r=>dayKeyFromTs(r.dueAt)===selectedDay);
  const pending=dayReminders.filter(r=>!r.done).sort((a,b)=>(a.dueAt||0)-(b.dueAt||0));
  const done=dayReminders.filter(r=>r.done);
  const overdueCount=pending.filter(r=>r.overdue).length;

  // Hábitos que tocan el día seleccionado y que aún no generaron su recordatorio de hoy
  const selDateObj=dateFromDayKey(selectedDay);
  const firedHabitIds=new Set(dayReminders.map(r=>r.habitId).filter(Boolean));
  const dayHabits=(habits||[]).filter(h=>habitOccursOn(h,selDateObj)&&!firedHabitIds.has(h.id))
    .sort((a,b)=>(a.time||'').localeCompare(b.time||''));

  const isToday=selectedDay===dayKey();
  const dayLabel=isToday?'Hoy':dateFromDayKey(selectedDay).toLocaleDateString('es-CL',{weekday:'short',day:'numeric',month:'short'});
  const activeProjs=projects.filter(p=>p.status!=='archived');
  const selProj=activeProjs.find(p=>p.id===qProjId);
  const chevron=e('svg',{width:8,height:8,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2.5,strokeLinecap:'round',style:{display:'block',flexShrink:0}},e('polyline',{points:'6 9 12 15 18 9'}));

    e('div',{className:'rem-float-hdr'},
      e('span',{className:'rem-float-title'},
        dayLabel,
        overdueCount>0&&e('span',{style:{marginLeft:6,fontSize:9,background:'var(--red,#e05555)',color:'#fff',borderRadius:6,padding:'1px 5px'}},overdueCount)
      ),
      e('button',{className:'rem-float-close',onClick:onClose},'✕')
    ),

    e('div',{className:'rem-quick'},
      e('div',{className:'rem-quick-row'},
        e('input',{
          className:'rem-q-input',
          placeholder:'Nuevo recordatorio...',
          value:qTitle,
          autoFocus:true,
          onChange:ev=>setQTitle(ev.target.value),
          onKeyDown:ev=>{if(ev.key==='Enter')addReminder();}
        }),
        e('button',{className:'rem-q-send',onClick:addReminder,title:'Agregar'},
          e('svg',{width:12,height:12,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2.5,strokeLinecap:'round',style:{display:'block'}},
            e('line',{x1:12,y1:19,x2:12,y2:5}),e('polyline',{points:'5 12 12 5 19 12'})
          )
        )
      ),
      e('div',{className:'rem-sel-row'},
        e('div',{
          ref:projEl,
          className:'rem-sel'+(openDd==='proj'?' open':''),
          style:{flex:1},
          onClick:()=>toggleDd('proj')
        },
          selProj
            ?e('span',{className:'rem-sel-dot',style:{background:selProj.color}})
            :e('svg',{width:11,height:11,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',style:{display:'block',flexShrink:0,color:'var(--text3)'}},e('rect',{x:2,y:7,width:20,height:14,rx:2}),e('path',{d:'M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2'})),
          e('span',{className:'rem-sel-val'},selProj?selProj.name:'Proyecto'),
          chevron
        ),
        e('input',{type:'time',className:'rem-sel rem-sel-time',value:qTime,onChange:ev=>setQTime(ev.target.value)})
      ),
      openDd==='proj'&&e(RemSelDropdown,{anchorEl:projEl.current,alignRight:false},
        e('button',{className:'rem-dd-item'+(qProjId===''?' active':''),onClick:()=>{setQProjId('');setOpenDd(null);}},
          e('span',{style:{width:5,height:5,borderRadius:'50%',background:'var(--text4)',display:'inline-block',flexShrink:0}}),

          e('span',{className:'rem-dd-item-dot',style:{background:p.color}}),p.name
        ))
      )
    ),

    // List
    e('div',{className:'rem-list'},
      pending.length===0&&dayHabits.length===0&&done.length===0&&e('div',{className:'rem-empty'},'Nada para '+dayLabel.toLowerCase()),

        const proj=projects.find(p=>p.id===r.projId);
        return e('div',{key:r.id,className:'rem-item'},

function ThemeCfgModal({cfg,onChange,onClose,tlZoom,setTlZoom}){
  const[tid,setTid]=useState(cfg.themeId);
  const[opacity,setOpacity]=useState(cfg.blockOpacity??0.45);
  const[bStyle,setBStyle]=useState(cfg.blockStyle||'stripe');
  const[rStyle,setRStyle]=useState(cfg.realStyle||'solid');

  const BLOCK_STYLES=[
    {k:'stripe',label:'Rayas',desc:'Fondo con patrón diagonal'},
    {k:'solid',label:'Sólido',desc:'Relleno semitransparente'},
    {k:'ghost',label:'Ghost',desc:'Solo borde punteado'},
    {k:'pill',label:'Pill',desc:'Barra lateral delgada'},
  ];
  const REAL_STYLES=[
    {k:'solid',label:'Sólido',desc:'Fondo semitransparente'},
    {k:'filled',label:'Relleno',desc:'Más opaco y visible'},
    {k:'minimal',label:'Minimal',desc:'Solo borde izquierdo'},
    {k:'glow',label:'Glow',desc:'Con halo de color'},
    {k:'line',label:'Línea',desc:'Solo trazo superior'},
    {k:'tag',label:'Tag',desc:'Esquina marcada, sin fondo'},
    {k:'ink',label:'Ink',desc:'Texto con subrayado sutil'},
  ];

  function preview(id){
    const t=THEMES.find(x=>x.id===id)||THEMES[0];
    Object.entries(t.vars).forEach(([k,v])=>document.documentElement.style.setProperty(k,v));
    setTid(id);
  }

  function handleClose(){
    const t=THEMES.find(x=>x.id===cfg.themeId)||THEMES[0];
    Object.entries(t.vars).forEach(([k,v])=>document.documentElement.style.setProperty(k,v));
    onClose();
  }

  function handleSave(){
    onChange({themeId:tid,blockOpacity:opacity,blockStyle:bStyle,realStyle:rStyle});
    onClose();
  }

  function StyleGrid({options,value,onChange}){
    return e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5}},
      options.map(o=>
        e('div',{key:o.k,onClick:()=>onChange(o.k),
          style:{
            padding:'7px 10px',borderRadius:'var(--r-md)',cursor:'pointer',
            border:`1px solid ${value===o.k?'var(--accent)':'var(--border2)'}`,
            background:value===o.k?'var(--accent-bg)':'var(--bg3)',
            transition:'all .1s',
          }
        },
          e('div',{style:{fontSize:11,fontWeight:600,color:value===o.k?'var(--accent2)':'var(--text1)',marginBottom:1}},o.label),
          e('div',{style:{fontSize:10,color:'var(--text3)'}},o.desc)
        )
      )
    );
  }

  return e('div',{className:'overlay',onClick:ev=>{if(ev.target===ev.currentTarget)handleClose();}},
    e('div',{className:'modal',style:{width:500,maxHeight:'88vh'}},
      e('div',{className:'modal-head'},
        e('div',{style:{flex:1}},
          e('div',{className:'modal-title'},'Apariencia'),
          e('div',{className:'modal-sub'},'Temas, estilos de bloques y zoom del horario')
        ),
        e('button',{className:'modal-x',onClick:handleClose},'✕')
      ),
      e('div',{className:'modal-body'},
        // Color themes
        e('div',{style:{fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.8px',marginBottom:8}},'Tema de color'),
        e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:7,marginBottom:14}},
          THEMES.map(t=>
            e('div',{key:t.id,onClick:()=>preview(t.id),
              style:{
                background:t.vars['--bg2'],
                border:`1px solid ${tid===t.id?t.vars['--accent']:t.vars['--border2']}`,
                borderRadius:'var(--r-lg)',padding:'9px 11px',cursor:'pointer',
                transition:'border-color .15s',position:'relative',
                outline:tid===t.id?`2px solid ${t.vars['--accent']}55`:'none',outlineOffset:2,
              }
            },
              e('div',{style:{display:'flex',gap:4,marginBottom:6}},
                ['--accent','--green','--amber'].map(k=>e('div',{key:k,style:{width:7,height:7,borderRadius:'50%',background:t.vars[k]||'#444'}}))
              ),
              e('div',{style:{fontSize:11,fontWeight:600,color:t.vars['--text0'],marginBottom:1}},t.label),
              e('div',{style:{fontSize:9,color:t.vars['--text3'],lineHeight:1.4}},t.desc),
              tid===t.id&&e('div',{style:{position:'absolute',top:7,right:8,fontSize:10,color:t.vars['--accent']}},'✓')
            )
          )
        ),
        e('div',{style:{height:1,background:'var(--border)',margin:'2px 0 14px'}}),
        // Block styles
        e('div',{style:{fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.8px',marginBottom:8}},'Estilo de bloques de horario'),
        e(StyleGrid,{options:BLOCK_STYLES,value:bStyle,onChange:setBStyle}),
        e('div',{style:{height:1,background:'var(--border)',margin:'14px 0'}}),
        // Real session styles
        e('div',{style:{fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.8px',marginBottom:8}},'Estilo de sesiones de trabajo'),
        e(StyleGrid,{options:REAL_STYLES,value:rStyle,onChange:setRStyle}),
        e('div',{style:{height:1,background:'var(--border)',margin:'14px 0'}}),
        // Opacity + Zoom
        e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}},
          e('div',null,
            e('div',{style:{fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.8px',marginBottom:8}},'Opacidad de bloques'),
            e('div',{style:{display:'flex',alignItems:'center',gap:8}},
              e('input',{type:'range',min:0.05,max:0.9,step:.05,value:opacity,
                onChange:ev=>setOpacity(parseFloat(ev.target.value)),
                style:{flex:1,accentColor:'var(--accent)'}}),
              e('span',{style:{fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:'var(--text2)',width:32,textAlign:'right'}},Math.round(opacity*100)+'%')
            )
          ),
          e('div',null,
            e('div',{style:{fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.8px',marginBottom:8}},'Zoom del horario'),
            e('div',{style:{display:'flex',alignItems:'center',gap:8}},
              e('input',{type:'range',min:0.5,max:3,step:.1,value:tlZoom||0.5,
                onChange:ev=>setTlZoom(parseFloat(ev.target.value)),
                style:{flex:1,accentColor:'var(--accent)'}}),
              e('span',{style:{fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:'var(--text2)',width:32,textAlign:'right'}},Math.round((tlZoom||0.5)*100)+'%')
            )
          )
        )
      ),
      e('div',{className:'modal-foot'},
        e('button',{className:'btn',onClick:handleClose},'Cancelar'),
        e('button',{className:'btn btn-primary',onClick:handleSave},'Guardar cambios')
      )
    )
  );
}

// START FLOW
// ═══════════════════════════════════════════
function StartFlow({project,tasks,mode,onClose,onStart,pomoCfg,setPomoCfg,presetTaskId=null,presetTaskName=null}){
  const[sel,setSel]=useState(null);
  const[newName,setNewName]=useState('');
  // step: 'task' → 'pomo' → done
  const[step,setStep]=useState((presetTaskId||presetTaskName)?'pomo':'task');
  const[chosenTaskSel,setChosenTaskSel]=useState(presetTaskId||null);
  const[chosenTaskName,setChosenTaskName]=useState(presetTaskName||null);

  const POMO_MODES=[
    {k:'25/5',w:25,b:5,desc:'Sprints cortos de alta concentración'},
    {k:'50/10',w:50,b:10,desc:'Bloques largos para trabajo profundo'},
  ];

  function goToPomo(tid,tname){
    setChosenTaskSel(tid);
    setChosenTaskName(tname);
    setStep('pomo');
  }

  function confirmPomo(modeKey){
    const m=POMO_MODES.find(x=>x.k===modeKey);
    if(m&&setPomoCfg)setPomoCfg({mode:m.k,work:m.w,brk:m.b});
    onStart(chosenTaskSel,chosenTaskName,'pomo');
  }

  function startFree(){
    onStart(sel,newName,'free');
  }

  if(step==='pomo'){
    return e('div',{className:'overlay',onClick:ev=>{if(ev.target===ev.currentTarget)onClose();}},
      e('div',{className:'modal modal-sm'},
        e('div',{className:'modal-head'},
          e('div',{style:{flex:1}},
            e('div',{style:{display:'flex',alignItems:'center',gap:7}},
              project&&e('div',{style:{width:6,height:6,borderRadius:'50%',background:project.color,flexShrink:0}}),
              e('div',{className:'modal-title'},'¿Qué modo Pomodoro?')
            ),
            e('div',{className:'modal-sub'},project?.name||(chosenTaskName||'Sin tarea'))
          ),
          e('button',{className:'modal-x',onClick:onClose},'✕')
        ),
        e('div',{className:'modal-body'},
          e('div',{style:{display:'flex',flexDirection:'column',gap:8}},
            POMO_MODES.map(m=>
              e('div',{
                key:m.k,
                onClick:()=>confirmPomo(m.k),
                style:{
                  display:'flex',alignItems:'center',gap:12,
                  padding:'14px 16px',borderRadius:'var(--r-lg)',
                  border:`1px solid ${pomoCfg?.mode===m.k?'var(--accent)':'var(--border2)'}`,
                  background:pomoCfg?.mode===m.k?'var(--accent-bg)':'var(--bg3)',
                  cursor:'pointer',transition:'all .12s',
                }
              },
                e('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',minWidth:52,gap:2}},
                  e('div',{style:{fontSize:20,fontWeight:600,fontFamily:"'JetBrains Mono',monospace",color:'var(--text0)',lineHeight:1}},m.k),
                  e('div',{style:{fontSize:9,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.6px'}},m.w+'m / '+m.b+'m')
                ),
                e('div',{style:{width:1,height:32,background:'var(--border2)',flexShrink:0}}),
                e('div',{style:{flex:1}},
                  e('div',{style:{fontSize:12,color:'var(--text1)',marginBottom:2}},m.k==='25/5'?'Clásico':'Profundo'),
                  e('div',{style:{fontSize:11,color:'var(--text3)',lineHeight:1.4}},m.desc)
                ),
                pomoCfg?.mode===m.k&&e('div',{style:{fontSize:14,color:'var(--accent)'}},'✓')
              )
            )
          )
        ),
        e('div',{className:'modal-foot'},
          !(presetTaskId||presetTaskName)&&e('button',{className:'btn btn-ghost',style:{marginRight:'auto'},onClick:()=>setStep('task')},'← Volver'),
          e('button',{className:'btn',onClick:onClose},'Cancelar')
        )
      )
    );
  }

  return e('div',{className:'overlay',onClick:ev=>{if(ev.target===ev.currentTarget)onClose();}},
    e('div',{className:'modal modal-sm'},
      e('div',{className:'modal-head'},
        e('div',{style:{flex:1}},
          e('div',{style:{display:'flex',alignItems:'center',gap:7}},
            project&&e('div',{style:{width:6,height:6,borderRadius:'50%',background:project.color,flexShrink:0}}),
            e('div',{className:'modal-title'},project?.name||'Proyecto')
          ),
          e('div',{className:'modal-sub'},'¿En qué vas a trabajar ahora?')
        ),
        e('button',{className:'modal-x',onClick:onClose},'✕')
      ),
      e('div',{className:'modal-body'},
        e('div',{className:'fg'},
          e('input',{
            className:'finput',
            value:newName,
            placeholder:'Describe lo que harás...',
            autoFocus:true,
            onChange:ev=>setNewName(ev.target.value),
            onKeyDown:ev=>{
              if(ev.key==='Enter'){
                if(mode==='pomo'||mode==='ask') goToPomo(null,newName);
                else startFree();
              }
            }
          })
        ),
        (mode==='ask')&&e('div',{style:{marginTop:4}},
          e('button',{className:'btn',style:{width:'100%',fontSize:11},onClick:startFree},'▶ Sesión libre (sin Pomodoro)')
        )
      ),
      e('div',{className:'modal-foot'},
        e('button',{className:'btn btn-ghost',style:{marginRight:'auto'},onClick:()=>{if(mode==='pomo'||mode==='ask')goToPomo(null,null);else onStart(null,null,'free');}},'Sin descripción'),
        e('button',{className:'btn',onClick:onClose},'Cancelar'),
        (mode==='pomo'||mode==='ask')
          ?e('button',{className:'btn btn-primary',onClick:()=>goToPomo(null,newName)},'Iniciar Pomodoro →')
          :e('button',{className:'btn btn-primary',onClick:startFree},'Iniciar sesión')
      )
    )
  );
}

function TaskRow({t,onCycleTaskStatus,onDeleteTask,isActive,onPlay,onFinish,onOpenSteps}){
  const steps=t.steps||[];
  const total=steps.length;
  const doneCount=steps.filter(s=>s.done).length;
  const pct=total>0?Math.round(doneCount/total*100):0;
  const today=dayKey();
  const hasDue=steps.some(s=>!s.done&&s.dueDate&&s.dueDate<=today);
  return e('div',{className:'task-row'},
    e('div',{className:'task-main',onDoubleClick:()=>onOpenSteps&&onOpenSteps(t),title:onOpenSteps?'Doble click para ver pasos':undefined},
      e('span',{className:'task-name'},t.name),
      total>0&&e('div',{className:'task-progress-row'},
        e('div',{className:'task-progress-track'},e('div',{className:'task-progress-fill',style:{width:pct+'%'}})),
        e('span',{className:'task-progress-lbl'},doneCount+'/'+total)
      ),
      t.recurrence&&t.recurrence.type!=='none'&&e('span',{className:'task-rec-badge',title:recurrenceLabel(t.recurrence)},
        e(RepeatIcon,{size:9,color:'currentColor'}),recurrenceLabel(t.recurrence)
      )
    ),
    e('span',{className:'task-bell'+(hasDue?' on':''),title:hasDue?'Hay un paso por cumplir':'Sin pasos pendientes por hoy'},e(BellIcon,{active:hasDue,size:13,color:'currentColor'})),
    isActive
      ?e('button',{className:'task-play-btn stop',onClick:onFinish,title:'Finalizar sesión'},e(StopIcon,null))
      :e('button',{className:'task-play-btn',onClick:()=>onPlay(t.id),title:'Iniciar Pomodoro'},e(PlayIcon,null)),
    e('div',{className:'task-check'+(t.status==='inprog'?' inprog':''),onClick:()=>onCycleTaskStatus(t.id),title:'Marcar como hecho'}),
    e('button',{className:'rem-del',onClick:()=>onDeleteTask(t.id),title:'Eliminar'},'✕')
  );
}

    ),

      e('div',{className:'an-title'},'Últimos 7 días'),
      dayTotals.map(({day,total:t})=>e('div',{key:day,className:'bar-row'},e('div',{className:'bar-lbl'},new Date(day+'T12:00:00').toLocaleDateString('es-CL',{weekday:'short',day:'numeric'})),e('div',{className:'bar-track'},e('div',{className:'bar-fill',style:{width:(t/maxD*100)+'%',background:'var(--accent)'}})),e('div',{className:'bar-val'},fmtS(t)))),

      ),

    )

// ═══════════════════════════════════════════
// FOCUS PANEL
// ═══════════════════════════════════════════
function FocusPanel({intenciones,setIntenciones,projects,selectedDay,onStartProj,onCierre}){
  const items=intenciones[selectedDay]||[];
  const pending=items.filter(i=>!i.done);
  const done=items.filter(i=>i.done);
  const dateLabel=selectedDay===dayKey()
    ?'Hoy'
    :new Date(selectedDay+'T12:00:00Z').toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'});

  function markDone(idx){
    setIntenciones(prev=>{
      const day=[...(prev[selectedDay]||[])];
      day[idx]={...day[idx],done:!day[idx].done};
      return{...prev,[selectedDay]:day};
    });
  }

  function postponeItem(idx){
    const item=(intenciones[selectedDay]||[])[idx];
    if(!item)return;
    // Compute tomorrow relative to selectedDay
    const base=new Date(selectedDay+'T12:00:00Z');
    base.setUTCDate(base.getUTCDate()+1);
    const nextDay=base.toISOString().slice(0,10);
    setIntenciones(prev=>{
      // Remove from current day
      const today=[...(prev[selectedDay]||[])];
      today.splice(idx,1);
      // Add to next day (avoid duplicate)
      const next=[...(prev[nextDay]||[])];
      if(!next.some(i=>i.projId===item.projId&&i.text===item.text)){
        next.push({...item,done:false});
      }
      return{...prev,[selectedDay]:today,[nextDay]:next};
    });
  }

  return e('div',{className:'focus-panel'},
    e('div',{className:'focus-panel-hdr'},
      e('div',{className:'focus-panel-title'},'Foco del día'),
      e('span',{className:'focus-panel-date'},dateLabel)
    ),
    e('div',{className:'focus-panel-body'},
      items.length===0
        ?e('div',{className:'focus-empty'},
            e('div',{className:'focus-empty-icon'},'🌙'),
            e('div',null,selectedDay===dayKey()
              ?'No hay intenciones para hoy.\nCierra el día de ayer para planificar.'
              :'Sin intenciones para este día.'),
            selectedDay===dayKey()&&e('button',{className:'focus-cta',onClick:onCierre},'Cerrar día y planificar')
          )
        :e(React.Fragment,null,
          pending.length>0&&e(React.Fragment,null,
            pending.map((item,i)=>{
              const proj=projects.find(p=>p.id===item.projId);
              const globalIdx=items.indexOf(item);
              return e('div',{key:i,className:'focus-card'},
                e('div',{className:'focus-card-hdr'},
                  e('div',{className:'proj-icon-badge',style:{'--proj-color':proj?.color||'var(--text4)'}},
                    e(ProjIconSVG,{iconKey:proj?.icon||DEFAULT_ICON,size:12,color:proj?.color||'var(--text3)'})
                  ),
                  e('span',{className:'focus-card-proj'},proj?.name||'Proyecto'),
                  proj?.category&&e('span',{style:{fontSize:9,color:'var(--text4)',padding:'1px 5px',background:'var(--bg4)',borderRadius:8}},proj.category)
                ),
                e('div',{className:'focus-card-intent'},item.text),
                e('div',{className:'focus-card-actions'},
                  e('button',{className:'focus-start-btn',onMouseEnter:()=>playUI('hover'),onClick:()=>{playUI('click');onStartProj(item.projId);}},'▶ Iniciar sesión'),
                  e('button',{className:'focus-done-btn',onMouseEnter:()=>playUI('hover'),onClick:()=>{playUI('click');markDone(globalIdx);}},'✓ Listo'),
                  e('button',{className:'focus-done-btn',style:{fontSize:10,color:'var(--amber)',borderColor:'var(--amber-border)'},onMouseEnter:()=>playUI('hover'),onClick:()=>{playUI('click');postponeItem(globalIdx);}},'↷ Posponer')
                )
              );
            })
          ),
          done.length>0&&e('div',{style:{marginTop:8}},
            e('div',{style:{fontSize:9,color:'var(--text4)',textTransform:'uppercase',letterSpacing:'.6px',marginBottom:6}},'Completado'),
            done.map((item,i)=>{
              const proj=projects.find(p=>p.id===item.projId);
              const globalIdx=items.indexOf(item);
              return e('div',{key:i,className:'focus-card done'},
                e('div',{className:'focus-card-hdr'},
                  e('div',{className:'proj-icon-badge',style:{'--proj-color':proj?.color||'var(--text4)'}},
                    e(ProjIconSVG,{iconKey:proj?.icon||DEFAULT_ICON,size:12,color:proj?.color||'var(--text3)'})
                  ),
                  e('span',{className:'focus-card-proj'},proj?.name||'Proyecto'),
                  e('span',{style:{fontSize:9,color:'var(--green)'}}, '✓')
                ),
                e('div',{className:'focus-card-intent'},item.text),
                e('button',{className:'focus-done-btn',style:{fontSize:9},onClick:()=>markDone(globalIdx)},'Deshacer')
              );
            })
          )
        )
    )
  );
}

// ═══════════════════════════════════════════
// CIERRE DÍA — intenciones only
// ═══════════════════════════════════════════
function CierreDia({projects,intenciones,setIntenciones,sessions,ctxs,onClose,showNotif,onDone}){
  const tomorrowStr=(()=>{
    const d=new Date(dayKey()+'T12:00:00Z');
    d.setUTCDate(d.getUTCDate()+1);
    return d.toISOString().slice(0,10);
  })();
  const tomorrowLabel=new Date(tomorrowStr+'T12:00:00Z').toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'});

  // Get last nextStep for each project from ctxs
  function lastNextStep(projId){
    if(!ctxs) return null;
    const sorted=[...ctxs].filter(c=>c.projectId===projId&&c.nextStep).sort((a,b)=>b.createdAt-a.createdAt);
    return sorted[0]?.nextStep||null;
  }

  const[intents,setIntents]=useState(()=>Object.fromEntries(
    projects.map(p=>{
      const existing=(intenciones[tomorrowStr]||[]).find(i=>i.projId===p.id)?.text||'';
      return [p.id,{text:existing,skip:false,usedSuggestion:false}];
    })
  ));

  function setIntent(pid,field,val){setIntents(prev=>({...prev,[pid]:{...prev[pid],[field]:val}}));}

  const todayTotal=sessions.filter(s=>s.day===dayKey()&&s.endAt).reduce((a,s)=>a+s.duration,0);

  function confirm(){
    const items=projects
      .filter(p=>!intents[p.id].skip&&intents[p.id].text.trim())
      .map(p=>({projId:p.id,text:intents[p.id].text.trim(),done:false}));
    setIntenciones(prev=>({...prev,[tomorrowStr]:items}));
    onDone();
  }

  const hasAny=projects.some(p=>!intents[p.id].skip&&intents[p.id].text.trim());

  return e('div',{className:'overlay',onClick:ev=>{if(ev.target===ev.currentTarget)onClose();}},
    e('div',{className:'modal',style:{maxWidth:460}},
      e('div',{className:'modal-head'},
        e('div',{style:{flex:1}},
          e('div',{className:'modal-title'},'🌙 Cerrar día'),
          e('div',{className:'modal-sub'},`Hoy trabajaste ${fmtS(todayTotal)} · Mañana: ${tomorrowLabel}`)
        ),
        e('button',{className:'modal-x',onClick:onClose},'✕')
      ),
      e('div',{className:'modal-body'},
        e('div',{style:{fontSize:11,color:'var(--text3)',marginBottom:12,lineHeight:1.5}},
          '¿Cuál es el próximo paso concreto para cada proyecto mañana?'
        ),
        projects.map(proj=>{
          const st=intents[proj.id];
          const todaySecs=sessions.filter(s=>s.projectId===proj.id&&s.day===dayKey()&&s.endAt).reduce((a,s)=>a+s.duration,0);
          const suggestion=lastNextStep(proj.id);
          const showSuggestion=suggestion&&!st.usedSuggestion&&!st.text;
          return e('div',{key:proj.id,className:'cierre-proj-row',style:{opacity:st.skip?.45:1}},
            e('div',{className:'cierre-proj-hdr'},
              e('div',{className:'cierre-proj-dot',style:{background:proj.color}}),
              e('span',{className:'cierre-proj-name'},proj.name),
              e('span',{style:{fontSize:9,color:'var(--text4)',padding:'1px 5px',background:'var(--bg3)',borderRadius:8}},proj.category),
              todaySecs>0&&e('span',{className:'cierre-proj-time'},fmtS(todaySecs)+' hoy'),
              e('button',{className:'cierre-skip',onClick:()=>setIntent(proj.id,'skip',!st.skip)},
                st.skip?'+ incluir':'× omitir')
            ),
            !st.skip&&e(React.Fragment,null,
              // Suggestion chip — last recorded nextStep
              showSuggestion&&e('div',{
                style:{
                  display:'flex',alignItems:'flex-start',gap:8,padding:'8px 10px',
                  background:'var(--bg3)',border:'1px dashed var(--border2)',
                  borderRadius:'var(--r-md)',cursor:'pointer',marginBottom:6,
                  transition:'all .1s',
                },
                onClick:()=>setIntent(proj.id,'text',suggestion),
                title:'Clic para usar esta sugerencia'
              },
                e('div',{style:{fontSize:10,color:'var(--accent2)',marginTop:1,flexShrink:0}},'↩'),
                e('div',{style:{flex:1}},
                  e('div',{style:{fontSize:9,color:'var(--text4)',marginBottom:2,textTransform:'uppercase',letterSpacing:'.5px'}},'Último paso anotado'),
                  e('div',{style:{fontSize:11,color:'var(--text2)',lineHeight:1.4}},suggestion)
                ),

function SbModal({status,onClose,onSaved,onDisconnect,onManualSync,syncing}){

    if(!name.trim())return;
