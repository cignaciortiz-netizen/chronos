function SbModal({status,onClose,onSaved,onDisconnect,onManualSync,syncing}){
  const[url,setUrl]=useState(()=>SB._load(SB.K_URL));
  const[anon,setAnon]=useState(()=>SB._load(SB.K_ANON));
  const[err,setErr]=useState('');
  const[saving,setSaving]=useState(false);
  const isConnected=status==='connected';

  async function handleSave(){
    if(!url.trim()||!anon.trim()){setErr('Completa los dos campos.');return;}
    setSaving(true); setErr('');
    try{
      SB.configure(url.trim(), anon.trim());
      await SB.pull(); // test connection
      onSaved();
    }catch(ex){
      setErr('No se pudo conectar. Verifica la URL y la clave anon.');
      SB.disconnect();
      console.warn(ex);
    }finally{ setSaving(false); }
  }

  return e('div',{className:'overlay',onClick:ev=>{if(ev.target===ev.currentTarget)onClose();}},
    e('div',{className:'modal',style:{maxWidth:440}},
      e('div',{className:'modal-head'},
        e('div',{style:{flex:1}},
          e('div',{className:'modal-title'},'☁ Sincronización automática'),
          e('div',{className:'modal-sub'},'Tus datos se guardan en la nube y se restauran solos')
        ),
        e('button',{className:'modal-x',onClick:onClose},'✕')
      ),
      e('div',{className:'modal-body',style:{display:'flex',flexDirection:'column',gap:14}},
        isConnected
          ? e(React.Fragment,null,
              e('div',{style:{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'var(--green-bg)',border:'1px solid var(--green-border)',borderRadius:'var(--r-md)'}},
                e('span',{style:{fontSize:18}},'✓'),
                e('div',null,
                  e('div',{style:{fontSize:12,fontWeight:600,color:'var(--green)'}},'Conectado'),
                  e('div',{style:{fontSize:10,color:'var(--text3)',marginTop:2}},SB.url)
                )
              ),
              e('div',{style:{fontSize:11,color:'var(--text2)',lineHeight:1.7,background:'var(--bg3)',borderRadius:'var(--r-md)',padding:'10px 12px'}},
                '🔄 ',e('strong',null,'Sync automático'),' — cada cambio se guarda solo',e('br',null),
                '☁ ',e('strong',null,'Auto-restauración'),' — al abrir la app tus datos vuelven',e('br',null),
                '🔒 Solo tú accedes a tus datos'
              ),
              e('div',{style:{display:'flex',gap:8}},
                e('button',{className:'btn',style:{flex:1},onClick:onManualSync,disabled:syncing},
                  syncing?'↻ Sincronizando…':'↻ Sincronizar ahora'),
                e('button',{className:'btn',style:{color:'var(--text4)',fontSize:11},
                  onClick:()=>{onDisconnect();onClose();}
                },'Desconectar')
              )
            )
          : e(React.Fragment,null,
              e('div',{style:{fontSize:12,color:'var(--text2)',lineHeight:1.65}},
                'Pega tu ',e('strong',null,'Project URL'),' y la ',e('strong',null,'Anon key'),' de Supabase. Solo una vez — después todo es automático.'
              ),
              e('div',{style:{display:'flex',flexDirection:'column',gap:4}},
                e('label',{style:{fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.05em'}},'Project URL'),
                e('input',{className:'gs-input',placeholder:'https://xxxxxxxx.supabase.co',value:url,
                  onChange:ev=>{ setUrl(ev.target.value); setErr(''); }})
              ),
              e('div',{style:{display:'flex',flexDirection:'column',gap:4}},
                e('label',{style:{fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.05em'}},'Anon public key'),
                e('input',{className:'gs-input',placeholder:'eyJhbGci…',value:anon,
                  onChange:ev=>{ setAnon(ev.target.value); setErr(''); }})
              ),
              err&&e('div',{style:{fontSize:11,color:'var(--red)',padding:'6px 8px',
                background:'var(--red-bg,rgba(239,68,68,.08))',borderRadius:'var(--r-sm)'}},err),
              e('button',{className:'gs-connect-btn',onClick:handleSave,
                disabled:saving||!url.trim()||!anon.trim()},
                saving?'Verificando conexión…':'☁ Guardar y conectar')
            )
      )
    )
  );
}

createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
